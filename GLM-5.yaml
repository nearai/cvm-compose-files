  x-logging-conf: &logging-conf
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "10"
      labels: "com.datadoghq.ad.logs"

  x-nvidia: &nvidia
    runtime: nvidia
    ipc: host
    ulimits:
      memlock: -1
      nofile:
        soft: 65535
        hard: 65535

  x-vllm-proxy-common: &vllm-proxy-common
    image: nearaidev/vllm-proxy-rs@sha256:4f6024bf0964d2a5568ca176913ad3ce9cf3bf63804e1361b7bcaa41b2cd4ecf
    user: root
    privileged: true
    <<: *nvidia
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - certs:/etc/letsencrypt:ro
    restart: unless-stopped
    logging: *logging-conf

  x-downloader-common: &downloader-common
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    entrypoint: ["sh", "-c"]
    restart: "no"
    logging: *logging-conf

  services:
    model-downloader:
      <<: *downloader-common
      container_name: model-downloader
      command:
        - |
          set -e
          echo "Downloading zai-org/GLM-5-FP8..."
          uvx --from 'huggingface_hub[hf_xet]' hf download zai-org/GLM-5-FP8
          echo "Download complete."
      volumes:
        - huggingface_cache:/root/.cache/huggingface
      environment:
        - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}

    nginx:
      image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
      container_name: nginx
      command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
      ports:
        - "8000:80"
        - "8444:443"
      volumes:
        - certs:/etc/letsencrypt:ro
      configs:
        - source: nginx_conf
          target: /etc/nginx/conf.d/default.conf
          mode: 0644
      restart: unless-stopped
      logging: *logging-conf

    model-proxy-registrar:
      image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
      container_name: model-proxy-registrar
      entrypoint: ["sh", "/register.sh"]
      restart: unless-stopped
      environment:
        - HOST_IP=${HOST_IP}
        - HTTP_PORT=${HTTP_PORT:-8000}
        - TLS_PORT=${TLS_PORT:-8444}
        - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
      configs:
        - source: registrar_script
          target: /register.sh
          mode: 0755
      logging: *logging-conf

    proxy-glm:
      <<: *vllm-proxy-common
      container_name: proxy-glm
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - CLOUD_API_URL=https://cloud-api.near.ai
        - LOG_FORMAT=json
        - MODEL_NAME=zai-org/GLM-5-FP8
        - TOKEN=${PROXY_TOKEN}
        - VLLM_BASE_URL=http://glm:8000
        - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem

    glm:
      <<: *nvidia
      init: true
      depends_on:
        model-downloader:
          condition: service_completed_successfully
      image: lmsysorg/sglang:glm5-hopper@sha256:4680bebe1b0bdfa5a16bcb8ae410e8fc6e21c64f2b6e446e5b6d01f52347d3e9
      container_name: glm
      command: >
        sglang serve
        --model-path zai-org/GLM-5-FP8
        --tp 8
        --reasoning-parser glm45
        --log-requests-level 0
        --tool-call-parser glm47
        --mem-fraction-static 0.87
        --max-running-requests 55
        --context-length 200000
        --num-continuous-decode-steps 5
        --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
        --port 8000
        --host 0.0.0.0
        --enable-cache-report
        --enable-metrics
      volumes:
        - huggingface_cache:/root/.cache/huggingface
        - kernel_cache:/root/.cache/deep_gemm
      environment:
        - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
        - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        - OPENBLAS_L2_SIZE=2097152
        - NCCL_DEBUG=WARN
        - SGLANG_JIT_DEEPGEMM_FAST_WARMUP=1
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                device_ids: ["0","1","2","3","4","5","6","7"]
                capabilities: [gpu]
      restart: unless-stopped
      logging: *logging-conf
      labels:
        com.datadoghq.ad.check_names: '["openmetrics"]'
        com.datadoghq.ad.init_configs: "[{}]"
        com.datadoghq.ad.logs: '[{"source": "sglang", "service": "sglang", "tags":["model:zai-org/GLM-5-FP8","ip:${HOST_IP}","port:8000"]}]'
        com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://glm:8000/metrics", "metrics":["sglang:*"], "service": "glm-5", "tags":["model:zai-org/GLM-5-FP8","ip:${HOST_IP}","port:8000"]}]'

    dcgm-exporter:
      image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
      container_name: dcgm-exporter
      runtime: nvidia
      cap_add:
        - SYS_ADMIN
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
      ports:
        - "9400:9400"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      restart: unless-stopped
      logging: *logging-conf
      labels:
        com.datadoghq.ad.check_names: '["dcgm"]'
        com.datadoghq.ad.init_configs: "[{}]"
        com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:zai-org/GLM-5-FP8","deployment:GLM-5","ip:${HOST_IP}"]}]'
        com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:zai-org/GLM-5-FP8","deployment:GLM-5","ip:${HOST_IP}"]}]'

  networks:
    default:
      external: true
      name: dstack_default

  volumes:
    huggingface_cache:
    kernel_cache:
    certs:
      external: true
      name: certs


  configs:
    registrar_script:
      content: |
        #!/bin/sh
        PROXY_URL="https://completions.near.ai"
        TOKEN="$${MODEL_PROXY_TOKEN}"
        ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
        REGISTERED=false
        FAILURE_COUNT=0
        MAX_RETRIES=3

        register_endpoint() {
          echo "[GLM-5] Registering $$ENDPOINT curl"
          curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}" 

        unregister_endpoint() {
          echo "[GLM-5] Unregistering $$ENDPOINT curl"
          curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$$1\"}" 
        }

        register_model() {
          curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}"
        }

        cleanup() {
          echo "[GLM-5] SIGTERM received, unregistering $$ENDPOINT"
          unregister_endpoint "$$ENDPOINT"
          REGISTERED=false
          exit 0
        }
        trap cleanup TERM INT

        # 1-token completion health check directly to model container (no auth needed)
        check_inference() {
          echo "[GLM-5] Checking inference for $$ENDPOINT"
          curl -sS --max-time 45 -X POST "http://glm:8000/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"model":"zai-org/GLM-5-FP8","messages":[{"role":"user","content":"hi"}],"max_tokens":1}'
        }

        echo "Waiting for model to be ready..."
        until curl -sf http://nginx:80/v1/models > /dev/null 2>&1; do sleep 30; done
        echo "Model ready, starting registration loop"

        while true; do
          if check_inference; then
            FAILURE_COUNT=0
            register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
            register_model "zai-org/GLM-5-FP8" "glm-5.completions.near.ai"
            if [ "$$REGISTERED" = false ]; then
              echo "[GLM-5] Registered zai-org/GLM-5-FP8 at $$ENDPOINT"
            fi
            REGISTERED=true
          else
            FAILURE_COUNT=$$((FAILURE_COUNT + 1))
            echo "[GLM-5] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
            if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
              echo "[GLM-5] Health check failed and Retry limit reached, unregistering $$ENDPOINT"
              unregister_endpoint "$$ENDPOINT"
              REGISTERED=false
            fi
          fi
          sleep 60
        done
    nginx_conf:
      content: |
        server {
            listen 80 default_server;

            client_max_body_size 100m;

            location / {
                proxy_pass http://proxy-glm:8000;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_set_header Connection '';
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 3600s;
            }
        }

        server {
            listen 443 ssl;
            server_name glm-5.completions.near.ai;

            ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
            ssl_protocols TLSv1.2 TLSv1.3;

            client_max_body_size 100m;

            location / {
                proxy_pass http://proxy-glm:8000;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_set_header Connection '';
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 3600s;
            }
        }
