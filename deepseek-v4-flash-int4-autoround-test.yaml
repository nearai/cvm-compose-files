x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  image: vllm/vllm-openai@sha256:03768d9400bf490934e5dce2e9d8ddd9e004a5054939e14641188d8a9b69db8e
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - VLLM_CACHE_ROOT=/root/.cache/vllm/deepseek-v4-flash-int4-autoround
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:ef446da93858b4938b90bfa0ff56f7d90d64c1c2f0e9fc8c04ad738c0fdda6c9
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

services:
  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:8000"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  vllm-proxy-dsv4-flash-int4:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-dsv4-flash-int4
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://model-vllm-dsv4-flash-int4:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound","precision:int4","deployment:deepseek-v4-flash-int4-autoround-test","ip:${HOST_IP}","port:8000"]}]'

  model-vllm-dsv4-flash-int4:
    <<: *vllm-common
    container_name: model-vllm-dsv4-flash-int4
    # AutoRound INT4 is auto-detected from quantization_config.
    command: >
      Intel/DeepSeek-V4-Flash-W4A16-AutoRound
      --revision d8ac6c04e22da23f68f797884471dae5cb129ee0
      --served-model-name deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound
      --tensor-parallel-size 8
      --trust-remote-code
      --dtype auto
      --gpu-memory-utilization 0.88
      --max-model-len 65536
      --max-num-seqs 8
      --max-num-batched-tokens 8192
      --enable-prefix-caching
      --async-scheduling
      --enable-prompt-tokens-details
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3","4","5","6","7"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"vllm","service":"vllm","tags":["model:deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound","model_path:Intel/DeepSeek-V4-Flash-W4A16-AutoRound","precision:int4","deployment:deepseek-v4-flash-int4-autoround-test","ip:${HOST_IP}","port:8000"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-dsv4-flash-int4:8000/metrics","histogram_buckets_as_distributions":true,"service":"model-vllm-dsv4-flash-int4","tags":["model:deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound","model_path:Intel/DeepSeek-V4-Flash-W4A16-AutoRound","precision:int4","deployment:deepseek-v4-flash-int4-autoround-test","ip:${HOST_IP}","port:8000"]}]'

  dcgm-dsv4-flash-int4:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-dsv4-flash-int4
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://%%host%%:9400/metrics","tags":["model:deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound","precision:int4","deployment:deepseek-v4-flash-int4-autoround-test","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source":"dcgm-exporter","service":"dcgm-exporter","tags":["model:deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound","precision:int4","deployment:deepseek-v4-flash-int4-autoround-test","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  hugginface_cache:
  vllm_cache:
  certs:
    external: true
    name: certs

configs:
  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      TLS_PORT=8444
      ENDPOINT="$${HOST_IP}:8000"
      REGISTERED=false

      register_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$TLS_PORT}" || true
      }

      unregister_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        exit 0
      }
      trap cleanup TERM INT

      check_inference() {
        curl -sf --max-time 45 -X POST "http://model-vllm-dsv4-flash-int4:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d '{"model":"deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound","messages":[{"role":"user","content":"hi"}],"max_tokens":1}' \
          > /dev/null 2>&1
      }

      READY_URL="http://$${HOST_IP}:8000/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done

      while true; do
        date +%s > /tmp/registrar_alive
        if check_inference; then
          register_endpoint "$$ENDPOINT"
          register_model "deepseek-ai/DeepSeek-V4-Flash-INT4-AutoRound" "dsv4-flash-int4-autoround.completions.near.ai"
          if [ "$$REGISTERED" = false ]; then
            echo "Registered $$ENDPOINT"
          fi
          REGISTERED=true
        else
          echo "Health check failed for $$ENDPOINT"
          REGISTERED=false
        fi
        date +%s > /tmp/registrar_alive
        sleep 60
      done

  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      access_log /var/log/nginx/access.log json_combined;

      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;
      client_body_buffer_size 1m;

      server {
          listen 8000;
          location / { proxy_pass http://vllm-proxy-dsv4-flash-int4:8000; }
      }

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      server {
          listen 443 ssl http2;
          server_name dsv4-flash-int4-autoround.completions.near.ai
                      ~^dsv4-flash-int4-autoround-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-dsv4-flash-int4:8000; }
      }
