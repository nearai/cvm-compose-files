x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:4f6024bf0964d2a5568ca176913ad3ce9cf3bf63804e1361b7bcaa41b2cd4ecf
  user: root
  privileged: true
  <<: *nvidia
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-vllm-healthcheck: &vllm-healthcheck
  test: ["CMD-SHELL", "curl -sf --max-time 10 -X POST http://localhost:8000/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\":\"Qwen/Qwen3.5-122B-A10B\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}'"]
  interval: 60s
  timeout: 15s
  retries: 5
  start_period: 3600s

x-vllm-qwen35-122b-common: &vllm-qwen35-122b-common
  <<: *nvidia
  init: true
  image: vllm/vllm-openai@sha256:96c7e88811a07030f27bc44cd71b9007258a15f130cfec2bb4ab057512238b05  # v0.18.0
  volumes:
    - huggingface_cache:/root/.cache/huggingface
  environment:
    - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
  command:
    - Qwen/Qwen3.5-122B-A10B
    - --tensor-parallel-size
    - "4"
    - --gpu-memory-utilization
    - "0.88"
    - --max-model-len
    - "1010000"
    - --kv-cache-dtype
    - fp8_e4m3
    - --enable-chunked-prefill
    - --max-num-batched-tokens
    - "8192"
    - --reasoning-parser
    - qwen3
    - --enable-auto-tool-choice
    - --tool-call-parser
    - qwen3_coder
    - --enable-prefix-caching
    - --hf-overrides
    - '{"text_config": {"rope_parameters": {"mrope_interleaved": true, "mrope_section": [11, 11, 10], "rope_type": "yarn", "rope_theta": 10000000, "partial_rotary_factor": 0.25, "factor": 4.0, "original_max_position_embeddings": 262144}}}'
    - --port
    - "8000"
    - --host
    - 0.0.0.0
    - --enable-prompt-tokens-details
  healthcheck: *vllm-healthcheck
  restart: unless-stopped
  logging: *logging-conf

services:
  model-downloader:
    image: python:3.11-slim
    container_name: model-downloader
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        pip install -q huggingface_hub[hf_xet] 2>/dev/null
        echo "Downloading Qwen/Qwen3.5-122B-A10B..."
        huggingface-cli download Qwen/Qwen3.5-122B-A10B
        echo "Download complete."
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    logging: *logging-conf

  autoheal:
    image: willfarrell/autoheal@sha256:4f7e11814c41ca47c3a3f38544875bc5bf1ed383e12b86047250e6dd7f7153a4
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=3600
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *logging-conf

  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "8000:8000"
      - "8001:8001"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    environment:
      - HOST_IP=${HOST_IP}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  # --- Qwen3.5-122B-A10B instance 1 (GPUs 0-3) ---

  vllm-qwen35-122b-1:
    <<: *vllm-qwen35-122b-common
    container_name: vllm-qwen35-122b-1
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "vllm", "service": "vllm", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8000","instance:1"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-qwen35-122b-1:8000/metrics", "service": "vllm-qwen35-122b-1", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8000"]}]'

  vllm-proxy-qwen35-122b-1:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-qwen35-122b-1
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.5-122B-A10B
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://vllm-qwen35-122b-1:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8000","instance:1"]}]'

  # --- Qwen3.5-122B-A10B instance 2 (GPUs 4-7) ---

  vllm-qwen35-122b-2:
    <<: *vllm-qwen35-122b-common
    container_name: vllm-qwen35-122b-2
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["4","5","6","7"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "vllm", "service": "vllm", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8001","instance:2"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-qwen35-122b-2:8000/metrics", "service": "vllm-qwen35-122b-2", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8001"]}]'

  vllm-proxy-qwen35-122b-2:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-qwen35-122b-2
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.5-122B-A10B
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://vllm-qwen35-122b-2:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8001","instance:2"]}]'

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-exporter
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  huggingface_cache:
  certs:
    external: true
    name: certs

configs:
  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      EP1="$${HOST_IP}:8000"
      EP2="$${HOST_IP}:8001"
      REG1=false
      REG2=false

      register_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}" || true
      }

      unregister_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering endpoints"
        unregister_endpoint "$$EP1"
        unregister_endpoint "$$EP2"
        exit 0
      }
      trap cleanup TERM INT

      check_inference() {
        curl -sf --max-time 10 -X POST "http://$$1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d '{"model":"Qwen/Qwen3.5-122B-A10B","messages":[{"role":"user","content":"hi"}],"max_tokens":1}' \
          > /dev/null 2>&1
      }

      echo "Waiting for models to be ready..."
      until curl -sf http://nginx:8000/v1/models > /dev/null 2>&1; do sleep 30; done
      echo "Instance 1 ready, starting registration loop"

      while true; do
        if check_inference vllm-qwen35-122b-1; then
          register_endpoint "$$EP1" "$${TLS_PORT}"
          if [ "$$REG1" = false ]; then echo "Registered $$EP1"; fi
          REG1=true
        else
          if [ "$$REG1" = true ]; then
            echo "Health check failed for $$EP1, unregistering"
            unregister_endpoint "$$EP1"
            REG1=false
          fi
        fi

        if check_inference vllm-qwen35-122b-2; then
          register_endpoint "$$EP2" "$${TLS_PORT}"
          if [ "$$REG2" = false ]; then echo "Registered $$EP2"; fi
          REG2=true
        else
          if [ "$$REG2" = true ]; then
            echo "Health check failed for $$EP2, unregistering"
            unregister_endpoint "$$EP2"
            REG2=false
          fi
        fi

        register_model "Qwen/Qwen3.5-122B-A10B" "qwen35-122b.completions.near.ai"
        sleep 60
      done
  nginx_conf:
    content: |
      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;

      # :8000 - Qwen3.5-122B instance 1
      server {
        listen 8000;
        location / { proxy_pass http://vllm-proxy-qwen35-122b-1:8000; }
      }

      # :8001 - Qwen3.5-122B instance 2
      server {
        listen 8001;
        location / { proxy_pass http://vllm-proxy-qwen35-122b-2:8000; }
      }

      upstream qwen35-122b-upstream {
        hash $$connection consistent;
        server vllm-proxy-qwen35-122b-1:8000;
        server vllm-proxy-qwen35-122b-2:8000;
      }

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      server {
        listen 443 ssl;
        server_name qwen35-122b.completions.near.ai;
        location / { proxy_pass http://qwen35-122b-upstream; }
      }
