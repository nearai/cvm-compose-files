x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:8187999c09c585ac1c40c879fa56b8dab30c5df89bc95b69d5219d9fbcdca2e1
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-downloader-common: &downloader-common
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
  entrypoint: ["sh", "-c"]
  restart: "no"
  logging: *logging-conf

services:
  model-downloader:
    <<: *downloader-common
    container_name: model-downloader
    command:
      - |
        set -e
        echo "Downloading zai-org/GLM-5.1-FP8..."
        uvx --from 'huggingface_hub[hf_xet]' hf download zai-org/GLM-5.1-FP8 --revision f396cf805182f4ca10fa675e1a99815b3ca384db
        echo "Download complete."
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}

  proxy-nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: proxy-nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:80"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      # Unhealthy if the registration loop hasn't ticked in 3m (e.g. wedged
      # before the loop, or the loop died). Surfaces silent registrar failures
      # in `docker ps` / Datadog. See cvm-compose-files#57.
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  proxy-glm51:
    <<: *vllm-proxy-common
    container_name: proxy-glm51
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=zai-org/GLM-5.1-FP8
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://model-sg-glm51:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}

  model-sg-glm51:
    <<: *nvidia
    init: true
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    image: lmsysorg/sglang:dev-cu12@sha256:aac6b242680daeb74d2ab1d85f70575357552d7d165d2e5d30eb362797db54a1
    container_name: model-sg-glm51
    command: >
      sglang serve
      --model-path zai-org/GLM-5.1-FP8
      --revision f396cf805182f4ca10fa675e1a99815b3ca384db
      --tp 8
      --reasoning-parser glm45
      --log-requests-level 0
      --tool-call-parser glm47
      --mem-fraction-static 0.87
      --max-queued-requests 8
      --num-continuous-decode-steps 5
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
      --enable-mixed-chunk
      --chunked-prefill-size 8192
      --watchdog-timeout 600
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --trust-remote-code
      --speculative-algorithm EAGLE
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --disable-custom-all-reduce
      --enable-trace
      --otlp-traces-endpoint otelcol-sidecar:4317
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - kernel_cache:/root/.cache/deep_gemm
    environment:
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OPENBLAS_L2_SIZE=2097152
      - NCCL_DEBUG=WARN
      - SGLANG_ENABLE_SPEC_V2=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3","4","5","6","7"]
              capabilities: [gpu]
    restart: unless-stopped
    stop_grace_period: 5m
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "sglang", "service": "sglang", "tags":["model:zai-org/GLM-5.1-FP8","ip:${HOST_IP}","port:8000"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-sg-glm51:8000/metrics", "histogram_buckets_as_distributions": true, "metrics":["sglang:*"], "service": "glm-5.1", "tags":["model:zai-org/GLM-5.1-FP8","ip:${HOST_IP}","port:8000"]}]'

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-exporter
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:zai-org/GLM-5.1-FP8","deployment:GLM-5.1","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:zai-org/GLM-5.1-FP8","deployment:GLM-5.1","ip:${HOST_IP}"]}]'

  # --- Trial telemetry sidecar (Grafana Cloud + Better Stack OTLP fanout) ---
  # Receives SGLang request traces via OTLP/gRPC :4317, scrapes the SGLang
  # :8000/metrics and dcgm-exporter :9400/metrics endpoints, fans everything
  # out to both trial vendors using the same OTLP endpoints + tokens as the
  # host-side otelcol-contrib (cvm-ansible-playbooks PR #270/#271).
  #
  # Trust note: Grafana / Better Stack ingest tokens (not query) live inside
  # this CVM as env vars. Worst case is spurious data into trial accounts; no
  # query/admin access. Removing this service is the disable path.
  #
  # If trial vars are missing/blank at deploy time the sidecar will start
  # with empty endpoints and otelcol-contrib will fail with "endpoint must
  # be a valid URL" in its own logs — `restart: unless-stopped` crash-loops
  # only the sidecar, the inference path is unaffected.
  otelcol-sidecar:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: otelcol-sidecar
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      - HOST_IP=${HOST_IP}
      - GRAFANA_OTEL_ENDPOINT=${GRAFANA_OTEL_ENDPOINT}
      - GRAFANA_OTEL_AUTH=${GRAFANA_OTEL_AUTH}
      - BETTERSTACK_OTEL_ENDPOINT=${BETTERSTACK_OTEL_ENDPOINT}
      - BETTERSTACK_OTEL_TOKEN=${BETTERSTACK_OTEL_TOKEN}
    configs:
      - source: otelcol_config
        target: /etc/otelcol-contrib/config.yaml
        mode: 0640
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source": "otelcol-contrib", "service": "otelcol-sidecar", "tags":["deployment:glm-5.1","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  huggingface_cache:
  kernel_cache:
  certs:
    external: true
    name: certs


configs:
  otelcol_config:
    content: |
      # Trial telemetry sidecar — fans SGLang traces + SGLang/DCGM metrics
      # out to Grafana Cloud + Better Stack via OTLP/HTTP. Mirrors the
      # exporters used by the host-side otelcol-contrib (cvm-ansible-playbooks
      # templates/otelcol_trial.yaml.j2) so both legs of the trial pipeline
      # receive identical fanout.
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        prometheus:
          config:
            scrape_configs:
              - job_name: sglang
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-glm51:8000']
                    labels: {model: 'zai-org/GLM-5.1-FP8'}
              - job_name: dcgm
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-exporter:9400']
                    labels: {model: 'zai-org/GLM-5.1-FP8'}
              - job_name: otel-self
                scrape_interval: 30s
                static_configs:
                  - targets: ['127.0.0.1:8888']

      processors:
        # Must be first in every pipeline; protects the collector under burst
        # traffic. Numbers mirror the host-side template.
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        # host.name is hardcoded to match the host collector's
        # `{{ inventory_hostname }}` (PR-A). gpu07 is the default GLM-5.1
        # trial target per CLAUDE.md's host inventory; if deploying to a
        # different GLM-5.1 host (gpu03, gpu04, gpu13, gpu30) update both
        # host.name and trial.cohort accordingly.
        resource:
          attributes:
            - {key: host.name,              value: gpu07,                            action: insert}
            - {key: host.ip,                value: "$${env:HOST_IP}",                action: insert}
            - {key: service.namespace,      value: near-ai-inference,                action: insert}
            - {key: deployment.environment, value: trial,                            action: insert}
            - {key: trial.cohort,           value: gpu07-glm5-1,                     action: insert}

        batch:
          send_batch_size: 8192
          timeout: 5s

      exporters:
        otlphttp/grafana:
          endpoint: $${env:GRAFANA_OTEL_ENDPOINT}
          headers:
            Authorization: $${env:GRAFANA_OTEL_AUTH}

        otlphttp/betterstack:
          endpoint: $${env:BETTERSTACK_OTEL_ENDPOINT}
          headers:
            Authorization: "Bearer $${env:BETTERSTACK_OTEL_TOKEN}"

      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/grafana, otlphttp/betterstack]

          metrics:
            receivers: [otlp, prometheus]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/grafana, otlphttp/betterstack]

        telemetry:
          metrics:
            address: 127.0.0.1:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      REGISTERED=false
      FAILURE_COUNT=0
      MAX_RETRIES=3

      register_endpoint() {
        echo "Registering endpoint $$1 with routing port $$2"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}"
      }

      unregister_endpoint() {
        echo "Unregistering endpoint $$1"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}"
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}"
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      # 1-token completion health check directly to model container (no auth needed)
      check_inference() {
        echo "Performing health check on model endpoint..."
        curl -sSf --max-time 45 -X POST "http://model-sg-glm51:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d '{"model":"zai-org/GLM-5.1-FP8","messages":[{"role":"user","content":"hi"}],"max_tokens":1}'
      }

      # Probe the host-published nginx port via HOST_IP instead of the
      # "proxy-nginx" compose DNS name. A stale/abandoned docker service-name
      # resolution (e.g. after proxy-nginx is recreated) otherwise wedges this
      # readiness gate forever and silently drops the model to 0 backends.
      # Bounded + loud so a persistent probe failure falls through to the
      # registration loop (which health-checks each backend directly) instead
      # of hanging here forever. See cvm-compose-files#57.
      READY_URL="http://$${HOST_IP}:8000/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway (each backend is health-checked directly before registering)"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "Model ready, starting registration loop"

      while true; do
        # Liveness marker for the container healthcheck (see service def).
        date +%s > /tmp/registrar_alive
        if check_inference; then
          FAILURE_COUNT=0
          register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
          register_model "zai-org/GLM-5.1-FP8" "glm-5-1.completions.near.ai"
          if [ "$$REGISTERED" = false ]; then
            echo "[GLM-5.1] Registered zai-org/GLM-5.1-FP8 at $$ENDPOINT"
          fi
          REGISTERED=true
        else
          FAILURE_COUNT=$$((FAILURE_COUNT + 1))
          echo "[GLM-5.1] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
          if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
            echo "[GLM-5.1] Health check failed and Retry limit reached, unregistering $$ENDPOINT"
            unregister_endpoint "$$ENDPOINT"
            REGISTERED=false
            echo "[GLM-5.1] Exiting to refresh DNS (container will auto-restart)"
            exit 1
          fi
        fi
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      server {
          listen 80 default_server;

          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;

          location / {
              proxy_pass http://proxy-glm51:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }

      server {
          listen 443 ssl http2;
          server_name glm-5-1.completions.near.ai;

          ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;

          # Keep H2 connections from cloud-api alive across long idle gaps so the
          # bucket-pinned TCP connection survives between chats. Without this,
          # nginx defaults (75s idle, 1000 req/conn) close the connection and the
          # next request opens a new TCP via model-proxy's L4 LB → may land on a
          # different backend → signature 404. Pairs with cloud-api H2 keepalive
          # PINGs (http2_keep_alive_while_idle).
          keepalive_timeout 1h;
          keepalive_requests 1000000;

          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;

          location / {
              proxy_pass http://proxy-glm51:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
