x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-vllm-healthcheck: &vllm-healthcheck
  test: ["CMD-SHELL", "curl -sf --max-time 10 -X POST http://localhost:8000/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\":\"deepseek-ai/DeepSeek-V3.1\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}'"]
  interval: 60s
  timeout: 15s
  retries: 5
  start_period: 3600s

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
  healthcheck: *vllm-healthcheck
  restart: unless-stopped
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:4f6024bf0964d2a5568ca176913ad3ce9cf3bf63804e1361b7bcaa41b2cd4ecf
  user: root
  privileged: true
  <<: *nvidia
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

services:
  model-downloader:
    image: python:3.11-slim
    container_name: model-downloader
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        pip install -q huggingface_hub[hf_xet] 2>/dev/null
        echo "Downloading deepseek-ai/DeepSeek-V3.1..."
        huggingface-cli download deepseek-ai/DeepSeek-V3.1
        echo "Download complete."
    volumes:
      - hugginface_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HF_HUB_DISABLE_XET=1
    logging: *logging-conf

  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:80"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  autoheal:
    image: willfarrell/autoheal@sha256:4f7e11814c41ca47c3a3f38544875bc5bf1ed383e12b86047250e6dd7f7153a4
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=3600
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *logging-conf

  vllm-proxy-deepseek:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-deepseek
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - LOG_FORMAT=json
      - MODEL_NAME=deepseek-ai/DeepSeek-V3.1
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://vllm-deepseek:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:deepseek-ai/DeepSeek-V3.1", "ip:${HOST_IP}", "port:8000"]}]'

  vllm-deepseek:
    <<: *vllm-common
    image: vllm/vllm-openai@sha256:0dc46f74eb0e630675d83101dc66c6441c4475cceedcf9235ee42b87c3affd23  # v0.17.1
    container_name: vllm-deepseek
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    command: >
        deepseek-ai/DeepSeek-V3.1
        --tensor-parallel-size 8
        --max-model-len 131072
        --max-num-batched-tokens 32768
        --max-num-seqs 64
        --all2all-backend deepep_low_latency
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 1}'
        --trust-remote-code
        --enable-auto-tool-choice
        --tool-call-parser deepseek_v31
        --reasoning-parser deepseek_v3
        --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
        --port 8000
        --host 0.0.0.0
        --enable-prompt-tokens-details
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_LOGGING_LEVEL=WARNING
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OPENBLAS_L2_SIZE=2097152
      - NCCL_DEBUG=WARN
      - VLLM_CACHE_ROOT=/root/.cache/vllm
      - VLLM_RPC_TIMEOUT=60000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3","4","5","6","7"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "vllm", "service": "vllm", "tags":["model:deepseek-ai/DeepSeek-V3.1","ip:${HOST_IP}", "port:8000"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-deepseek:8000/metrics", "service": "vllm-deepseek", "tags":["model:deepseek-ai/DeepSeek-V3.1","ip:${HOST_IP}", "port:8000"]}]'

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-exporter
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:deepseek-ai/DeepSeek-V3.1","deployment:DeepSeek-V3.1","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:deepseek-ai/DeepSeek-V3.1","deployment:DeepSeek-V3.1","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  hugginface_cache:
  vllm_cache:
  certs:
    external: true
    name: certs

configs:
  nginx_conf:
    content: |
      server {
          listen 80 default_server;

          client_max_body_size 100m;

          location / {
              proxy_pass http://vllm-proxy-deepseek:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }

      server {
          listen 443 ssl;
          server_name deepseek-v31.completions.near.ai;

          ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;

          client_max_body_size 100m;

          location / {
              proxy_pass http://vllm-proxy-deepseek:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      REGISTERED=false

      log() { echo "[$$( date -u '+%Y-%m-%dT%H:%M:%SZ' )] $$*"; }

      timed_curl() {
        local label="$$1"; shift
        local start=$$(date +%s)
        curl "$$@" 2>&1
        local rc=$$?
        local dur=$$(( $$(date +%s) - start ))
        if [ $$rc -ne 0 ]; then
          log "WARN $$label failed: curl exit=$$rc duration=$${dur}s"
        elif [ $$dur -gt 5 ]; then
          log "SLOW $$label took $${dur}s"
        fi
        return $$rc
      }

      register_endpoint() {
        timed_curl "register_endpoint($$1)" -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}" || true
      }

      unregister_endpoint() {
        timed_curl "unregister_endpoint($$1)" -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        timed_curl "register_model($$1)" -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        log "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      check_inference() {
        timed_curl "check_inference(deepseek)" -sf --max-time 15 -X POST "http://vllm-deepseek:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d '{"model":"deepseek-ai/DeepSeek-V3.1","messages":[{"role":"user","content":"hi"}],"max_tokens":1}' \
          > /dev/null
      }

      log "Starting registrar for $$ENDPOINT"
      log "PROXY_URL=$$PROXY_URL TOKEN_SET=$$([ -n \"$$TOKEN\" ] && echo yes || echo NO)"
      log "DNS: $$(nslookup completions.near.ai 2>&1 | grep -i address || echo 'nslookup not available')"

      log "Waiting for model to be ready..."
      until curl -sf --max-time 5 http://nginx:80/v1/models > /dev/null 2>&1; do sleep 30; done
      log "Model ready, starting registration loop"

      log "Testing proxy connectivity..."
      timed_curl "startup_health" -sS --max-time 15 "$$PROXY_URL/health" || true

      while true; do
        if check_inference; then
          register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
          register_model "deepseek-ai/DeepSeek-V3.1" "deepseek-v31.completions.near.ai"
          if [ "$$REGISTERED" = false ]; then
            log "Registered deepseek-ai/DeepSeek-V3.1 at $$ENDPOINT"
          fi
          REGISTERED=true
        else
          if [ "$$REGISTERED" = true ]; then
            log "Health check failed, unregistering $$ENDPOINT"
            unregister_endpoint "$$ENDPOINT"
            REGISTERED=false
          fi
        fi
        sleep 60
      done
