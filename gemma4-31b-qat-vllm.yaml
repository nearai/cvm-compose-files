networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  huggingface_cache:
  vllm_cache:
  workspace_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        filelog/docker_containers:
          include: [/var/lib/docker/containers/*/*-json.log]
          start_at: end
          storage: file_storage
          include_file_path: true
          operators:
            - type: json_parser
              parse_from: body
              parse_to: attributes
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
              on_error: send_quiet
            - type: move
              from: attributes.log
              to: body
              if: 'attributes.log != nil'
            - type: move
              from: attributes.stream
              to: attributes["log.iostream"]
              if: 'attributes.stream != nil'
            - type: remove
              field: attributes.time
              if: 'attributes.time != nil'
            - type: regex_parser
              parse_from: attributes["log.file.path"]
              regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model:(?P<model>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model_path:(?P<model_path>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'precision:(?P<precision>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'deployment:(?P<deployment>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'env:(?P<env>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'host:(?P<host>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'ip:(?P<ip>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'port:(?P<port>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'instance:(?P<instance>[^",\]]+)'
              on_error: send_quiet
            - type: add
              field: attributes["service.name"]
              value: cvm-docker

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: inference-proxy-proxy-gemma4-qat-vllm
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-gemma4-qat-vllm:8000']
                    labels:
                      service: "vllm-proxy"
                      container_name: "proxy-gemma4-qat-vllm"
                      model: "google/gemma-4-31B-it"
                      deployment: "gemma4-31b-qat-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "${HTTP_PORT:-8000}"
                      model_path: "google/gemma-4-31B-it-qat-w4a16-ct"
                      precision: "w4a16"
              - job_name: vllm-model-vllm-gemma4-qat-1
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-vllm-gemma4-qat-1:8000']
                    labels:
                      service: "vllm"
                      container_name: "model-vllm-gemma4-qat-1"
                      model: "google/gemma-4-31B-it"
                      deployment: "gemma4-31b-qat-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      model_path: "google/gemma-4-31B-it-qat-w4a16-ct"
                      precision: "w4a16"
                      instance: "1"
              - job_name: vllm-model-vllm-gemma4-qat-2
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-vllm-gemma4-qat-2:8000']
                    labels:
                      service: "vllm"
                      container_name: "model-vllm-gemma4-qat-2"
                      model: "google/gemma-4-31B-it"
                      deployment: "gemma4-31b-qat-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      model_path: "google/gemma-4-31B-it-qat-w4a16-ct"
                      precision: "w4a16"
                      instance: "2"
              - job_name: vllm-model-vllm-gemma4-qat-3
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-vllm-gemma4-qat-3:8000']
                    labels:
                      service: "vllm"
                      container_name: "model-vllm-gemma4-qat-3"
                      model: "google/gemma-4-31B-it"
                      deployment: "gemma4-31b-qat-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      model_path: "google/gemma-4-31B-it-qat-w4a16-ct"
                      precision: "w4a16"
                      instance: "3"
              - job_name: vllm-model-vllm-gemma4-qat-4
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-vllm-gemma4-qat-4:8000']
                    labels:
                      service: "vllm"
                      container_name: "model-vllm-gemma4-qat-4"
                      model: "google/gemma-4-31B-it"
                      deployment: "gemma4-31b-qat-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      model_path: "google/gemma-4-31B-it-qat-w4a16-ct"
                      precision: "w4a16"
                      instance: "4"
              - job_name: dcgm-dcgm-gemma4-qat-vllm
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-gemma4-qat-vllm:9400']
                    labels:
                      service: "dcgm-exporter"
                      container_name: "dcgm-gemma4-qat-vllm"
                      model: "google/gemma-4-31B-it"
                      deployment: "gemma4-31b-qat-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "9400"
                      model_path: "google/gemma-4-31B-it-qat-w4a16-ct"
                      precision: "w4a16"

        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        transform/docker_metadata:
          error_mode: ignore
          log_statements:
            - context: log
              statements:
                - set(attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                - set(attributes["service.name"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["log.source"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["container.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil

        filter/app_logs:
          error_mode: ignore
          logs:
            log_record:
              - 'attributes["model"] == nil and attributes["deployment"] == nil'
              - 'attributes["service.name"] == "compose-manager"'
              - 'attributes["service.name"] == "compose-manager-launcher"'
              - 'attributes["service.name"] == "otelcol-management"'
              - 'attributes["service.name"] == "otelcol-contrib"'
              - 'attributes["service.name"] == "datadog-agent"'

        groupbyattrs/docker_service:
          keys:
            - service.name
            - container.name
            - log.source
            - log.iostream
            - model
            - model_path
            - precision
            - deployment
            - env
            - host
            - ip
            - port
            - instance

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          logs/app:
            receivers: [filelog/docker_containers]
            processors: [memory_limiter, resource, transform/docker_metadata, filter/app_logs, groupbyattrs/docker_service, batch]
            exporters: [otlphttp/gateway]
          metrics/app:
            receivers: [prometheus/apps]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/self:
            receivers: [prometheus/self]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
        telemetry:
          metrics:
            address: localhost:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      REGISTERED=false
      FAILURE_COUNT=0
      MAX_RETRIES=3

      register_endpoint() {
        echo "Registering endpoint $$1 with routing port $$2"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}" || true
      }

      unregister_endpoint() {
        echo "Unregistering endpoint $$1"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      mark_registered() {
        register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
        register_model "google/gemma-4-31B-it" "gemma-4-31b.completions.near.ai"
        if [ "$$REGISTERED" = false ]; then
          echo "[gemma4-31b-qat-vllm] Registered google/gemma-4-31B-it (QAT W4A16 weights, vLLM, 4x TP1) at $$ENDPOINT"
        fi
        REGISTERED=true
      }

      # Per-replica 1-token probe (no auth needed). Return codes:
      #   0: replica accepted the probe
      #   2: replica alive but saturated/backpressuring (HTTP 503 or curl 52/56)
      #   1: replica unhealthy/unreachable
      check_chat() {
        status=$$(curl -sS --connect-timeout 10 --max-time 45 -o /dev/null -w "%{http_code}" \
          -X POST "http://$$1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$2\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}")
        curl_status=$$?
        if [ "$$curl_status" -ne 0 ]; then
          case "$$curl_status" in
            52|56)
              echo "[gemma4-31b-qat-vllm] $$1: connection backpressure (curl $$curl_status); alive but saturated"
              return 2 ;;
          esac
          echo "[gemma4-31b-qat-vllm] $$1: probe curl failed (status $$curl_status)"
          return 1
        fi
        case "$$status" in
          2*) return 0 ;;
          503)
            echo "[gemma4-31b-qat-vllm] $$1: HTTP 503; alive but saturated"
            return 2 ;;
          *)
            echo "[gemma4-31b-qat-vllm] $$1: HTTP $$status"
            return 1 ;;
        esac
      }

      # Aggregate all replicas: unhealthy if any replica is down; saturated if any
      # replica is saturated (none down); otherwise ok. Saturated keeps the endpoint
      # registered so a busy-but-healthy host is not dropped from rotation.
      check_inference() {
        echo "Performing health check on all replicas..."
        check_chat model-vllm-gemma4-qat-1 "google/gemma-4-31B-it"; s1=$$?
        check_chat model-vllm-gemma4-qat-2 "google/gemma-4-31B-it"; s2=$$?
        check_chat model-vllm-gemma4-qat-3 "google/gemma-4-31B-it"; s3=$$?
        check_chat model-vllm-gemma4-qat-4 "google/gemma-4-31B-it"; s4=$$?
        if [ "$$s1" -eq 1 ] || [ "$$s2" -eq 1 ] || [ "$$s3" -eq 1 ] || [ "$$s4" -eq 1 ]; then return 1; fi
        if [ "$$s1" -eq 2 ] || [ "$$s2" -eq 2 ] || [ "$$s3" -eq 2 ] || [ "$$s4" -eq 2 ]; then return 2; fi
        return 0
      }

      READY_URL="http://$${HOST_IP}:$${HTTP_PORT}/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "Model ready, starting registration loop"

      while true; do
        date +%s > /tmp/registrar_alive
        check_inference
        health_status=$$?
        case "$$health_status" in
          0)
            FAILURE_COUNT=0
            mark_registered
            ;;
          2)
            FAILURE_COUNT=0
            echo "[gemma4-31b-qat-vllm] Keeping $$ENDPOINT registered while a replica is saturated"
            mark_registered
            ;;
          *)
            FAILURE_COUNT=$$((FAILURE_COUNT + 1))
            echo "[gemma4-31b-qat-vllm] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
            if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
              echo "[gemma4-31b-qat-vllm] Retry limit reached, unregistering $$ENDPOINT"
              unregister_endpoint "$$ENDPOINT"
              REGISTERED=false
              echo "[gemma4-31b-qat-vllm] Exiting to refresh DNS (container will auto-restart)"
              exit 1
            fi
            ;;
        esac
        date +%s > /tmp/registrar_alive
        sleep 60
      done

  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      server {
          listen 80 default_server;

          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;

          location / {
              proxy_pass http://proxy-gemma4-qat-vllm:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }

      server {
          listen 443 ssl http2;
          server_name gemma-4-31b.completions.near.ai
                      ~^gemma-4-31b-i\d+\.completions\.near\.ai$$;

          ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;

          keepalive_timeout 1h;
          keepalive_requests 1000000;

          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;

          location / {
              proxy_pass http://proxy-gemma4-qat-vllm:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
