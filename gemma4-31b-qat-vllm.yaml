x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  image: vllm/vllm-openai@sha256:953d3a06d5e64ab582985cd7401289d3abf2a2c14ef2158e9a84313daeec77d7
  depends_on:
    model-downloader:
      condition: service_completed_successfully
  volumes:
    - huggingface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
    - workspace_cache:/workspace-cache
  environment: &vllm-env
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - VLLM_CACHE_ROOT=/root/.cache/vllm/gemma4-31b-qat-vllm
    - VLLM_WORKER_MULTIPROC_METHOD=spawn
    - TORCHINDUCTOR_CACHE_DIR=/workspace-cache/torchinductor
    - TRITON_CACHE_DIR=/workspace-cache/triton
    - XDG_CACHE_HOME=/workspace-cache
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - VLLM_MEDIA_URL_ALLOW_REDIRECTS=0
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:fe037f0061fc61fbdcf80efde534b8700f9f54f18b8a39e290263b3e1b0c00e1
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-downloader-common: &downloader-common
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
  entrypoint: ["sh", "-c"]
  restart: "no"
  logging: *logging-conf

x-dcgm-common: &dcgm-common
  image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
  runtime: nvidia
  cap_add:
    - SYS_ADMIN
  restart: unless-stopped
  logging: *logging-conf

x-gemma4-qat-common: &gemma4-qat-common
  <<: *vllm-common
  # Official Gemma 4 QAT compressed-tensors checkpoint. vLLM auto-detects
  # W4A16 quantization and infers the full 262144-token context.
  # Limit remote media fetches so broken public social-media URLs fail
  # validation before vLLM attempts a fetch and returns retryable 500s.
  command: >
    google/gemma-4-31B-it-qat-w4a16-ct
    --revision ca9d5250d08695be35f2d632b434938b6d4aecfe
    --served-model-name google/gemma-4-31B-it
    --tensor-parallel-size 2
    --gpu-memory-utilization 0.80
    --trust-remote-code
    --tool-call-parser gemma4
    --enable-auto-tool-choice
    --allowed-media-domains ${VLLM_ALLOWED_MEDIA_DOMAINS:-prod-files-secure.s3.us-west-2.amazonaws.com}
    --host 0.0.0.0
    --port 8000

services:
  model-downloader:
    <<: *downloader-common
    container_name: model-downloader
    command:
      - |
        set -e
        echo "Downloading google/gemma-4-31B-it-qat-w4a16-ct..."
        uvx --from 'huggingface_hub[hf_xet]' hf download google/gemma-4-31B-it-qat-w4a16-ct --revision ca9d5250d08695be35f2d632b434938b6d4aecfe
        echo "Download complete."
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}

  proxy-nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: proxy-nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "${HTTP_PORT:-8000}:80"
      - "${TLS_PORT:-8444}:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      # Unhealthy if the registration loop hasn't ticked in 3m. See cvm-compose-files#57.
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  proxy-gemma4-qat-vllm:
    <<: *vllm-proxy-common
    container_name: proxy-gemma4-qat-vllm
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=google/gemma-4-31B-it
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BACKEND_URLS=http://model-vllm-gemma4-qat-1:8000,http://model-vllm-gemma4-qat-2:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}","port:${HTTP_PORT:-8000}"]}]'

  model-vllm-gemma4-qat-1:
    <<: *gemma4-qat-common
    container_name: model-vllm-gemma4-qat-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"vllm","service":"vllm","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}","port:8000","instance:1"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-gemma4-qat-1:8000/metrics","histogram_buckets_as_distributions":true,"service":"model-vllm-gemma4-qat-1","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}","port:8000","instance:1"]}]'

  model-vllm-gemma4-qat-2:
    <<: *gemma4-qat-common
    container_name: model-vllm-gemma4-qat-2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"vllm","service":"vllm","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}","port:8000","instance:2"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-gemma4-qat-2:8000/metrics","histogram_buckets_as_distributions":true,"service":"model-vllm-gemma4-qat-2","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}","port:8000","instance:2"]}]'

  dcgm-gemma4-qat-vllm:
    <<: *dcgm-common
    container_name: dcgm-gemma4-qat-vllm
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://%%host%%:9400/metrics","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source":"dcgm-exporter","service":"dcgm-exporter","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  huggingface_cache:
  vllm_cache:
  workspace_cache:
  certs:
    external: true
    name: certs

configs:
  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      REGISTERED=false
      FAILURE_COUNT=0
      MAX_RETRIES=3

      register_endpoint() {
        echo "Registering endpoint $$1 with routing port $$2"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}" || true
      }

      unregister_endpoint() {
        echo "Unregistering endpoint $$1"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      mark_registered() {
        register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
        register_model "google/gemma-4-31B-it" "gemma-4-31b.completions.near.ai"
        if [ "$$REGISTERED" = false ]; then
          echo "[gemma4-31b-qat-vllm] Registered google/gemma-4-31B-it (QAT W4A16 weights, vLLM, 2x TP2) at $$ENDPOINT"
        fi
        REGISTERED=true
      }

      # Per-replica 1-token probe (no auth needed). Return codes:
      #   0: replica accepted the probe
      #   2: replica alive but saturated/backpressuring (HTTP 503 or curl 52/56)
      #   1: replica unhealthy/unreachable
      check_chat() {
        status=$$(curl -sS --connect-timeout 10 --max-time 45 -o /dev/null -w "%{http_code}" \
          -X POST "http://$$1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$2\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}")
        curl_status=$$?
        if [ "$$curl_status" -ne 0 ]; then
          case "$$curl_status" in
            52|56)
              echo "[gemma4-31b-qat-vllm] $$1: connection backpressure (curl $$curl_status); alive but saturated"
              return 2 ;;
          esac
          echo "[gemma4-31b-qat-vllm] $$1: probe curl failed (status $$curl_status)"
          return 1
        fi
        case "$$status" in
          2*) return 0 ;;
          503)
            echo "[gemma4-31b-qat-vllm] $$1: HTTP 503; alive but saturated"
            return 2 ;;
          *)
            echo "[gemma4-31b-qat-vllm] $$1: HTTP $$status"
            return 1 ;;
        esac
      }

      # Aggregate both replicas: unhealthy if either is down; saturated if either
      # is saturated (none down); otherwise ok. Saturated keeps the endpoint
      # registered so a busy-but-healthy host is not dropped from rotation.
      check_inference() {
        echo "Performing health check on both replicas..."
        check_chat model-vllm-gemma4-qat-1 "google/gemma-4-31B-it"; s1=$$?
        check_chat model-vllm-gemma4-qat-2 "google/gemma-4-31B-it"; s2=$$?
        if [ "$$s1" -eq 1 ] || [ "$$s2" -eq 1 ]; then return 1; fi
        if [ "$$s1" -eq 2 ] || [ "$$s2" -eq 2 ]; then return 2; fi
        return 0
      }

      READY_URL="http://$${HOST_IP}:$${HTTP_PORT}/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "Model ready, starting registration loop"

      while true; do
        date +%s > /tmp/registrar_alive
        check_inference
        health_status=$$?
        case "$$health_status" in
          0)
            FAILURE_COUNT=0
            mark_registered
            ;;
          2)
            FAILURE_COUNT=0
            echo "[gemma4-31b-qat-vllm] Keeping $$ENDPOINT registered while a replica is saturated"
            mark_registered
            ;;
          *)
            FAILURE_COUNT=$$((FAILURE_COUNT + 1))
            echo "[gemma4-31b-qat-vllm] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
            if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
              echo "[gemma4-31b-qat-vllm] Retry limit reached, unregistering $$ENDPOINT"
              unregister_endpoint "$$ENDPOINT"
              REGISTERED=false
              echo "[gemma4-31b-qat-vllm] Exiting to refresh DNS (container will auto-restart)"
              exit 1
            fi
            ;;
        esac
        date +%s > /tmp/registrar_alive
        sleep 60
      done

  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      server {
          listen 80 default_server;

          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;

          location / {
              proxy_pass http://proxy-gemma4-qat-vllm:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }

      server {
          listen 443 ssl http2;
          server_name gemma-4-31b.completions.near.ai
                      ~^gemma-4-31b-i\d+\.completions\.near\.ai$$;

          ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;

          keepalive_timeout 1h;
          keepalive_requests 1000000;

          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;

          location / {
              proxy_pass http://proxy-gemma4-qat-vllm:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
