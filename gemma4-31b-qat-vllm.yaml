      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-gemma4-qat-2:8000/metrics","histogram_buckets_as_distributions":true,"service":"model-vllm-gemma4-qat-2","tags":["model:google/gemma-4-31B-it","model_path:google/gemma-4-31B-it-qat-w4a16-ct","precision:w4a16","deployment:gemma4-31b-qat-vllm","ip:${HOST_IP}","port:8000","instance:2"]}]'
