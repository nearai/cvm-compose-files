x-privacy-filter-common: &privacy-filter-common
  <<: *nvidia
  init: true
  image: privacy-filter-hf
  build:
    context: .
    dockerfile_inline: |
      # syntax=docker/dockerfile:1.4
      FROM pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
      RUN pip install --no-cache-dir \
          "transformers>=4.46" \
          accelerate \
          fastapi \
          "uvicorn[standard]"
      WORKDIR /app
      COPY <<'PYEOF' /app/server.py
      import os
      import sys
      import threading
      import time
      import torch
      from fastapi import FastAPI, HTTPException
      from pydantic import BaseModel, Field
      from transformers import AutoTokenizer, pipeline

      MODEL_ID = "openai/privacy-filter"
      MODEL_REVISION = "7ffa9a043d54d1be65afb281eddf0ffbe629385b"


      def _env(name, default, cast):
          # Tolerate absent/blank/garbage env so a typo can't crash-loop the boot.
          try:
              return cast(os.environ[name])
          except (KeyError, ValueError):
              return default


      # GPU 7 is shared with Qwen3-VL / FLUX / embeddings / reranker / whisper.
      # Left unbounded, the HF pipeline's CUDA caching allocator ratchets its
      # reserved memory up under traffic and never releases it, slowly hoarding the
      # card and starving the co-located models until they OOM (Qwen3-VL crash-loops).
      # Defence in depth (all tunable via env, no rebuild):
      #   * PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True (set in compose) is the
      #     root-cause fix — reserved segments can shrink again instead of ratcheting.
      #   * A watchdog returns idle cached blocks to the driver on an interval (never
      #     per request: empty_cache() is a synchronizing cudaFree that would stall
      #     the shared GPU) and hard-restarts the container if this process's VRAM
      #     ever climbs toward starving its neighbours — a real restart (clean reclaim)
      #     rather than silently serving 500s behind a still-healthy /v1/models probe.
      #   * An acute CUDA-OOM in a request also exits, for the same clean recycle.
      # The model accepts up to 128k tokens and uses O(n^2) attention, so ONE long
      # document alone reserves tens of GB (measured: ~13 GB over baseline at 16k
      # tokens, ~36 GB around 25-30k) and trips the watchdog / OOMs — PRIVACY_BATCH_SIZE
      # bounds the NUMBER of texts, not their LENGTH, so it never bounded this.
      # We still must not truncate (a privacy filter has to see the whole text), so
      # instead we cap the per-forward window: setting the pipeline tokenizer's
      # model_max_length makes the token-classification pipeline split a long input
      # into MAX_LENGTH-token chunks (STRIDE-token overlap so boundary spans survive),
      # classify each, and merge the spans back over the full text. Peak memory is then
      # bounded by ~BATCH_SIZE * MAX_LENGTH^2, INDEPENDENT of input length, while still
      # covering the whole document. Verified: chunked output is span-for-span identical
      # to a full single pass (0 PII lost) and peak stays flat as the doc grows.
      BATCH_SIZE = max(1, _env("PRIVACY_BATCH_SIZE", 8, int))
      MAX_LENGTH = max(8, _env("PRIVACY_MAX_LENGTH", 4096, int))
      STRIDE = max(0, min(_env("PRIVACY_STRIDE", 256, int), MAX_LENGTH - 1))
      GPU_MEM_LIMIT_GB = max(1.0, _env("GPU_MEM_LIMIT_GB", 32.0, float))
      WATCHDOG_INTERVAL_S = max(1.0, _env("WATCHDOG_INTERVAL_S", 30.0, float))

      USE_CUDA = torch.cuda.is_available()

      clf = pipeline(
          "token-classification",
          model=MODEL_ID,
          revision=MODEL_REVISION,
          aggregation_strategy="simple",
          device=0 if USE_CUDA else -1,
          torch_dtype=torch.bfloat16,
          trust_remote_code=True,
      )
      # Cap the pipeline's per-forward window. The pipeline chunks inputs longer than
      # this into model_max_length-token windows (see the classify() stride= arg below).
      clf.tokenizer.model_max_length = MAX_LENGTH
      # Separate tokenizer for usage counts only — left UNBOUNDED so input_tokens stays
      # accurate for the full text (it never truncates: truncation defaults to False).
      tokenizer = AutoTokenizer.from_pretrained(MODEL_ID, revision=MODEL_REVISION, trust_remote_code=True)


      def _gpu_watchdog():
          while True:
              time.sleep(WATCHDOG_INTERVAL_S)
              torch.cuda.empty_cache()
              reserved_gb = torch.cuda.memory_reserved(0) / 1024 ** 3
              if reserved_gb > GPU_MEM_LIMIT_GB:
                  sys.stderr.write(
                      "privacy-filter: reserved %.1f GB > %.1f GB limit; "
                      "exiting for a clean restart\n" % (reserved_gb, GPU_MEM_LIMIT_GB)
                  )
                  sys.stderr.flush()
                  os._exit(1)


      if USE_CUDA:
          threading.Thread(target=_gpu_watchdog, daemon=True).start()

      app = FastAPI()


      class ClassifyRequest(BaseModel):
          input: str | list[str]
          threshold: float = Field(default=0.0, ge=0.0, le=1.0)


      @app.get("/v1/models")
      def models():
          return {"object": "list", "data": [{"id": MODEL_ID, "object": "model"}]}

      def _merge_adjacent_spans(spans):
          if not spans:
              return spans

          merged = [spans[0]]
          for span in spans[1:]:
              prev = merged[-1]
              if span["category"] == prev["category"] and span["start"] == prev["end"]:
                  prev["end"] = span["end"]
                  prev["text"] = prev["text"] + span["text"]
                  prev["score"] = min(prev["score"], span["score"])
                  continue

              merged.append(span)
          return merged


      @app.post("/v1/privacy/classify")
      def classify(req: ClassifyRequest):
          texts = [req.input] if isinstance(req.input, str) else req.input
          if not texts or any(not isinstance(t, str) for t in texts):
              raise HTTPException(400, "input must be a non-empty string or list of strings")

          # The pipeline runs the forward under torch.no_grad() internally.
          try:
              raw = clf(texts, batch_size=BATCH_SIZE, stride=STRIDE)
          except torch.cuda.OutOfMemoryError:
              # Don't 500-storm behind a healthy /v1/models probe: recycle the
              # container so restart:unless-stopped reclaims the VRAM cleanly.
              torch.cuda.empty_cache()
              os._exit(1)

          # Single batched tokenize for usage counts instead of N sequential calls.
          tok_lens = [len(ids) for ids in tokenizer(texts).input_ids]

          data = []
          for i, spans in enumerate(raw):
              kept = [
                  {
                      "category": s["entity_group"],
                      "score": float(s["score"]),
                      "text": s["word"],
                      "start": int(s["start"]),
                      "end": int(s["end"]),
                  }
                  for s in spans
                  if float(s["score"]) >= req.threshold
              ]
              data.append(
                  {
                      "index": i,
                      "spans": _merge_adjacent_spans(kept),
                      "usage": {"input_tokens": tok_lens[i]},
                  }
              )

          return {"model": MODEL_ID, "data": data}
      PYEOF
      EXPOSE 8000
      CMD ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000"]
  volumes:
    - hugginface_cache:/root/.cache/huggingface
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # Root-cause fix for the VRAM leak: let the CUDA caching allocator shrink
    # reserved segments instead of ratcheting them up and hoarding the shared GPU.
    - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    # Watchdog/batch knobs consumed by server.py — tunable per host, no rebuild.
    # GPU_MEM_LIMIT_GB caps this process's blast radius on the 140 GB H200 (~10x
    # the classifier's footprint), leaving the rest for Qwen3-VL/FLUX/etc. With
    # chunking in place it is now a backstop, not the primary bound.
    - GPU_MEM_LIMIT_GB=32
    # MAX_LENGTH = per-forward token window; STRIDE = chunk overlap so spans on a
    # boundary aren't split. Peak VRAM ~ BATCH_SIZE * MAX_LENGTH^2, independent of
    # input length. BATCH_SIZE lowered 32->8 so the worst case (a 128k input = a
    # full batch of chunks) stays well under GPU_MEM_LIMIT_GB.
    - PRIVACY_BATCH_SIZE=8
    - PRIVACY_MAX_LENGTH=4096
    - PRIVACY_STRIDE=256
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["7"]
            capabilities: [gpu]

services:
  proxy-nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: proxy-nginx
    depends_on:
      - proxy-gpt-oss
      - proxy-qwen3-6-35b
      - proxy-gemma-4-31b
      - proxy-flux
      - proxy-qwen3-vl
      - proxy-qwen3-embeddings
      - proxy-qwen3-reranker
      - proxy-whisper3-large
      - proxy-privacy-filter
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
      - "8006:8006"
      - "8007:8007"
      - "8008:8008"
      - "8009:8009"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"proxy-nginx","tags":["model:openai/gpt-oss-120b","deployment:small-models","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      # Unhealthy if the registration loop hasn't ticked in 3m (e.g. wedged
      # before the loop, or the loop died). Surfaces silent registrar failures
      # in `docker ps` / Datadog. See cvm-compose-files#57.
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"model-proxy-registrar","service":"model-proxy-registrar","tags":["model:openai/gpt-oss-120b","deployment:small-models","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

  # --- GPT-OSS x3 (GPUs 0, 2, 3) — single proxy, multi-backend ---

  proxy-gpt-oss:
    <<: *vllm-proxy-common
    container_name: proxy-gpt-oss
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=openai/gpt-oss-120b
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BACKEND_URLS=http://model-vllm-gpt-oss-1:8000,http://model-vllm-gpt-oss-2:8000,http://model-vllm-gpt-oss-3:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:openai/gpt-oss-120b","deployment:small-models","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8001"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-gpt-oss"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "openai/gpt-oss-120b"
      nearai.otel.deployment: "small-models"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  model-vllm-gpt-oss-1:
    <<: *gpt-oss-common
    container_name: model-vllm-gpt-oss-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"vllm","service":"vllm","tags":["model:openai/gpt-oss-120b","deployment:small-models","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8001","instance:1"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-gpt-oss-1:8000/metrics", "histogram_buckets_as_distributions": true, "service": "model-vllm-gpt-oss-1", "tags":["model:openai/gpt-oss-120b","ip:${HOST_IP}", "port:8001"]}]'
      nearai.otel.scrape: "true"
