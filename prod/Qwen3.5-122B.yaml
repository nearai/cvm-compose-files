x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs,com.docker.compose.service"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:b183677a5d32267539b9b21ec45327a4f3be0a013afeb608c68c4d76e9472e36
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-sg-qwen35-122b-common: &sg-qwen35-122b-common
  <<: *nvidia
  init: true
  # SGLang v0.5.12 (cu129) — migrated off vLLM 2026-05-22.
  # Context dropped from 1.01M (yarn rope override) to native 262144.
  # EAGLE spec decoding enabled (Spec V2 default since 0.5.11).
  #
  # WEIGHTS: official block-wise FP8 (Qwen/Qwen3.5-122B-A10B-FP8) — switched from BF16 (2026-06-20).
  #   Near-lossless (Qwen: "nearly identical to original"; verified 5/5 on a temp=0 quality+needle probe),
  #   native H200 FP8 tensor-core compute, ~half the weight VRAM (~114GB vs ~232GB → ~28.5GB/GPU at TP4).
  #   Benchmarked at ~15k input (8xH200 CC, no-EAGLE arm — see note): FP8 vs BF16 at the SAME TP4 gave
  #   +20-22% system throughput (c64 18.3k vs 15.0k, c128 21.4k vs 17.5k tok/s) + ~15-20% lower TPOT.
  #   The freed VRAM also unlocks TP2 (FP8 fits 2xH200): a single TP2 replica holds ~90% of a TP4
  #   replica's c64 throughput within the P99 TTFT<15s SLO, so 4xTP2 replicas/node ~= 2x the aggregate
  #   node throughput of 2xTP4 (~66k vs ~30k tok/s). Consider migrating the deployment to TP2 x4 for
  #   max throughput (balance each replica to ~c64; per-replica P99 TTFT collapses by c128 on 2 GPUs).
  #   fp8 KV cache (line below) verified NON-corrupting on H200 — sglang #19603 is Blackwell-specific.
  #   NOTE: dev-box benchmarks ran on sglang :latest with EAGLE disabled, because the pinned v0.5.12-cu129
  #   image SIGILLs at init on the dev CVM's CPU and :latest has an EAGLE draft-path bug for Qwen3.5
  #   (eagle_worker_v2 cuda_graph_buffer shape mismatch). Validate the FP8 checkpoint on this exact
  #   v0.5.12-cu129 image (which prod runs fine) in staging before promoting.
  image: lmsysorg/sglang:v0.5.12-cu129@sha256:9e02c8e1fe2790a1c445bd5f6814305fe43639a4adb01c8ad1e8e21e750bf581
  command: >
      sglang serve
      --model-path Qwen/Qwen3.5-122B-A10B-FP8
      --revision a099dee70ccfcd8d5dda56aaa0b60cb8ecadabc9
      --tp 4
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --speculative-algorithm EAGLE
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --mamba-scheduler-strategy extra_buffer
      --kv-cache-dtype fp8_e4m3
      --mem-fraction-static 0.88
      --context-length 262144
      --num-continuous-decode-steps 5
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
      --enable-mixed-chunk
      --chunked-prefill-size 16384
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --trust-remote-code
      --log-requests-level 0
      --served-model-name Qwen/Qwen3.5-122B-A10B
  volumes:
    - huggingface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

services:
  model-downloader:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    container_name: model-downloader
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        echo "Downloading Qwen/Qwen3.5-122B-A10B-FP8..."
        uvx --from 'huggingface_hub[hf_xet]' hf download Qwen/Qwen3.5-122B-A10B-FP8 --revision a099dee70ccfcd8d5dda56aaa0b60cb8ecadabc9
        echo "Download complete."
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"model-downloader","service":"model-downloader","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    depends_on:
      - proxy-qwen35-122b
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:80"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"nginx","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      # Unhealthy if the registration loop hasn't ticked in 3m (e.g. wedged
      # before the loop, or the loop died). Surfaces silent registrar failures
      # in `docker ps` / Datadog. See cvm-compose-files#57.
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"model-proxy-registrar","service":"model-proxy-registrar","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

  # --- Single proxy for both backends ---

  proxy-qwen35-122b:
    <<: *vllm-proxy-common
    container_name: proxy-qwen35-122b
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.5-122B-A10B
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BACKEND_URLS=http://model-sg-qwen35-122b-fp8-tp4-r1:8000,http://model-sg-qwen35-122b-fp8-tp4-r2:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-qwen35-122b"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "Qwen/Qwen3.5-122B-A10B"
      nearai.otel.deployment: "Qwen3.5-122B"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  # --- Qwen3.5-122B-A10B instance 1 (GPUs 0-3) ---

  model-sg-qwen35-122b-fp8-tp4-r1:
    <<: *sg-qwen35-122b-common
    container_name: model-sg-qwen35-122b-fp8-tp4-r1
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"sglang","service":"sglang","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000","instance:1"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-sg-qwen35-122b-fp8-tp4-r1:8000/metrics", "metrics":["sglang:*"], "histogram_buckets_as_distributions": true, "service": "sglang", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "sglang"
      nearai.otel.service: "sglang"
      nearai.otel.source: "sglang"
      nearai.otel.container_name: "model-sg-qwen35-122b-fp8-tp4-r1"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "Qwen/Qwen3.5-122B-A10B"
      nearai.otel.deployment: "Qwen3.5-122B"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  # --- Qwen3.5-122B-A10B instance 2 (GPUs 4-7) ---

  model-sg-qwen35-122b-fp8-tp4-r2:
    <<: *sg-qwen35-122b-common
    container_name: model-sg-qwen35-122b-fp8-tp4-r2
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["4","5","6","7"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"sglang","service":"sglang","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8001","instance:2"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-sg-qwen35-122b-fp8-tp4-r2:8000/metrics", "metrics":["sglang:*"], "histogram_buckets_as_distributions": true, "service": "sglang", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8001"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "sglang"
      nearai.otel.service: "sglang"
      nearai.otel.source: "sglang"
      nearai.otel.container_name: "model-sg-qwen35-122b-fp8-tp4-r2"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "Qwen/Qwen3.5-122B-A10B"
      nearai.otel.deployment: "Qwen3.5-122B"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  dcgm-qwen35-122b:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-qwen35-122b
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source":"dcgm-exporter","service":"dcgm-exporter","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "dcgm"
      nearai.otel.service: "dcgm-exporter"
      nearai.otel.source: "dcgm-exporter"
      nearai.otel.container_name: "dcgm-qwen35-122b"
      nearai.otel.port: "9400"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "Qwen/Qwen3.5-122B-A10B"
      nearai.otel.deployment: "Qwen3.5-122B"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  otelcol-contrib:
    image: otel/opentelemetry-collector-contrib@sha256:85ac41c2db88d0df9bd6145e608a3cb023f5d8443868adbfbbf66efb51087917
    container_name: otelcol-contrib
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    user: "0:0"
    mem_limit: "768m"
    environment:
      - MONITORING_INGEST_TOKEN=${MONITORING_INGEST_TOKEN:-}
      - CVM_NAME=${CVM_NAME:-unknown}
      - CVM_HOST=${CVM_HOST:-unknown}
      - DD_HOSTNAME=${DD_HOSTNAME:-unknown}
      - ENV=${ENV:-unknown}
      - HOST_IP=${HOST_IP:-unknown}
    expose:
      - "4317"
      - "4318"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - otelcol_app_storage:/var/lib/otelcol-contrib
    configs:
      - source: otelcol_app_config
        target: /etc/otelcol-contrib/config.yaml
        mode: 0444
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      com.datadoghq.ad.logs: '[{"source":"otelcol-contrib","service":"otelcol-contrib","tags":["deployment:Qwen3.5-122B","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  huggingface_cache:
  kernel_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        filelog/docker_containers:
          include: [/var/lib/docker/containers/*/*-json.log]
          start_at: end
          storage: file_storage
          include_file_path: true
          operators:
            - type: json_parser
              parse_from: body
              parse_to: attributes
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
              on_error: send_quiet
            - type: move
              from: attributes.log
              to: body
              if: 'attributes.log != nil'
            - type: move
              from: attributes.stream
              to: attributes["log.iostream"]
              if: 'attributes.stream != nil'
            - type: remove
              field: attributes.time
              if: 'attributes.time != nil'
            - type: regex_parser
              parse_from: attributes["log.file.path"]
              regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model:(?P<model>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model_path:(?P<model_path>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'precision:(?P<precision>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'deployment:(?P<deployment>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'ip:(?P<ip>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'port:(?P<port>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'env:(?P<env>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'host:(?P<host>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'instance:(?P<instance>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'replica:(?P<replica>[^",\]]+)'
              on_error: send_quiet
            - type: add
              field: attributes["service.name"]
              value: cvm-docker

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: sglang-model-sg-qwen35-122b-fp8-tp4-r1
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-qwen35-122b-fp8-tp4-r1:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-qwen35-122b-fp8-tp4-r1"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "Qwen3.5-122B"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      instance: "1"
              - job_name: sglang-model-sg-qwen35-122b-fp8-tp4-r2
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-qwen35-122b-fp8-tp4-r2:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-qwen35-122b-fp8-tp4-r2"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "Qwen3.5-122B"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8001"
                      instance: "2"
              - job_name: dcgm-dcgm-qwen35-122b
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-qwen35-122b:9400']
                    labels:
                      service: "dcgm-exporter"
                      source: "dcgm-exporter"
                      container_name: "dcgm-qwen35-122b"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "Qwen3.5-122B"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "9400"
              - job_name: inference-proxy-proxy-qwen35-122b
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-qwen35-122b:8000']
                    labels:
                      service: "vllm-proxy"
                      source: "vllm-proxy"
                      container_name: "proxy-qwen35-122b"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "Qwen3.5-122B"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"

        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        transform/docker_metadata:
          error_mode: ignore
          log_statements:
            - context: log
              statements:
                - set(attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                - set(attributes["service.name"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["log.source"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["service"], attributes["service.name"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["service.name"] != nil
                - set(attributes["source"], attributes["log.source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["log.source"] != nil
                - set(attributes["container.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil

        filter/app_logs:
          error_mode: ignore
          logs:
            log_record:
              - 'attributes["model"] == nil and attributes["deployment"] == nil'
              - 'attributes["service.name"] == "compose-manager"'
              - 'attributes["service.name"] == "compose-manager-launcher"'
              - 'attributes["service.name"] == "otelcol-management"'
              - 'attributes["service.name"] == "otelcol-contrib"'
              - 'attributes["service.name"] == "datadog-agent"'

        groupbyattrs/docker_service:
          keys:
            - service.name
            - service
            - container.name
            - log.source
            - source
            - log.iostream
            - model
            - model_path
            - precision
            - deployment
            - env
            - host
            - ip
            - port
            - instance
            - replica

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          logs/app:
            receivers: [filelog/docker_containers]
            processors: [memory_limiter, resource, transform/docker_metadata, filter/app_logs, groupbyattrs/docker_service, batch]
            exporters: [otlphttp/gateway]
          metrics/app:
            receivers: [prometheus/apps]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/self:
            receivers: [prometheus/self]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
        telemetry:
          metrics:
            address: localhost:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      REGISTERED=false
      FAILURE_COUNT=0
      MAX_RETRIES=3

      register_endpoint() {
        echo "Registering endpoint $$1 with routing port $$2"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}"
      }

      unregister_endpoint() {
        echo "Unregistering endpoint $$1"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}"
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}"
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      mark_registered() {
        register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
        register_model "Qwen/Qwen3.5-122B-A10B" "qwen35-122b.completions.near.ai"
        if [ "$$REGISTERED" = false ]; then
          echo "[Qwen3.5-122B] Registered Qwen/Qwen3.5-122B-A10B at $$ENDPOINT"
        fi
        REGISTERED=true
      }

      # Health check directly on backend (no auth needed on raw sglang container).
      # Return codes:
      #   0: backend accepted the probe
      #   2: backend is alive but saturated/backpressuring new requests
      #   1: backend appears unhealthy/unreachable
      check_inference() {
        echo "Performing health check on backend..."
        status=$$(curl -sS --connect-timeout 10 --max-time 45 -o /dev/null -w "%{http_code}" \
          -X POST "http://model-sg-qwen35-122b-fp8-tp4-r1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d '{"model":"Qwen/Qwen3.5-122B-A10B","messages":[{"role":"user","content":"hi"}],"max_tokens":1}')
        curl_status=$$?

        if [ "$$curl_status" -ne 0 ]; then
          case "$$curl_status" in
            52|56)
              echo "[Qwen3.5-122B] Health probe hit connection-level backpressure (curl $$curl_status); treating as alive but saturated"
              return 2
              ;;
          esac
          echo "[Qwen3.5-122B] Health probe curl failed with status $$curl_status"
          return 1
        fi

        case "$$status" in
          2*)
            return 0
            ;;
          503)
            echo "[Qwen3.5-122B] Backend returned 503; treating as alive but saturated"
            return 2
            ;;
          *)
            echo "[Qwen3.5-122B] Backend returned HTTP $$status"
            return 1
            ;;
        esac
      }

      # Probe the host-published nginx port via HOST_IP instead of the
      # "nginx" compose DNS name. A stale/abandoned docker service-name
      # resolution (e.g. after nginx is recreated) otherwise wedges this
      # readiness gate forever and silently drops the model to 0 backends.
      # Bounded + loud so a persistent probe failure falls through to the
      # registration loop (which health-checks each backend directly) instead
      # of hanging here forever. See cvm-compose-files#57.
      READY_URL="http://$${HOST_IP}:8000/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway (each backend is health-checked directly before registering)"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "Model ready, starting registration loop"

      while true; do
        # Liveness marker for the container healthcheck (see service def).
        date +%s > /tmp/registrar_alive
        check_inference
        health_status=$$?
        case "$$health_status" in
          0)
            FAILURE_COUNT=0
            mark_registered
            ;;
          2)
            FAILURE_COUNT=0
            echo "[Qwen3.5-122B] Keeping $$ENDPOINT registered while backend is saturated"
            mark_registered
            ;;
          *)
            FAILURE_COUNT=$$((FAILURE_COUNT + 1))
            echo "[Qwen3.5-122B] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
            if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
              echo "[Qwen3.5-122B] Health check failed and Retry limit reached, unregistering $$ENDPOINT"
              unregister_endpoint "$$ENDPOINT"
              REGISTERED=false
              echo "[Qwen3.5-122B] Exiting to refresh DNS (container will auto-restart)"
              exit 1
            fi
            ;;
        esac
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      access_log /var/log/nginx/access.log json_combined;

      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;
      client_body_buffer_size 1m;

      # :80 — single proxy handles both backends
      server {
        listen 80 default_server;
        location / { proxy_pass http://proxy-qwen35-122b:8000; }
      }

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      server {
        listen 443 ssl http2;
        server_name qwen35-122b.completions.near.ai;
        # Keep H2 connections from cloud-api alive across long idle gaps so the
        # bucket-pinned TCP connection survives between chats. Without this,
        # nginx defaults (75s idle, 1000 req/conn) close the connection and the
        # next request opens a new TCP via model-proxy's L4 LB → may land on a
        # different backend → signature 404. Pairs with cloud-api H2 keepalive
        # PINGs (http2_keep_alive_while_idle).
        keepalive_timeout 1h;
        keepalive_requests 1000000;
        location / { proxy_pass http://proxy-qwen35-122b:8000; }
      }
