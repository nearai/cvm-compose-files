                    labels:
                      service: "vllm"
                      container_name: "vllm-gemma-4-31b-1"
                      model: "google/gemma-4-31B-it"
                      deployment: "dsv4-qwen36-gemma4"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
