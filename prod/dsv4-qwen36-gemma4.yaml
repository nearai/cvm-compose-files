x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs,com.docker.compose.service"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:24536a0cee15835621fa3edea499b0cb148f6ee4f815e6296470984372cc3b64
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-sglang-env:
  environment: &sglang-env
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1

x-dcgm-common: &dcgm-common
  image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
  runtime: nvidia
  cap_add:
    - SYS_ADMIN
  restart: unless-stopped
  logging: *logging-conf

x-dsv4-flash-common: &dsv4-flash-common
  <<: *nvidia
  init: true
  # TDX-CC incompatibilities trimmed:
  #   1. DeepEP+DP-attention: needs CUDA IPC across ranks (deep_ep.cpp:230
  #      'invalid argument') — dropped.
  #   2. Hierarchical cache w/ hicache_io_backend=direct + mem_layout=
  #      page_first_direct: uses GPUDirect/unified-memory paths that hit
  #      'cudaErrorNotSupported' on the first warmup tensor.to(non_blocking)
  #      under TDX-confidential GPU memory — dropped.
  image: lmsysorg/sglang@sha256:1c64fde976bdf0d56474a30bccbcfc19667e5b3ab34c826a534c9d6aaca41212  # 0.5.13.post1 — required for the FP4 --moe-runner-backend marlin path; was v0.5.12-cu129
  # Hidden-state passthrough (cloud-api#739 / inference-proxy#163) — OFF by default.
  # The gpu-manager toggles it at start via the DSV4_RETURN_HIDDEN_STATES env var,
  # spliced into /compose/up like GPT_OSS_CACHE_SUBPATH (see infra-docs compose-manager.md).
  # `${VAR:+...}` appends the flag whenever the var is set to ANY non-empty value:
  #   DSV4_RETURN_HIDDEN_STATES=1  -> --enable-return-hidden-states present  (feature ON)
  #   var unset / empty (default)  -> flag absent                            (feature OFF)
  # To turn OFF, UNSET the var and redeploy — setting it to "0" still counts as ON.
  # Only this DeepSeek service opts in; Qwen/Gemma on this host are unaffected.
  # Carries a measured throughput cost, so keep unset outside interp-research windows.
  command: >
      sglang serve
      --trust-remote-code
      --model-path deepseek-ai/DeepSeek-V4-Flash
      --revision 553034d7dd9e06c2eeaee68cf85a17d6d4754cf0
      --tp 2
      --moe-runner-backend marlin
      --cuda-graph-max-bs 64
      --mem-fraction-static 0.83
      --max-running-requests 64
      --schedule-conservativeness 1.3
      --disable-custom-all-reduce
      --tool-call-parser deepseekv4
      --reasoning-parser deepseek-v4
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --log-requests-level 0
      --served-model-name deepseek-ai/DeepSeek-V4-Flash
      ${DSV4_RETURN_HIDDEN_STATES:+--enable-return-hidden-states}
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1
    - SGLANG_DSV4_FP4_EXPERTS=1   # FP4 ckpt: experts ARE FP4 (marlin dequantizes). =0 forced the non-FP4 layout → load failure / invalid weights (PR #98 review)
    - SGLANG_ENABLE_UNIFIED_RADIX_TREE=1
    - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-qwen3-6-27b-common: &qwen3-6-27b-common
  <<: *nvidia
  init: true
