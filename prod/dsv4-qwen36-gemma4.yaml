        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        transform/docker_metadata:
          error_mode: ignore
          log_statements:
            - context: log
              statements:
                - set(attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                - set(attributes["service.name"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["log.source"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["container.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil

        filter/app_logs:
          error_mode: ignore
          logs:
            log_record:
              - 'attributes["model"] == nil and attributes["deployment"] == nil'
              - 'attributes["service.name"] == "compose-manager"'
              - 'attributes["service.name"] == "compose-manager-launcher"'
              - 'attributes["service.name"] == "otelcol-management"'
              - 'attributes["service.name"] == "otelcol-contrib"'
              - 'attributes["service.name"] == "datadog-agent"'

        groupbyattrs/docker_service:
          keys:
            - service.name
            - container.name
            - log.source
            - log.iostream
            - model
            - model_path
            - precision
            - deployment
            - env
            - host
            - ip
            - port
            - instance
            - replica

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          logs/app:
            receivers: [filelog/docker_containers]
            processors: [memory_limiter, resource, transform/docker_metadata, filter/app_logs, groupbyattrs/docker_service, batch]
            exporters: [otlphttp/gateway]
          metrics/app:
            receivers: [prometheus/apps]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/self:
            receivers: [prometheus/self]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
        telemetry:
          metrics:
            address: localhost:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      TLS_PORT=8444

      for port in 8000 8001 8002 8003; do
        eval "REG_$$port=false"
        eval "FAIL_COUNT_$$port=0"
      done

      register_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$TLS_PORT}" || true
      }

      unregister_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering all endpoints"
        for port in 8000 8001 8002 8003; do
          unregister_endpoint "$${HOST_IP}:$$port"
        done
        exit 0
      }
      trap cleanup TERM INT

      check_chat() {
        curl -sf --max-time 45 -X POST "http://$$1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$2\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}" \
          > /dev/null 2>&1
      }

      check_port() {
        case $$1 in
          8000) check_chat vllm-dsv4-flash "deepseek-ai/DeepSeek-V4-Flash" ;;
          8001) check_chat vllm-qwen3-6-27b "Qwen/Qwen3.6-27B-FP8" ;;
          8002)
            check_chat vllm-gemma-4-31b-1 "google/gemma-4-31B-it" &&
            check_chat vllm-gemma-4-31b-2 "google/gemma-4-31B-it"
            ;;
          8003) check_chat vllm-qwen3-6-35b-a3b "Qwen/Qwen3.6-35B-A3B-FP8" ;;
        esac
      }

      # Probe the host-published nginx port via HOST_IP instead of the
      # "nginx" compose DNS name. A stale/abandoned docker service-name
      # resolution (e.g. after nginx is recreated) otherwise wedges this
      # readiness gate forever and silently drops every model to 0 backends.
      # Bounded + loud so a persistent probe failure falls through to the
      # registration loop (which health-checks each backend directly) instead
      # of hanging here forever. See cvm-compose-files#57.
      READY_URL="http://$${HOST_IP}:8000/v1/models"
      echo "Waiting for first model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: first model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway (each backend is health-checked directly before registering)"
          break
        fi
        echo "First model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "First model ready, starting registration loop"

      while true; do
        for port in 8000 8001 8002 8003; do
          # Liveness marker for the container healthcheck (see service def);
          # refreshed each port so a slow-but-progressing serial loop is not
          # falsely marked unhealthy. See cvm-compose-files#57.
          date +%s > /tmp/registrar_alive
          eval "was_reg=\$$REG_$$port"
          eval "fails=\$$FAIL_COUNT_$$port"
          if check_port $$port; then
            eval "FAIL_COUNT_$$port=0"
            register_endpoint "$${HOST_IP}:$$port" "$$TLS_PORT"
            if [ "$$was_reg" = false ]; then
              echo "Registered $${HOST_IP}:$$port"
            fi
            eval "REG_$$port=true"
          else
            fails=$$((fails + 1))
            eval "FAIL_COUNT_$$port=$$fails"
            echo "Health check failed for $${HOST_IP}:$$port (fail count: $$fails)"
            eval "REG_$$port=false"
          fi
        done

        register_model "deepseek-ai/DeepSeek-V4-Flash" "dsv4-flash.completions.near.ai"
        register_model "Qwen/Qwen3.6-27B-FP8" "qwen3-6-27b.completions.near.ai"
        register_model "google/gemma-4-31B-it" "gemma-4-31b.completions.near.ai"
        register_model "Qwen/Qwen3.6-35B-A3B-FP8" "qwen3-6-35b.completions.near.ai"
        # Refresh liveness after the register_model calls, before the long sleep.
        date +%s > /tmp/registrar_alive
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      access_log /var/log/nginx/access.log json_combined;

      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;
      client_body_buffer_size 1m;

      # :8000 - DeepSeek-V4-Flash
      server {
          listen 8000;
          location / { proxy_pass http://vllm-proxy-dsv4-flash:8000; }
      }

      # :8001 - Qwen3.6-27B-FP8
      server {
          listen 8001;
          location / { proxy_pass http://vllm-proxy-qwen3-6-27b:8000; }
      }

      # :8002 - Gemma-4-31B-it
      server {
          listen 8002;
          location / { proxy_pass http://vllm-proxy-gemma-4-31b:8000; }
      }

      # :8003 - Qwen3.6-35B-A3B-FP8
      server {
          listen 8003;
          location / { proxy_pass http://vllm-proxy-qwen3-6-35b-a3b:8000; }
      }

      # ── TLS server blocks (port 443 = host 8444) ──

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      # Each model accepts both its canonical SNI and the rotation-SNI form
      # `<canonical>-i<N>.completions.near.ai` used by cloud-api's discovery.
      # See nearai/infra#143 / nearai/model-proxy#30.

      server {
          listen 443 ssl http2;
          server_name dsv4-flash.completions.near.ai
                      ~^dsv4-flash-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-dsv4-flash:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name qwen3-6-27b.completions.near.ai
                      ~^qwen3-6-27b-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-qwen3-6-27b:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name gemma-4-31b.completions.near.ai
                      ~^gemma-4-31b-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-gemma-4-31b:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name qwen3-6-35b.completions.near.ai
                      qwen3-6-35b.completions-stg.near.ai
                      ~^qwen3-6-35b-i\d+\.completions(-stg)?\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-qwen3-6-35b-a3b:8000; }
      }
