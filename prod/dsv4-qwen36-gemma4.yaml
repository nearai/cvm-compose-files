networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  hugginface_cache:
  vllm_cache:
  kernel_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        filelog/docker_containers:
          include: [/var/lib/docker/containers/*/*-json.log]
          start_at: end
          storage: file_storage
          include_file_path: true
          operators:
            - type: json_parser
              parse_from: body
              parse_to: attributes
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
              on_error: send_quiet
            - type: move
              from: attributes.log
              to: body
              if: 'attributes.log != nil'
            - type: move
              from: attributes.stream
              to: attributes["log.iostream"]
              if: 'attributes.stream != nil'
            - type: remove
              field: attributes.time
              if: 'attributes.time != nil'
            - type: regex_parser
              parse_from: attributes["log.file.path"]
              regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model:(?P<model>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model_path:(?P<model_path>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'precision:(?P<precision>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'deployment:(?P<deployment>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'ip:(?P<ip>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'port:(?P<port>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'env:(?P<env>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'host:(?P<host>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'instance:(?P<instance>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'replica:(?P<replica>[^",\]]+)'
              on_error: send_quiet
            - type: add
              field: attributes["service.name"]
              value: cvm-docker

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: sglang-vllm-dsv4-flash-fp4
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['vllm-dsv4-flash:8000']
                    labels:
                      service: "sglang"
                      container_name: "vllm-dsv4-flash"
                      model: "deepseek-ai/DeepSeek-V4-Flash"
                      deployment: "dsv4-qwen36-gemma4"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "8000"
              - job_name: sglang-vllm-qwen3-6-27b
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['vllm-qwen3-6-27b:8000']
                    labels:
                      service: "sglang"
                      container_name: "vllm-qwen3-6-27b"
                      model: "Qwen/Qwen3.6-27B-FP8"
                      deployment: "dsv4-qwen36-gemma4"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      ip: "${HOST_IP}"
                      port: "8001"
              - job_name: sglang-vllm-qwen3-6-35b-a3b
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['vllm-qwen3-6-35b-a3b:8000']
                    labels:
                      service: "sglang"
                      container_name: "vllm-qwen3-6-35b-a3b"
                      model: "Qwen/Qwen3.6-35B-A3B-FP8"
                      deployment: "dsv4-qwen36-gemma4"
