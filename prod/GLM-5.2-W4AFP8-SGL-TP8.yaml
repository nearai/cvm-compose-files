# GLM-5.2-W4AFP8-SGL-TP8 — PhalaCloud/GLM-5.2-W4AFP8 (4-bit MoE) on SGLang, single TP8 (all 8 GPUs).
#
# 4-bit alternative to prod/GLM-5.2-SGL-FP8-TP8.yaml for the SAME model (z-ai/glm-5.2,
# glm-5-2.completions.near.ai). Deploy ONE or the other, not both, in a given fleet rotation.
# At ~HALF the weight memory (368GB W4AFP8 vs 755GB FP8 — routed experts INT4-g128 + FP8 act,
# AWQ-calibrated; dense/attn/shared-experts/MTP stay FP8/BF16) the freed VRAM lets this config
# serve the FULL 1M context at TP8, which the FP8 build (capped at 500K) cannot.
#
# *** LONG-CONTEXT TIER (dual-domain registration) ***
#   Alongside the 2xTP4 fleet (GLM-5.2-W4AFP8-SGL-2xTP4.yaml, ctx 262144), this TP8 host is
#   the 1M-context tier. It registers under TWO domains:
#     - glm-5-2.completions.near.ai       (standard pool member, via :8000 as before)
#     - glm-5-2-long.completions.near.ai  (long-context tier; cloud-api routes requests whose
#       estimated input exceeds the TP4 fleet's 262k window here, with Chutes as overflow)
#   The long domain is advertised through a discovery-only nginx stub on :8001 that reports the
#   SYNTHETIC model id "z-ai/glm-5.2-long". NEVER register the canonical id under the long
#   domain: model-proxy's model->domain map is one-domain-per-model-id, LAST-WRITER-WINS
#   (model-proxy src/registry.rs register_model_domain), so re-mapping z-ai/glm-5.2 would fight
#   the 2xTP4 registrars every cycle and flap routing for the whole fleet. The synthetic id
#   exists ONLY inside model-proxy discovery — SGLang, signing (KMS key path is keyed on
#   MODEL_NAME=z-ai/glm-5.2), attestation, billing, and the customer catalog all keep the
#   canonical id; traffic on both domains lands on the same nginx:8444 -> proxy-glm52 path.
#
# VALIDATED on the dev VM (8xH200, CC on; sglang 0.5.13.post1 — the staging soak target):
#   - QUALITY: 10/10 on a temp=0 suite (math/reasoning/code/instruction/JSON/multilingual),
#     output indistinguishable from the FP8 baseline. AWQ calibration holds (no degeneration).
#   - MTP / EAGLE: REQUIRES the MTP-fixed checkpoint (revision d975c19a — the earlier 1fc4ebaa
#     build shipped WITHOUT the MTP layers -> accept-len ~1, zero speedup). With it, accept-len
#     4.0->5.4 (accept-rate 0.6->0.88) at c=1 -> strong single-stream decode win.
#   - 1M CONTEXT: needle-in-haystack retrieved verbatim at 197K / 472K / 748K input tokens.
#
# *** CC STARTUP FIX: --disable-custom-all-reduce (REQUIRED under Confidential Computing) ***
#   Root cause: sglang's custom all-reduce kernel fails during CUDA-graph capture under CC/PPCIE
#   ("Capture cuda graph failed: Runtime check failed at .../distributed/custom_all_reduce.cu"
#   -> sigquit), because it uses direct peer-GPU memory access that PPCIE memory-encryption
#   blocks (same class as the DeepEP all-to-all PPCIE crash). --disable-custom-all-reduce falls
#   back to NCCL all-reduce, which works under CC. VERIFIED: with this flag the OPTIMAL path
#   (DeepGEMM + cudagraph both ON) boots end-to-end on 8xH200 CC, serves, and passes the 1M-ctx
#   + MTP checks. Do NOT use SGLANG_ENABLE_JIT_DEEPGEMM=0 / --disable-cuda-graph (throughput
#   floor) — they are unnecessary. Cold start is ~60 min (cudagraph capture ~840s + EAGLE
#   draft compile); persist it via the compile_cache volume to skip recompile on restart.
#
# IMAGE: lmsysorg/sglang@sha256:1c64fde9... = v0.5.13.post1 (validated here; the only engine/
# version PhalaCloud tested — carries the `w4afp8` quant path). The older 81abd2a6 image used
# by the FP8 config predates w4afp8 and will NOT serve this checkpoint.
#
# *** DIST-INIT FIX (--dist-init-addr 127.0.0.1:29500): ***
#   On the dstack bridge network, sglang's default distributed-init address resolves to
#   0.0.0.0, which the TP worker ranks cannot connect to -> c10d TCPStore times out after
#   600s ("trying to connect to (0.0.0.0, <port>)"). Forcing 127.0.0.1 makes the in-container
#   loopback rendezvous work. (Manual --network=host launches avoid this; compose uses the
#   bridge net, so the flag is required.)
#
# DeepEP + DP-attention high-throughput (sglang cookbook) is CC-INCOMPATIBLE: DeepEP's
# GPU-initiated all-to-all crashes under PPCIE ("deep_ep.cpp:230 invalid argument"). Do not use.
#
# *** CONFIG: EAGLE 3/1/4 + --mem-fraction-static 0.78 + --cuda-graph-max-bs 128 ***
#   The 0.80 baseline came from a full one-factor-at-a-time sweep (8xH200 CC, ~11.5k-in/1154-out
#   production shape, 1->256 concurrency). It Pareto-dominated the prior 5/1/6 + mf0.72:
#   throughput >= at every concurrency (c64/128/256 strictly higher; c256 +54%), TPOT lower
#   everywhere (122/138/200ms vs 138/161/306 at c32/c64/c256), +22% KV pool (965k->1.18M tokens,
#   still full 1M ctx), same SLO knee (~c32 at P99 TTFT 15s), quality unchanged (needle-PASS).
#   The EAGLE draft accepts ~3.1 tokens/step (vs ~1.9 at 1/1/2) — recovering deep-spec
#   throughput while the shallower 3-step draft keeps TPOT and capture cost down.
#
#   VRAM stability (the reason this file exists): the original #97 config (mem-frac 0.85,
#   no cuda-graph-max-bs) is VRAM-STARVED at 1M ctx + EAGLE + TP8 and crashes — main capture OOM,
#   EAGLE *draft* capture OOM (runs last, least free mem), and a runtime Xid 31 MMU fault under
#   the first ~15k-token prefill that takes down the whole TP8 group via NCCL HeartbeatMonitor.
#   (The 256-token validation that gated #97 never exercised production-shape prefill.) The fix
#   is headroom. mem-frac 0.80 was the validated baseline because 3/1/4's draft capture is light
#   (~6.6GB -> ~13GB free after capture); the crash needed 0.85 + 5/1/6's heavy ~9GB capture.
#   2026-07-02 canary: lower to 0.78 after live GLM-5.2 hit ~99% token usage and crashed, to give
#   runtime kernels/graph replay more workspace while preserving every other serving knob. Validated:
#   the prior 0.80 baseline boots clean + full 1->256 sweep at ~15k with 0 errors / no Xid.
#   cuda-graph-max-bs 128 = the sglang GLM-5.2 cookbook value (batches >128 run eager —
#   compute-bound anyway).
#
#   ALTERNATIVES (benchmarked, not chosen): 1/1/2 + mf0.80 = lowest TPOT (90ms@c32) but ~18%
#   less throughput — pick only if absolute inter-token latency dominates. --speculative-adaptive
#   CRASHES on this checkpoint (DSA-draft indexer fault when it switches to 7 steps). dp-attention
#   gives unreliable/high-variance tail latency under PPCIE — not recommended. chunked-prefill
#   size is neutral at 15k. Cold start ~35-45min (weight load + DeepGEMM warmup + capture);
#   persist the compile_cache volume to speed restarts.

x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs,com.docker.compose.service"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:b183677a5d32267539b9b21ec45327a4f3be0a013afeb608c68c4d76e9472e36
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

# Shared sglang args. PhalaCloud/GLM-5.2-W4AFP8 = 4-bit MoE (INT4-g128 routed experts + FP8
# act); --quantization w4afp8 + --disable-shared-experts-fusion are REQUIRED by the checkpoint.
# Single TP8, full 1M context, MTP/EAGLE on (strong single-stream win on the fixed checkpoint).
# Optimal kernels (DeepGEMM + cudagraph) ON — see the startup-issue note in the header.
x-glm52-cmd: &glm52-cmd >
  sglang serve
  --model-path PhalaCloud/GLM-5.2-W4AFP8
  --revision d975c19a1ad7fa0638e3d9ca9bca0ae74cc2f99e
  --served-model-name z-ai/glm-5.2
  --quantization w4afp8
  --disable-shared-experts-fusion
  --disable-custom-all-reduce
  --tp 8
  --kv-cache-dtype fp8_e4m3
  --reasoning-parser glm45
  --tool-call-parser glm47
  --speculative-algorithm EAGLE
  --speculative-num-steps 3
  --speculative-eagle-topk 1
  --speculative-num-draft-tokens 4
  --log-requests-level 0
  --mem-fraction-static 0.78
  --max-running-requests 256
  --max-queued-requests 16
  --cuda-graph-max-bs 128
  --context-length 1048576
  --dist-init-addr 127.0.0.1:29500
  --watchdog-timeout 1800
  --port 8000
  --host 0.0.0.0
  --enable-cache-report
  --enable-metrics
  --trust-remote-code

x-glm52-model-env: &glm52-model-env
  HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
  HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  OPENBLAS_L2_SIZE: "2097152"
  NCCL_DEBUG: WARN
  # Persist inductor/triton/deep_gemm compile caches so an unchanged config skips recompile
  # on restart (the dominant startup cost is weight-load + cuda-graph capture, not cacheable).
  TORCHINDUCTOR_CACHE_DIR: /root/.cache/torchinductor
  TRITON_CACHE_DIR: /root/.cache/triton

services:
  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    depends_on:
      proxy-glm52:
        condition: service_started
    ports:
      - "8000:80"
      - "8001:8001"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - LONG_HTTP_PORT=${LONG_HTTP_PORT:-8001}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
      - PROXY_TOKEN=${PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  # Single proxy fronting the one TP8 backend (attestation/signing/E2EE/auth + health/failover).
  proxy-glm52:
    <<: *vllm-proxy-common
    container_name: proxy-glm52
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=z-ai/glm-5.2
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BACKEND_URLS=http://model-sg-glm52-w4afp8-tp8:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-W4AFP8-SGL-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-glm52"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "z-ai/glm-5.2"
      nearai.otel.deployment: "GLM-5.2-W4AFP8-SGL-TP8"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  model-sg-glm52-w4afp8-tp8:
    <<: *nvidia
    init: true
    image: lmsysorg/sglang@sha256:1c64fde976bdf0d56474a30bccbcfc19667e5b3ab34c826a534c9d6aaca41212
    container_name: model-sg-glm52-w4afp8-tp8
    command: *glm52-cmd
    volumes:
      - compile_cache:/root/.cache
      - huggingface_cache:/root/.cache/huggingface
    environment: *glm52-model-env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3","4","5","6","7"]
              capabilities: [gpu]
    restart: unless-stopped
    stop_grace_period: 5m
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"sglang","service":"sglang","tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-W4AFP8-SGL-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-sg-glm52-w4afp8-tp8:8000/metrics", "histogram_buckets_as_distributions": true, "metrics":["sglang:*"], "service": "sglang", "tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-W4AFP8-SGL-TP8","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "sglang"
      nearai.otel.service: "sglang"
      nearai.otel.source: "sglang"
      nearai.otel.container_name: "model-sg-glm52-w4afp8-tp8"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "z-ai/glm-5.2"
      nearai.otel.deployment: "GLM-5.2-W4AFP8-SGL-TP8"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  dcgm-glm52:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-glm52
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-W4AFP8-SGL-TP8","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source":"dcgm-exporter","service":"dcgm-exporter","tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-W4AFP8-SGL-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "dcgm"
      nearai.otel.service: "dcgm-exporter"
      nearai.otel.source: "dcgm-exporter"
      nearai.otel.container_name: "dcgm-glm52"
      nearai.otel.port: "9400"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "z-ai/glm-5.2"
      nearai.otel.deployment: "GLM-5.2-W4AFP8-SGL-TP8"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  otelcol-contrib:
    image: otel/opentelemetry-collector-contrib@sha256:85ac41c2db88d0df9bd6145e608a3cb023f5d8443868adbfbbf66efb51087917
    container_name: otelcol-contrib
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    user: "0:0"
    mem_limit: "768m"
    environment:
      - MONITORING_INGEST_TOKEN=${MONITORING_INGEST_TOKEN:-}
      - CVM_NAME=${CVM_NAME:-unknown}
      - CVM_HOST=${CVM_HOST:-unknown}
      - DD_HOSTNAME=${DD_HOSTNAME:-unknown}
      - ENV=${ENV:-unknown}
      - HOST_IP=${HOST_IP:-unknown}
    expose:
      - "4317"
      - "4318"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - otelcol_app_storage:/var/lib/otelcol-contrib
    configs:
      - source: otelcol_app_config
        target: /etc/otelcol-contrib/config.yaml
        mode: 0444
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      com.datadoghq.ad.logs: '[{"source":"otelcol-contrib","service":"otelcol-contrib","tags":["deployment:GLM-5.2-W4AFP8-SGL-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  huggingface_cache:
  compile_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        filelog/docker_containers:
          include: [/var/lib/docker/containers/*/*-json.log]
          start_at: end
          storage: file_storage
          include_file_path: true
          operators:
            - type: json_parser
              parse_from: body
              parse_to: attributes
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
              on_error: send_quiet
            - type: move
              from: attributes.log
              to: body
              if: 'attributes.log != nil'
            - type: move
              from: attributes.stream
              to: attributes["log.iostream"]
              if: 'attributes.stream != nil'
            - type: remove
              field: attributes.time
              if: 'attributes.time != nil'
            - type: regex_parser
              parse_from: attributes["log.file.path"]
              regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model:(?P<model>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'deployment:(?P<deployment>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'ip:(?P<ip>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'port:(?P<port>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'env:(?P<env>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'host:(?P<host>[^",\]]+)'
              on_error: send_quiet
            - type: add
              field: attributes["service.name"]
              value: cvm-docker

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: inference-proxy-proxy-glm52
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-glm52:8000']
                    labels:
                      service: "vllm-proxy"
                      source: "vllm-proxy"
                      container_name: "proxy-glm52"
                      model: "z-ai/glm-5.2"
                      deployment: "GLM-5.2-W4AFP8-SGL-TP8"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
              - job_name: sglang-model-sg-glm52-w4afp8-tp8
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-glm52-w4afp8-tp8:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-glm52-w4afp8-tp8"
                      model: "z-ai/glm-5.2"
                      deployment: "GLM-5.2-W4AFP8-SGL-TP8"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
              - job_name: dcgm-dcgm-glm52
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-glm52:9400']
                    labels:
                      service: "dcgm-exporter"
                      source: "dcgm-exporter"
                      container_name: "dcgm-glm52"
                      model: "z-ai/glm-5.2"
                      deployment: "GLM-5.2-W4AFP8-SGL-TP8"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "9400"

        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        transform/docker_metadata:
          error_mode: ignore
          log_statements:
            - context: log
              statements:
                - set(attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                - set(attributes["service.name"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["log.source"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["service"], attributes["service.name"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["service.name"] != nil
                - set(attributes["source"], attributes["log.source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["log.source"] != nil
                - set(attributes["container.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil

        filter/app_logs:
          error_mode: ignore
          logs:
            log_record:
              - 'attributes["model"] == nil and attributes["deployment"] == nil'
              - 'attributes["service.name"] == "compose-manager"'
              - 'attributes["service.name"] == "compose-manager-launcher"'
              - 'attributes["service.name"] == "otelcol-management"'
              - 'attributes["service.name"] == "otelcol-contrib"'
              - 'attributes["service.name"] == "datadog-agent"'

        groupbyattrs/docker_service:
          keys:
            - service.name
            - service
            - container.name
            - log.source
            - source
            - log.iostream
            - model
            - deployment
            - env
            - host
            - ip
            - port

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          logs/app:
            receivers: [filelog/docker_containers]
            processors: [memory_limiter, resource, transform/docker_metadata, filter/app_logs, groupbyattrs/docker_service, batch]
            exporters: [otlphttp/gateway]
          metrics/app:
            receivers: [prometheus/apps]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/self:
            receivers: [prometheus/self]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
        telemetry:
          metrics:
            address: localhost:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      INFERENCE_TOKEN="$${PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      # Long-context tier: a second, discovery-only endpoint (nginx stub on :8001) advertises
      # the synthetic id z-ai/glm-5.2-long so model-proxy attaches this host to the long domain.
      # DO NOT register the canonical z-ai/glm-5.2 under the long domain — model-proxy's
      # model->domain map is last-writer-wins and the 2xTP4 registrars would fight it (see the
      # LONG-CONTEXT TIER note in the file header).
      LONG_ENDPOINT="$${HOST_IP}:$${LONG_HTTP_PORT}"
      REGISTERED=false
      FAILURE_COUNT=0
      MAX_RETRIES=3

      if [ -z "$$TOKEN" ] || [ -z "$$INFERENCE_TOKEN" ]; then
        echo "ERROR: MODEL_PROXY_TOKEN and PROXY_TOKEN are required for model-proxy registration"
        exit 1
      fi

      register_endpoint() {
        echo "Registering endpoint $$1 with routing port $$2"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}"
      }

      unregister_endpoint() {
        echo "Unregistering endpoint $$1"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}"
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}"
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT and $$LONG_ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        unregister_endpoint "$$LONG_ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      mark_registered() {
        register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
        register_model "z-ai/glm-5.2" "glm-5-2.completions.near.ai"
        register_endpoint "$$LONG_ENDPOINT" "$${TLS_PORT}"
        register_model "z-ai/glm-5.2-long" "glm-5-2-long.completions.near.ai"
        if [ "$$REGISTERED" = false ]; then
          echo "[GLM-5.2-W4AFP8-SGL-TP8] Registered z-ai/glm-5.2 (TP8 1M) at $$ENDPOINT + long tier at $$LONG_ENDPOINT"
        fi
        REGISTERED=true
      }

      check_inference() {
        echo "Performing health check on model endpoint..."
        status=$$(curl -sS --connect-timeout 10 --max-time 45 -o /dev/null -w "%{http_code}" \
          -X POST "http://$${HOST_IP}:$${HTTP_PORT}/v1/chat/completions" \
          -H "Authorization: Bearer $$INFERENCE_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"model":"z-ai/glm-5.2","messages":[{"role":"user","content":"hi"}],"max_tokens":1}')
        curl_status=$$?

        if [ "$$curl_status" -ne 0 ]; then
          case "$$curl_status" in
            52|56)
              echo "[GLM-5.2-W4AFP8-SGL-TP8] Health probe hit connection-level backpressure (curl $$curl_status); treating as alive but saturated"
              return 2
              ;;
          esac
          echo "[GLM-5.2-W4AFP8-SGL-TP8] Health probe curl failed with status $$curl_status"
          return 1
        fi

        case "$$status" in
          2*)
            return 0
            ;;
          503)
            echo "[GLM-5.2-W4AFP8-SGL-TP8] Backend returned 503; treating as alive but saturated"
            return 2
            ;;
          *)
            echo "[GLM-5.2-W4AFP8-SGL-TP8] Backend returned HTTP $$status"
            return 1
            ;;
        esac
      }

      READY_URL="http://$${HOST_IP}:$${HTTP_PORT}/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf \
        -H "Authorization: Bearer $$INFERENCE_TOKEN" \
        "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 40 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/40), retrying in 30s..."
        sleep 30
      done
      echo "Model ready, starting registration loop"

      while true; do
        date +%s > /tmp/registrar_alive
        check_inference
        health_status=$$?
        case "$$health_status" in
          0)
            FAILURE_COUNT=0
            mark_registered
            ;;
          2)
            FAILURE_COUNT=0
            echo "[GLM-5.2-W4AFP8-SGL-TP8] Keeping $$ENDPOINT registered while backend is saturated"
            mark_registered
            ;;
          *)
            FAILURE_COUNT=$$((FAILURE_COUNT + 1))
            echo "[GLM-5.2-W4AFP8-SGL-TP8] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
            if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
              echo "[GLM-5.2-W4AFP8-SGL-TP8] Retry limit reached, unregistering $$ENDPOINT and $$LONG_ENDPOINT"
              unregister_endpoint "$$ENDPOINT"
              unregister_endpoint "$$LONG_ENDPOINT"
              REGISTERED=false
              echo "[GLM-5.2-W4AFP8-SGL-TP8] Exiting to refresh DNS (container will auto-restart)"
              exit 1
            fi
            ;;
        esac
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      server {
          listen 80 default_server;
          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;
          location / {
              proxy_pass http://proxy-glm52:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }

      # Discovery-only stub for the long-context tier: model-proxy probes this endpoint's
      # /v1/models and maps the synthetic id to glm-5-2-long.completions.near.ai (routing
      # still targets :8444 -> proxy-glm52; see the LONG-CONTEXT TIER note in the header).
      # The synthetic id must never appear in SGLang, the catalog, or any serving-path config.
      #
      # The static JSON is gated on the REAL serving path via auth_request (a zero-body
      # subrequest to proxy-glm52's /v1/models): if the engine/proxy is down the stub
      # returns 5xx, so model-proxy's discovery drops the long domain's backend within a
      # cycle, its health checker sees genuine failures even if this port ends up as the
      # shared backend's probe_address (probe_address is first-registered-wins), and
      # stale-endpoint eviction keeps working. An unconditional 200 here would keep the
      # long domain routing to a dead engine and mask wedged-backend detection.
      # (default_server keeps scripts/validate_otel_labels.rb's public-port scan anchored
      # on the serving blocks — this port is discovery-only, not the app's public port.)
      server {
          listen 8001 default_server;
          access_log /var/log/nginx/access.log json_combined;
          location = /v1/models {
              auth_request /_engine_health;
              default_type application/json;
              return 200 '{"object":"list","data":[{"id":"z-ai/glm-5.2-long","object":"model","owned_by":"nearai"}]}';
          }
          location = /_engine_health {
              internal;
              proxy_pass http://proxy-glm52:8000/v1/models;
              proxy_pass_request_body off;
              proxy_set_header Content-Length "";
              proxy_connect_timeout 2s;
              proxy_read_timeout 4s;
          }
          location / {
              return 404;
          }
      }

      server {
          listen 443 ssl;
          http2 on;
          # Single (default) server block on :443, so ALL SNIs arriving on 8444 are served
          # here regardless of server_name — including rotation SNIs (glm-5-2-i0, ...) and the
          # long-context domain. The names below are documentation of the domains model-proxy
          # routes to this host; do not split into separate blocks or the default-server
          # property that makes rotation SNIs work would need explicit regex coverage.
          server_name glm-5-2.completions.near.ai glm-5-2-long.completions.near.ai;
          ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;
          location / {
              proxy_pass http://proxy-glm52:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
