# GLM-5.2-SGL-FP8-TP8 — zai-org/GLM-5.2-FP8 (official FP8) on SGLang, single TP8 (all 8 GPUs).
#
# FIRST config for GLM-5.2 (753B glm_moe_dsa, GLM-5.1's twin: improved MTP + IndexShare,
# 1M context). Single TP8 FP8 backend behind one nearaidev/vllm-proxy-rs (attestation/
# signing/E2EE/auth). nginx -> proxy -> model. No 4-bit yet (no community AWQ; self-quant
# is RAM/disk-bound on a single 8xH200 box — see glm51_awq_comparison/CAMPAIGN.md), so the
# 2x TP4 topology that beat TP8 on 5.1 is NOT yet available for 5.2 (revisit when an AWQ exists).
#
# IMAGE: lmsysorg/sglang dev-cu12 @81abd2a6 (~2026-06-16). REQUIRED for GLM-5.2: it carries
# the DSA IndexShare + spec-v2 fixes (#27114/#28192) and registers GlmMoeDsaForCausalLM.
# The older aac6b242 (used by GLM-5.1) predates IndexShare and won't serve 5.2 correctly.
#
# WHY FP8 / TP8 (benchmarked under CC, glm51_awq_comparison/CAMPAIGN.md "GLM-5.2"):
#   - FP8 (zai-org/GLM-5.2-FP8, ~704GB) fits TP8 at ~94 GB/GPU; BF16 doesn't fit even TP8;
#     FP8 @ TP4 = 188 GB/GPU does NOT fit -> TP8 is the only FP8 topology on one box.
#   - fp8 KV cache: ~527,936 token pool at ctx 32768.
#   - Throughput (in=256, agg tok/s): c1=35.7 c8=222 c16=366 c64=1180 (~= GLM-5.1 TP8).
#
# *** DIST-INIT FIX (--dist-init-addr 127.0.0.1:29500): ***
#   On the dstack bridge network, sglang's default distributed-init address resolves to
#   0.0.0.0, which the TP worker ranks cannot connect to -> c10d TCPStore times out after
#   600s ("trying to connect to (0.0.0.0, <port>)"). Forcing 127.0.0.1 makes the in-container
#   loopback rendezvous work. (Manual --network=host launches avoid this; compose uses the
#   bridge net, so the flag is required.)
#
# SPEC-DECODE (EAGLE) — documented variant, NOT enabled by default:
#   GLM-5.2's improved MTP gives a strong SINGLE-STREAM win: EAGLE 5/1/6 + fp8 KV = 1.45x at
#   c=1 (accept-len 3.68, held to c=64). BUT on compute-rich TP8 it TAXES concurrency
#   (c=4..64: 0.78-0.91x) because verifying batch*6 tokens/step competes with the base decode;
#   adaptive spec can't gate it off (floor is 1 step). So EAGLE here is a LOW-LATENCY-only win.
#   This base config (no spec) is the THROUGHPUT-safe default. For a dedicated low-latency
#   endpoint, add to the command below (and drop max-running-requests to ~128):
#     --speculative-algorithm EAGLE --speculative-num-steps 5 --speculative-eagle-topk 1
#     --speculative-num-draft-tokens 6
#   (DO NOT add --num-continuous-decode-steps>1 / --enable-mixed-chunk / --chunked-prefill-size
#    16384 with spec: that combo CUDA-IMA-crashed at c>=32 on the 5.1 spec+DSA path.)
#   DeepEP + DP-attention high-throughput (sglang cookbook) is CC-INCOMPATIBLE: DeepEP's
#   GPU-initiated all-to-all crashes under PPCIE ("deep_ep.cpp:230 invalid argument"). Do not use.

x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs,com.docker.compose.service"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:24536a0cee15835621fa3edea499b0cb148f6ee4f815e6296470984372cc3b64
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

# Shared sglang args. zai-org/GLM-5.2-FP8 = official FP8 (W8A8 block-fp8). Single TP8.
# THROUGHPUT-safe default (no spec). See header for the EAGLE low-latency variant.
x-glm52-cmd: &glm52-cmd >
  sglang serve
  --model-path zai-org/GLM-5.2-FP8
  --revision 3722e206c8461c750e5ab73f5528eba42d0c6a37
  --served-model-name z-ai/glm-5.2
  --tp 8
  --kv-cache-dtype fp8_e4m3
  --reasoning-parser glm45
  --tool-call-parser glm47
  --log-requests-level 0
  --mem-fraction-static 0.85
  --max-running-requests 256
  --context-length 500000
  --dist-init-addr 127.0.0.1:29500
  --watchdog-timeout 1800
  --port 8000
  --host 0.0.0.0
  --enable-cache-report
  --enable-metrics
  --trust-remote-code

x-glm52-model-env: &glm52-model-env
  HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
  HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  OPENBLAS_L2_SIZE: "2097152"
  NCCL_DEBUG: WARN
  # Persist inductor/triton/deep_gemm compile caches so an unchanged config skips recompile
  # on restart (the dominant startup cost is weight-load + cuda-graph capture, not cacheable).
  TORCHINDUCTOR_CACHE_DIR: /root/.cache/torchinductor
  TRITON_CACHE_DIR: /root/.cache/triton

services:
  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    depends_on:
      proxy-glm52:
        condition: service_started
    ports:
      - "8000:80"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - TLS_PORT=${TLS_PORT:-8444}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  # Single proxy fronting the one TP8 backend (attestation/signing/E2EE/auth + health/failover).
  proxy-glm52:
    <<: *vllm-proxy-common
    container_name: proxy-glm52
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=z-ai/glm-5.2
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BACKEND_URLS=http://model-sg-glm52-fp8-tp8:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-SGL-FP8-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-glm52"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "z-ai/glm-5.2"
      nearai.otel.deployment: "GLM-5.2-SGL-FP8-TP8"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  model-sg-glm52-fp8-tp8:
    <<: *nvidia
    init: true
    image: lmsysorg/sglang@sha256:81abd2a6617679f0df48cb20381df68322f90b5599ae068535a493708e6ab71a
    container_name: model-sg-glm52-fp8-tp8
    command: *glm52-cmd
    volumes:
      - compile_cache:/root/.cache
      - huggingface_cache:/root/.cache/huggingface
    environment: *glm52-model-env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3","4","5","6","7"]
              capabilities: [gpu]
    restart: unless-stopped
    stop_grace_period: 5m
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"sglang","service":"sglang","tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-SGL-FP8-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-sg-glm52-fp8-tp8:8000/metrics", "histogram_buckets_as_distributions": true, "metrics":["sglang:*"], "service": "glm-5.2-sgl-fp8-tp8", "tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-SGL-FP8-TP8","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "sglang"
      nearai.otel.service: "sglang"
      nearai.otel.source: "sglang"
      nearai.otel.container_name: "model-sg-glm52-fp8-tp8"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "z-ai/glm-5.2"
      nearai.otel.deployment: "GLM-5.2-SGL-FP8-TP8"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  dcgm-glm52:
    image: nvcr.io/nvidia/k8s/dcgm-glm52:4.5.2-4.8.1-distroless
    container_name: dcgm-glm52
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-SGL-FP8-TP8","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source":"dcgm-glm52","service":"dcgm-glm52","tags":["model:z-ai/glm-5.2","deployment:GLM-5.2-SGL-FP8-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "dcgm"
      nearai.otel.service: "dcgm-glm52"
      nearai.otel.source: "dcgm-glm52"
      nearai.otel.container_name: "dcgm-glm52"
      nearai.otel.port: "9400"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "z-ai/glm-5.2"
      nearai.otel.deployment: "GLM-5.2-SGL-FP8-TP8"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  otelcol-contrib:
    image: otel/opentelemetry-collector-contrib@sha256:85ac41c2db88d0df9bd6145e608a3cb023f5d8443868adbfbbf66efb51087917
    container_name: otelcol-contrib
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    user: "0:0"
    mem_limit: "768m"
    environment:
      - MONITORING_INGEST_TOKEN=${MONITORING_INGEST_TOKEN:-}
      - CVM_NAME=${CVM_NAME:-unknown}
      - CVM_HOST=${CVM_HOST:-unknown}
      - DD_HOSTNAME=${DD_HOSTNAME:-unknown}
      - ENV=${ENV:-unknown}
      - HOST_IP=${HOST_IP:-unknown}
    expose:
      - "4317"
      - "4318"
    volumes:
      - otelcol_app_storage:/var/lib/otelcol-contrib
    configs:
      - source: otelcol_app_config
        target: /etc/otelcol-contrib/config.yaml
        mode: 0444
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      com.datadoghq.ad.logs: '[{"source":"otelcol-contrib","service":"otelcol-contrib","tags":["deployment:GLM-5.2-SGL-FP8-TP8","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  huggingface_cache:
  compile_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: inference-proxy-proxy-glm52
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-glm52:8000']
                    labels:
                      service: "vllm-proxy"
                      source: "vllm-proxy"
                      container_name: "proxy-glm52"
                      model: "z-ai/glm-5.2"
                      deployment: "GLM-5.2-SGL-FP8-TP8"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
              - job_name: sglang-model-sg-glm52-fp8-tp8
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-glm52-fp8-tp8:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-glm52-fp8-tp8"
                      model: "z-ai/glm-5.2"
                      deployment: "GLM-5.2-SGL-FP8-TP8"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
              - job_name: dcgm-dcgm-glm52
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-glm52:9400']
                    labels:
                      service: "dcgm-glm52"
                      source: "dcgm-glm52"
                      container_name: "dcgm-glm52"
                      model: "z-ai/glm-5.2"
                      deployment: "GLM-5.2-SGL-FP8-TP8"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "9400"

        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          metrics/app:
            receivers: [prometheus/apps]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/self:
            receivers: [prometheus/self]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
        telemetry:
          metrics:
            address: localhost:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      ENDPOINT="$${HOST_IP}:$${HTTP_PORT}"
      REGISTERED=false
      FAILURE_COUNT=0
      MAX_RETRIES=3

      register_endpoint() {
        echo "Registering endpoint $$1 with routing port $$2"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}"
      }

      unregister_endpoint() {
        echo "Unregistering endpoint $$1"
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}"
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}"
      }

      cleanup() {
        echo "SIGTERM received, unregistering $$ENDPOINT"
        unregister_endpoint "$$ENDPOINT"
        REGISTERED=false
        exit 0
      }
      trap cleanup TERM INT

      mark_registered() {
        register_endpoint "$$ENDPOINT" "$${TLS_PORT}"
        register_model "z-ai/glm-5.2" "glm-5-2.completions.near.ai"
        if [ "$$REGISTERED" = false ]; then
          echo "[GLM-5.2-SGL-FP8-TP8] Registered z-ai/glm-5.2 (TP8 FP8) at $$ENDPOINT"
        fi
        REGISTERED=true
      }

      check_inference() {
        echo "Performing health check on model endpoint..."
        status=$$(curl -sS --connect-timeout 10 --max-time 45 -o /dev/null -w "%{http_code}" \
          -X POST "http://model-sg-glm52-fp8-tp8:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d '{"model":"z-ai/glm-5.2","messages":[{"role":"user","content":"hi"}],"max_tokens":1}')
        curl_status=$$?

        if [ "$$curl_status" -ne 0 ]; then
          case "$$curl_status" in
            52|56)
              echo "[GLM-5.2-SGL-FP8-TP8] Health probe hit connection-level backpressure (curl $$curl_status); treating as alive but saturated"
              return 2
              ;;
          esac
          echo "[GLM-5.2-SGL-FP8-TP8] Health probe curl failed with status $$curl_status"
          return 1
        fi

        case "$$status" in
          2*)
            return 0
            ;;
          503)
            echo "[GLM-5.2-SGL-FP8-TP8] Backend returned 503; treating as alive but saturated"
            return 2
            ;;
          *)
            echo "[GLM-5.2-SGL-FP8-TP8] Backend returned HTTP $$status"
            return 1
            ;;
        esac
      }

      READY_URL="http://$${HOST_IP}:8000/v1/models"
      echo "Waiting for model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 40 ]; then
          echo "WARN: model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway"
          break
        fi
        echo "Model not ready yet (attempt $$ready_attempts/40), retrying in 30s..."
        sleep 30
      done
      echo "Model ready, starting registration loop"

      while true; do
        date +%s > /tmp/registrar_alive
        check_inference
        health_status=$$?
        case "$$health_status" in
          0)
            FAILURE_COUNT=0
            mark_registered
            ;;
          2)
            FAILURE_COUNT=0
            echo "[GLM-5.2-SGL-FP8-TP8] Keeping $$ENDPOINT registered while backend is saturated"
            mark_registered
            ;;
          *)
            FAILURE_COUNT=$$((FAILURE_COUNT + 1))
            echo "[GLM-5.2-SGL-FP8-TP8] Health check failed ($$FAILURE_COUNT/$$MAX_RETRIES)"
            if [ "$$REGISTERED" = true ] && [ "$$FAILURE_COUNT" -ge "$$MAX_RETRIES" ]; then
              echo "[GLM-5.2-SGL-FP8-TP8] Retry limit reached, unregistering $$ENDPOINT"
              unregister_endpoint "$$ENDPOINT"
              REGISTERED=false
              echo "[GLM-5.2-SGL-FP8-TP8] Exiting to refresh DNS (container will auto-restart)"
              exit 1
            fi
            ;;
        esac
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      server {
          listen 80 default_server;
          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;
          location / {
              proxy_pass http://proxy-glm52:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }

      server {
          listen 443 ssl;
          http2 on;
          server_name glm-5-2.completions.near.ai;
          ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          access_log /var/log/nginx/access.log json_combined;
          client_max_body_size 100m;
          client_body_buffer_size 1m;
          location / {
              proxy_pass http://proxy-glm52:8000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
