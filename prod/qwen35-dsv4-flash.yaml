networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  huggingface_cache:
  kernel_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        filelog/docker_containers:
          include: [/var/lib/docker/containers/*/*-json.log]
          start_at: end
          storage: file_storage
          include_file_path: true
          operators:
            - type: json_parser
              parse_from: body
              parse_to: attributes
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
              on_error: send_quiet
            - type: move
              from: attributes.log
              to: body
              if: 'attributes.log != nil'
            - type: move
              from: attributes.stream
              to: attributes["log.iostream"]
              if: 'attributes.stream != nil'
            - type: remove
              field: attributes.time
              if: 'attributes.time != nil'
            - type: regex_parser
              parse_from: attributes["log.file.path"]
              regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model:(?P<model>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model_path:(?P<model_path>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'precision:(?P<precision>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'deployment:(?P<deployment>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'ip:(?P<ip>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'port:(?P<port>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'env:(?P<env>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'host:(?P<host>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'instance:(?P<instance>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'replica:(?P<replica>[^",\]]+)'
              on_error: send_quiet
            - type: add
              field: attributes["service.name"]
              value: cvm-docker

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: sglang-model-sg-qwen35-122b-fp8-tp4
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-qwen35-122b-fp8-tp4:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-qwen35-122b-fp8-tp4"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      instance: "1"
              - job_name: sglang-model-sg-dsv4-flash-fp4-tp2-r1
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-dsv4-flash-fp4-tp2-r1:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-dsv4-flash-fp4-tp2-r1"
                      model: "deepseek-ai/DeepSeek-V4-Flash"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8001"
                      instance: "1"
              - job_name: sglang-model-sg-dsv4-flash-fp4-tp2-r2
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-sg-dsv4-flash-fp4-tp2-r2:8000']
                    labels:
                      service: "sglang"
                      source: "sglang"
                      container_name: "model-sg-dsv4-flash-fp4-tp2-r2"
                      model: "deepseek-ai/DeepSeek-V4-Flash"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8002"
                      instance: "2"
              - job_name: dcgm-dcgm-qwen35-122b
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-qwen35-122b:9400']
                    labels:
                      service: "dcgm-exporter"
                      source: "dcgm-exporter"
                      container_name: "dcgm-qwen35-122b"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "9400"
              - job_name: dcgm-dcgm-dsv4-flash
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-dsv4-flash:9400']
                    labels:
                      service: "dcgm-exporter"
                      source: "dcgm-exporter"
                      container_name: "dcgm-dsv4-flash"
                      model: "deepseek-ai/DeepSeek-V4-Flash"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "9400"
              - job_name: inference-proxy-proxy-qwen35-122b
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-qwen35-122b:8000']
                    labels:
                      service: "vllm-proxy"
                      source: "vllm-proxy"
                      container_name: "proxy-qwen35-122b"
                      model: "Qwen/Qwen3.5-122B-A10B"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
              - job_name: inference-proxy-proxy-dsv4-flash
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-dsv4-flash:8000']
                    labels:
                      service: "vllm-proxy"
                      source: "vllm-proxy"
                      container_name: "proxy-dsv4-flash"
                      model: "deepseek-ai/DeepSeek-V4-Flash"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8001"
                      instance: "1"
              - job_name: inference-proxy-proxy-dsv4-flash-2
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['proxy-dsv4-flash-2:8000']
                    labels:
                      service: "vllm-proxy"
                      source: "vllm-proxy"
                      container_name: "proxy-dsv4-flash-2"
                      model: "deepseek-ai/DeepSeek-V4-Flash"
                      deployment: "qwen35-dsv4-flash"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8002"
                      instance: "2"

        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        transform/docker_metadata:
          error_mode: ignore
          log_statements:
            - context: log
              statements:
                - set(attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                - set(attributes["service.name"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["log.source"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["service"], attributes["service.name"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["service.name"] != nil
                - set(attributes["source"], attributes["log.source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["log.source"] != nil
                - set(attributes["container.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil

        filter/app_logs:
          error_mode: ignore
          logs:
            log_record:
              - 'attributes["model"] == nil and attributes["deployment"] == nil'
              - 'attributes["service.name"] == "compose-manager"'
              - 'attributes["service.name"] == "compose-manager-launcher"'
              - 'attributes["service.name"] == "otelcol-management"'
              - 'attributes["service.name"] == "otelcol-contrib"'
              - 'attributes["service.name"] == "datadog-agent"'

        groupbyattrs/docker_service:
          keys:
            - service.name
            - service
            - container.name
            - log.source
            - source
            - log.iostream
            - model
            - model_path
            - precision
            - deployment
            - env
            - host
            - ip
            - port
            - instance
            - replica

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          logs/app:
            receivers: [filelog/docker_containers]
            processors: [memory_limiter, resource, transform/docker_metadata, filter/app_logs, groupbyattrs/docker_service, batch]
            exporters: [otlphttp/gateway]
          metrics/app:
            receivers: [prometheus/apps]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          metrics/self:
            receivers: [prometheus/self]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/gateway]
        telemetry:
          metrics:
            address: localhost:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      INFERENCE_TOKEN="$${PROXY_TOKEN}"

      if [ -z "$$TOKEN" ] || [ -z "$$INFERENCE_TOKEN" ]; then
        echo "ERROR: MODEL_PROXY_TOKEN and PROXY_TOKEN are required for model-proxy registration"
        exit 1
      fi

      MAX_RETRIES=3

      for port in 8000 8001 8002; do
        eval "REG_$$port=false"
        eval "FAIL_COUNT_$$port=0"
      done

      # Host port -> TLS routing port model-proxy should dial for that backend.
      # 8002 (dsv4 r2) rides the second TLS listener; everything else uses the
      # default 8444.
      routing_port_for() {
        case $$1 in
          8002) echo "$${TLS_PORT_2}" ;;
          *) echo "$${TLS_PORT}" ;;
        esac
      }

      # $1 = endpoint (host:port), $2 = routing port for that backend.
      register_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$2}" || true
      }

      unregister_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering all endpoints"
        for port in 8000 8001 8002; do
          unregister_endpoint "$${HOST_IP}:$$port"
        done
        exit 0
      }
      trap cleanup TERM INT

      # $1 = host:port. Probe the host-published port via HOST_IP, not the
      # compose service DNS name: a service-name probe fails with curl (6)
      # "Could not resolve host" if the registrar loses compose-network DNS
      # (e.g. after a backend is recreated independently), wedging the health
      # check so every model drops to 0 backends. See cvm-compose-files#57.
      check_chat() {
        status=$$(curl -sS --connect-timeout 10 --max-time 45 -o /dev/null -w "%{http_code}" \
          -X POST "http://$$1/v1/chat/completions" \
          -H "Authorization: Bearer $$INFERENCE_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$2\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}")
        curl_status=$$?

        if [ "$$curl_status" -ne 0 ]; then
          case "$$curl_status" in
            52|56)
              echo "[$$2] Health probe hit connection-level backpressure (curl $$curl_status); treating as alive but saturated"
              return 0
              ;;
          esac
          echo "[$$2] Health probe curl failed with status $$curl_status"
          return 1
        fi

        case "$$status" in
          2*)
            return 0
            ;;
          503)
            echo "[$$2] Backend returned 503; treating as alive but saturated"
            return 0
            ;;
          *)
            echo "[$$2] Backend returned HTTP $$status"
            return 1
            ;;
        esac
      }

      check_port() {
        case $$1 in
          8000) check_chat "$${HOST_IP}:8000" "Qwen/Qwen3.5-122B-A10B" ;;
          # One probe per dsv4 replica: 8001 -> proxy-dsv4-flash -> r1,
          # 8002 -> proxy-dsv4-flash-2 -> r2. A dead replica unregisters only
          # its own backend instead of hiding behind a shared LB probe.
          8001) check_chat "$${HOST_IP}:8001" "deepseek-ai/DeepSeek-V4-Flash" ;;
          8002) check_chat "$${HOST_IP}:8002" "deepseek-ai/DeepSeek-V4-Flash" ;;
        esac
      }

      # Probe the host-published nginx port via HOST_IP instead of the
      # "nginx" compose DNS name. A stale/abandoned docker service-name
      # resolution (e.g. after nginx is recreated) otherwise wedges this
      # readiness gate forever and silently drops every model to 0 backends.
      # Bounded + loud so a persistent probe failure falls through to the
      # registration loop (which health-checks each backend directly) instead
      # of hanging here forever. See cvm-compose-files#57.
      READY_URL="http://$${HOST_IP}:8000/v1/models"
      echo "Waiting for first model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf \
        -H "Authorization: Bearer $$INFERENCE_TOKEN" \
        "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: first model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway (each backend is health-checked directly before registering)"
          break
        fi
        echo "First model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "First model ready, starting registration loop"

      while true; do
        for port in 8000 8001 8002; do
          # Refreshed per port so a slow-but-progressing serial loop is not
          # falsely marked unhealthy by the registrar container healthcheck.
          date +%s > /tmp/registrar_alive
          endpoint="$${HOST_IP}:$$port"
          eval "was_reg=\$$REG_$$port"
          eval "fails=\$$FAIL_COUNT_$$port"
          if check_port $$port; then
            eval "FAIL_COUNT_$$port=0"
            register_endpoint "$$endpoint" "$$(routing_port_for $$port)"
            if [ "$$was_reg" = false ]; then
              echo "Registered $$endpoint"
            fi
            eval "REG_$$port=true"
          else
            fails=$$((fails + 1))
            eval "FAIL_COUNT_$$port=$$fails"
            echo "Health check failed for $$endpoint (fail count: $$fails)"
            if [ "$$was_reg" = true ] && [ "$$fails" -ge "$$MAX_RETRIES" ]; then
              unregister_endpoint "$$endpoint"
              eval "REG_$$port=false"
            fi
          fi
        done

        register_model "Qwen/Qwen3.5-122B-A10B" "qwen35-122b.completions.near.ai"
        register_model "deepseek-ai/DeepSeek-V4-Flash" "dsv4-flash.completions.near.ai"
        date +%s > /tmp/registrar_alive
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      access_log /var/log/nginx/access.log json_combined;

      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;
      client_body_buffer_size 1m;

      # :8000 - Qwen3.5-122B-A10B
      server {
        listen 8000;
        location / { proxy_pass http://proxy-qwen35-122b:8000; }
      }

      # :8001 - DeepSeek-V4-Flash replica 1 (registrar probe path for the 8444 backend)
      server {
        listen 8001;
        location / { proxy_pass http://proxy-dsv4-flash:8000; }
      }

      # :8002 - DeepSeek-V4-Flash replica 2 (registrar probe path for the 8445 backend)
      server {
        listen 8002;
        location / { proxy_pass http://proxy-dsv4-flash-2:8000; }
      }

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      server {
        listen 443 ssl http2;
        server_name qwen35-122b.completions.near.ai
                    ~^qwen35-122b-i\d+\.completions\.near\.ai$$;
        # Keep H2 connections from cloud-api alive across long idle gaps so the
        # bucket-pinned TCP connection survives between chats. Without this,
        # nginx defaults (75s idle, 1000 req/conn) close the connection and the
        # next request opens a new TCP via model-proxy's L4 LB → may land on a
        # different backend → signature 404. Pairs with cloud-api H2 keepalive
        # PINGs (http2_keep_alive_while_idle).
        keepalive_timeout 1h;
        keepalive_requests 1000000;
        location / { proxy_pass http://proxy-qwen35-122b:8000; }
      }

      server {
        listen 443 ssl http2;
        server_name dsv4-flash.completions.near.ai
                    ~^dsv4-flash-i\d+\.completions\.near\.ai$$;
        keepalive_timeout 1h;
        keepalive_requests 1000000;
        location / { proxy_pass http://proxy-dsv4-flash:8000; }
      }

      # Second dsv4 routing port: model-proxy dials (host, 8445) for the r2
      # backend. Same wildcard cert (http-context ssl_certificate above); the
      # H2 keepalive settings mirror :443 so cloud-api's bucket-pinned
      # connections survive idle gaps on this backend too.
      server {
        listen 8445 ssl http2;
        server_name dsv4-flash.completions.near.ai
                    ~^dsv4-flash-i\d+\.completions\.near\.ai$$;
        keepalive_timeout 1h;
        keepalive_requests 1000000;
        location / { proxy_pass http://proxy-dsv4-flash-2:8000; }
      }
