x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs,com.docker.compose.service"

# gpu26 migration target from prod/Qwen3.5-122B.yaml:
# keep model-sg-qwen35-122b-fp8-tp4 on GPUs 0-3, let compose-manager remove
# model-sg-qwen35-122b-2 as an orphan, and bring up two DeepSeek-V4-Flash
# replicas on GPUs 4-7.

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:b183677a5d32267539b9b21ec45327a4f3be0a013afeb608c68c4d76e9472e36
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-sg-qwen35-122b-common: &sg-qwen35-122b-common
  <<: *nvidia
  init: true
  # SGLang v0.5.12 (cu129) — migrated off vLLM 2026-05-22.
  # Context dropped from 1.01M (yarn rope override) to native 262144.
  # EAGLE spec decoding enabled (Spec V2 default since 0.5.11).
  #
  # WEIGHTS: official block-wise FP8 (Qwen/Qwen3.5-122B-A10B-FP8) — switched from BF16 (2026-06-20).
  #   Near-lossless (Qwen: "nearly identical to original"; verified 5/5 on a temp=0 quality+needle probe),
  #   native H200 FP8 tensor-core compute, ~half the weight VRAM (~114GB vs ~232GB → ~28.5GB/GPU at TP4).
  #   Benchmarked at ~15k input (8xH200 CC, no-EAGLE arm — see note): FP8 vs BF16 at the SAME TP4 gave
  #   +20-22% system throughput (c64 18.3k vs 15.0k, c128 21.4k vs 17.5k tok/s) + ~15-20% lower TPOT.
  #   The freed VRAM also unlocks TP2 (FP8 fits 2xH200): a single TP2 replica holds ~90% of a TP4
  #   replica's c64 throughput within the P99 TTFT<15s SLO, so 4xTP2 replicas/node ~= 2x the aggregate
  #   node throughput of 2xTP4 (~66k vs ~30k tok/s). Consider migrating the deployment to TP2 x4 for
  #   max throughput (balance each replica to ~c64; per-replica P99 TTFT collapses by c128 on 2 GPUs).
  #   fp8 KV cache (line below) verified NON-corrupting on H200 — sglang #19603 is Blackwell-specific.
  #   NOTE: dev-box benchmarks ran on sglang :latest with EAGLE disabled, because the pinned v0.5.12-cu129
  #   image SIGILLs at init on the dev CVM's CPU and :latest has an EAGLE draft-path bug for Qwen3.5
  #   (eagle_worker_v2 cuda_graph_buffer shape mismatch). Validate the FP8 checkpoint on this exact
  #   v0.5.12-cu129 image (which prod runs fine) in staging before promoting.
  image: lmsysorg/sglang:v0.5.12-cu129@sha256:9e02c8e1fe2790a1c445bd5f6814305fe43639a4adb01c8ad1e8e21e750bf581
  command: >
      sglang serve
      --model-path Qwen/Qwen3.5-122B-A10B-FP8
      --revision a099dee70ccfcd8d5dda56aaa0b60cb8ecadabc9
      --tp 4
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --speculative-algorithm EAGLE
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --mamba-scheduler-strategy extra_buffer
      --kv-cache-dtype fp8_e4m3
      --mem-fraction-static 0.88
      --context-length 262144
      --num-continuous-decode-steps 5
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
      --enable-mixed-chunk
      --chunked-prefill-size 16384
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --trust-remote-code
      --log-requests-level 0
      --served-model-name Qwen/Qwen3.5-122B-A10B
  volumes:
    - huggingface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-dcgm-common: &dcgm-common
  image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
  runtime: nvidia
  cap_add:
    - SYS_ADMIN
  restart: unless-stopped
  logging: *logging-conf

x-dsv4-flash-common: &dsv4-flash-common
  <<: *nvidia
  init: true
  # DeepSeek-V4-Flash uses the current production FP4/SGLang TP=2 path from
  # prod/dsv4-qwen36-gemma4.yaml. Each replica consumes two H200 GPUs, so the
  # four GPUs left after one Qwen3.5 TP=4 replica fit two DeepSeek replicas.
  # Temporary official CUDA 13 nightly containing sglang#29883; retains the FP4 Marlin path.
  # Workflow head/tag: 7de33ce8 / nightly-dev-cu13-20260711-7de33ce8. Replace with the next fixed stable.
  image: lmsysorg/sglang@sha256:6bb5fee34b6c4537c09a4775e2292ac40350d5ad1218fcc835b2692142f443b1
  # EAGLE 3/1/4 MTP spec-decode (added 2026-07-07; gpu02 dev-CVM validation, Notion
  # "dsv4 work doc"): +11-22% decode tok/s at prod 30k-context shape (accept-len
  # 2.27 code / 2.42 rag, same-wave two-port A/B; alpha identical at these exact
  # 0.83/64 settings, no OOM, ~24GB headroom). Draft = the checkpoint's own MTP
  # layer (auto-derived; needs SGLANG_ENABLE_SPEC_V2=1, already set below).
  # DELIBERATELY NO --speculative-adaptive: 2/2 CUDA illegal-memory-access crashes
  # under c1<->c8 burst soaks on 0.5.14 (upstream #25715 does not backport).
  # Trade-off: c4 ~-26%/req during rare bursts (prod avg ~1.08 running reqs);
  # TTFT +~5% (draft-extend after prefill). Rollback = remove the 4 spec flags.
  command: >
      sglang serve
      --trust-remote-code
      --model-path deepseek-ai/DeepSeek-V4-Flash
      --revision 553034d7dd9e06c2eeaee68cf85a17d6d4754cf0
      --tp 2
      --moe-runner-backend marlin
      --cuda-graph-max-bs 64
      --mem-fraction-static 0.83
      --max-running-requests 64
      --max-queued-requests 16
      --schedule-conservativeness 1.3
      --enable-mixed-chunk
      --chunked-prefill-size 16384
      --disable-custom-all-reduce
      --speculative-algorithm EAGLE
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --tool-call-parser deepseekv4
      --reasoning-parser deepseek-v4
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --log-requests-level 0
      --served-model-name deepseek-ai/DeepSeek-V4-Flash
      ${DSV4_RETURN_HIDDEN_STATES:+--enable-return-hidden-states}
  volumes:
    - huggingface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1
    - SGLANG_DSV4_FP4_EXPERTS=1
    - SGLANG_ENABLE_UNIFIED_RADIX_TREE=1
    - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

services:
  model-downloader:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    container_name: model-downloader
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        echo "Downloading Qwen/Qwen3.5-122B-A10B-FP8..."
        uvx --from 'huggingface_hub[hf_xet]' hf download Qwen/Qwen3.5-122B-A10B-FP8 --revision a099dee70ccfcd8d5dda56aaa0b60cb8ecadabc9
        echo "Downloading deepseek-ai/DeepSeek-V4-Flash..."
        uvx --from 'huggingface_hub[hf_xet]' hf download deepseek-ai/DeepSeek-V4-Flash --revision 553034d7dd9e06c2eeaee68cf85a17d6d4754cf0
        echo "Download complete."
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"model-downloader","service":"model-downloader","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    depends_on:
      - proxy-qwen35-122b
      - proxy-dsv4-flash
      - proxy-dsv4-flash-2
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8444:443"
      - "8445:8445"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"nginx","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      # Unhealthy if the registration loop hasn't ticked in 3m (e.g. wedged
      # before the loop, or the loop died). Surfaces silent registrar failures
      # in `docker ps` / Datadog. See cvm-compose-files#57.
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - TLS_PORT=${TLS_PORT:-8444}
      - TLS_PORT_2=${TLS_PORT_2:-8445}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
      - PROXY_TOKEN=${PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source":"model-proxy-registrar","service":"model-proxy-registrar","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

  # --- Qwen3.5-122B-A10B proxy ---

  proxy-qwen35-122b:
    <<: *vllm-proxy-common
    container_name: proxy-qwen35-122b
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.5-122B-A10B
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BASE_URL=http://model-sg-qwen35-122b-fp8-tp4:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-qwen35-122b"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "Qwen/Qwen3.5-122B-A10B"
      nearai.otel.deployment: "qwen35-dsv4-flash"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  # --- Qwen3.5-122B-A10B instance 1 (GPUs 0-3) ---

  model-sg-qwen35-122b-fp8-tp4:
    <<: *sg-qwen35-122b-common
    container_name: model-sg-qwen35-122b-fp8-tp4
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"sglang","service":"sglang","tags":["model:Qwen/Qwen3.5-122B-A10B","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000","instance:1"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-sg-qwen35-122b-fp8-tp4:8000/metrics", "metrics":["sglang:*"], "histogram_buckets_as_distributions": true, "service": "sglang", "tags":["model:Qwen/Qwen3.5-122B-A10B","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "sglang"
      nearai.otel.service: "sglang"
      nearai.otel.source: "sglang"
      nearai.otel.container_name: "model-sg-qwen35-122b-fp8-tp4"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "Qwen/Qwen3.5-122B-A10B"
      nearai.otel.deployment: "qwen35-dsv4-flash"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  # --- DeepSeek-V4-Flash proxy (2 replicas on GPUs 4-7) ---

  # Per-replica endpoints (2026-07-22, cloud-api#894): each dsv4 engine gets its own
  # proxy + TLS routing port (r1 via 8444, r2 via 8445) and registers as a distinct
  # model-proxy backend. With gpu26 that makes 3 equal backends, so cloud-api's
  # prefix-hash % count gives each ENGINE ~1/3 of traffic (previously this host's
  # two engines shared one backend slot and gpu26's single engine took ~half), and
  # each prefix bucket pins to one radix cache (the old shared proxy least-conn'd
  # across r1/r2, splitting prefix buckets across caches). Both proxies also run
  # the SSE idle watchdog (supersedes PR #149): idle >20s between upstream chunks
  # fails the stream explicitly instead of hanging the client, and emits
  # upstream_stream_incomplete_total{reason}. Image = post-inference-proxy#213
  # build (main 48d7e34). Rollback = revert this commit (engines unaffected).
  proxy-dsv4-flash:
    <<: *vllm-proxy-common
    image: nearaidev/vllm-proxy-rs@sha256:b0c5cd0786b19dfa46144107be15e340b7a338b1c341d02ffa994c9f1ea77dfd
    container_name: proxy-dsv4-flash
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_PROXY_STREAM_IDLE_TIMEOUT_SECS=20
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=deepseek-ai/DeepSeek-V4-Flash
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BASE_URL=http://model-sg-dsv4-flash-fp4-tp2-r1:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:deepseek-ai/DeepSeek-V4-Flash","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8001","instance:1"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-dsv4-flash"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "deepseek-ai/DeepSeek-V4-Flash"
      nearai.otel.deployment: "qwen35-dsv4-flash"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  proxy-dsv4-flash-2:
    <<: *vllm-proxy-common
    image: nearaidev/vllm-proxy-rs@sha256:b0c5cd0786b19dfa46144107be15e340b7a338b1c341d02ffa994c9f1ea77dfd
    container_name: proxy-dsv4-flash-2
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_PROXY_STREAM_IDLE_TIMEOUT_SECS=20
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=deepseek-ai/DeepSeek-V4-Flash
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - FUSION_ENABLED=${FUSION_ENABLED}
      - FUSION_INTERNAL_BEARER_TOKEN=${FUSION_INTERNAL_BEARER_TOKEN}
      - VLLM_BASE_URL=http://model-sg-dsv4-flash-fp4-tp2-r2:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
      - WEB_CONTEXT_SEARCH_URL=${WEB_CONTEXT_SEARCH_URL}
      - WEB_CONTEXT_SEARCH_API_KEY=${WEB_CONTEXT_SEARCH_API_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:deepseek-ai/DeepSeek-V4-Flash","deployment:qwen35-dsv4-flash","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8002","instance:2"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "inference-proxy"
      nearai.otel.service: "vllm-proxy"
      nearai.otel.source: "vllm-proxy"
      nearai.otel.container_name: "proxy-dsv4-flash-2"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "deepseek-ai/DeepSeek-V4-Flash"
      nearai.otel.deployment: "qwen35-dsv4-flash"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  model-sg-dsv4-flash-fp4-tp2-r1:
    <<: *dsv4-flash-common
    container_name: model-sg-dsv4-flash-fp4-tp2-r1
    # CANARY (2026-07-21, dsv4 streaming-stall incident — Notion "deepseek-v4-streaming-
    # incident" + #p-quality-assurance Jul 21): EAGLE silently disables mixed chunked
    # prefill (engine logs "Mixed chunked prefill is disabled because of using eagle
    # speculative decoding" at every startup since the 07-07 spec-decode deploy), so under
    # long-prompt bursts the scheduler runs back-to-back prefill-ONLY iterations of 16384
    # tokens (~1.2s each; 20+ consecutive observed on the .251 replica Jul 20 19:06 UTC)
    # during which decode is fully blocked — every open stream on the replica freezes at
    # the same wall-clock instant for 20-30s+. This replica halves the prefill budget to
    # bound each decode drought (same lever as GLM-5.2 2xTP4) and adds the fleet-standard
    # watchdog as a wedge backstop. r2 below is the same-host control: compare per-replica
    # inter-token latency, decode-drought minutes, and queue-at-cap counts in Datadog
    # before rolling fleet-wide. Rollback = delete this command override (anchor applies).
    command: >
        sglang serve
        --trust-remote-code
        --model-path deepseek-ai/DeepSeek-V4-Flash
        --revision 553034d7dd9e06c2eeaee68cf85a17d6d4754cf0
        --tp 2
        --moe-runner-backend marlin
        --cuda-graph-max-bs 64
        --mem-fraction-static 0.83
        --max-running-requests 64
        --max-queued-requests 16
        --schedule-conservativeness 1.3
        --enable-mixed-chunk
