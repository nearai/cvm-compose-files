# DeepSeek-V4-Flash W4A8 (INT4 weights + FP8 dynamic-token activations) on vLLM.
# MODEL-ONLY, co-tenant-safe compose file (one service per file; the proxy /
# nginx / registrar / observability live in their own compose files/projects).
#
# Deploy as its OWN compose-manager project so its `--remove-orphans` can never
# evict a resident model:  POST /compose/up { "project": "dsv4-w4a8", ... }.
# (Never use the reserved `work`/`dstack` project names.)
#
# Co-tenant safe: publishes NO host ports. The model is reachable on the shared
# `dstack_default` network by container name (model-vllm-dsv4-flash-w4a8:8000) —
# a sibling proxy/nginx compose file connects to it there. Smoke-test from the
# host without binding a port:
#   docker run --rm --network dstack_default curlimages/curl \
#     -sf http://model-vllm-dsv4-flash-w4a8:8000/v1/models
#
# Model: endnai/DeepSeek-V4-Flash-W4A8-FP8 (config/recipe only), materialized at
# start from the canada-quant W4A16 base weights + the W4A8 config.json. In a
# Hopper sweep this was the fastest TP2 config (best prefill TTFT + per-GPU
# throughput); ties W4A16, beats FP4-marlin ~9-13%. vLLM-only. See the model card.
#
# Configurable (env / .env):
#   DSV4_GPU_IDS   physical GPU ids for the server (default 0,1)
#   DSV4_TP        tensor-parallel size — must equal the number of ids (default 2)
#   DSV4_MAX_MODEL_LEN / DSV4_MAX_NUM_SEQS / DSV4_GPU_MEM_UTIL
# e.g. TP4:  DSV4_GPU_IDS=0,1,2,3  DSV4_TP=4
#
# The image is built inline (build.dockerfile_inline): vLLM nightly + 3 DSV4-Flash
# compressed-tensors load patches. NOTE: not yet build-validated on-host; the
# patches are anchor-checked (fail the build loudly) and pinned to a nightly
# digest that may need bumping if an anchor has drifted. Stage first with
# compose-manager `materialize_only:true` to validate the build + prefetch weights.

x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs,com.docker.compose.service"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  # Built inline from the model service's build.dockerfile_inline (vLLM nightly
  # + DSV4-Flash compressed-tensors load patches), tagged with this local name.
  image: dsv4-flash-w4a8-vllm:local
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
    - w4a8_model:/models
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # GPU selection + TP are configurable. NVIDIA_VISIBLE_DEVICES picks the
    # physical GPUs; DSV4_TP must equal the number of IDs listed.
    - NVIDIA_VISIBLE_DEVICES=${DSV4_GPU_IDS:-0,1}
    - DSV4_TP=${DSV4_TP:-2}
    - DSV4_MAX_MODEL_LEN=${DSV4_MAX_MODEL_LEN:-28000}
    - DSV4_MAX_NUM_SEQS=${DSV4_MAX_NUM_SEQS:-64}
    - DSV4_GPU_MEM_UTIL=${DSV4_GPU_MEM_UTIL:-0.85}
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - VLLM_CACHE_ROOT=/root/.cache/vllm/deepseek-v4-flash-w4a8
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

services:
  model-vllm-dsv4-flash-w4a8:
    <<: *vllm-common
    container_name: model-vllm-dsv4-flash-w4a8
    # Inline-built image (self-contained): vLLM nightly + 3 DSV4-Flash
    # compressed-tensors load patches. GPU IDs + TP are configurable via the
    # anchor env (NVIDIA_VISIBLE_DEVICES / DSV4_TP). The W4A8 checkpoint is
    # materialized on first start (base weights + W4A8 config).
    build:
      dockerfile_inline: |
        # syntax=docker/dockerfile:1
        # Base must be a vLLM nightly with the refactored models/deepseek_v4/nvidia/
        # layout (>= PR #43004, 2026-05-19). Patches are anchor-checked + idempotent:
        # the build fails loudly if a future base drifts an anchor.
        FROM vllm/vllm-openai@sha256:03768d9400bf490934e5dce2e9d8ddd9e004a5054939e14641188d8a9b69db8e
        # Patch 1/3: allow DSV4 `hash_moe` past transformers' global layer-type validator.
        RUN <<'DONE'
        set -e
        cat > /tmp/p_allow.py <<'PY'
        #!/usr/bin/env python3
        """Add 'hash_moe' to transformers' global ALLOWED_LAYER_TYPES so the strict
        huggingface_hub dataclass field-validator on `mlp_layer_types` accepts the
        DSV4-Flash hash_moe layers. The DSV4-narrowed DEEPSEEK_V4_MLP_LAYER_TYPES
        already includes hash_moe; only the global gate (checked first) lacks it.
        Idempotent."""
        import transformers, os, sys
        f = os.path.join(os.path.dirname(transformers.__file__), "configuration_utils.py")
        src = open(f).read()
        ANCHOR = '    "deepseek_sparse_attention",  # for models with DSA indexer (GLM MoE DSA, DeepSeek V32)\n'
        if '"hash_moe"' in src:
            print("already patched:", f); sys.exit(0)
        if ANCHOR not in src:
            print("ERROR: anchor not found in", f, file=sys.stderr); sys.exit(1)
        open(f, "w").write(src.replace(ANCHOR, ANCHOR + '    "hash_moe",  # DSV4-Flash frozen-hash routed MoE (PATCH)\n', 1))
        print("patched ALLOWED_LAYER_TYPES in", f)
        PY
        python3 /tmp/p_allow.py
        DONE
        # Patch 2/3: packed_modules_mapping on DeepseekV4ForCausalLM (FP8-block attn load).
        RUN <<'DONE'
        set -e
        cat > /tmp/p_fc.py <<'PY'
        #!/usr/bin/env python3
        """Add packed_modules_mapping to DeepseekV4ForCausalLM (post-refactor path).

        vLLM PR #43004-#43077 (2026-05-19) moved deepseek_v4 from
        ``vllm/model_executor/models/deepseek_v4.py`` to
        ``vllm/models/deepseek_v4/nvidia/model.py``. The class definition and the
        hf_to_vllm_mapper anchor are otherwise unchanged from the pre-refactor layout.

        Why this patch is still needed: kylesayrs's PR #41276 references
        ``self.packed_modules_mapping`` (used by is_layer_skipped() and the
        compressed-tensors loader to resolve fused module names) but never defines it
        on the class. Without this attribute, FP8_BLOCK on attention fails to load
        with:
            ValueError: Unable to find matching target for
            model.layers.0.attn.fused_wqa_wkv in the compressed-tensors config.

        Idempotent — re-running on an already-patched tree exits cleanly.

        Usage:
            python scripts/patch_v4_forcausal_packed_mapping.py "$$(python -c 'import vllm; print(vllm.__path__[0])')"
        """
        import sys
        from pathlib import Path

        ANCHOR = '''class DeepseekV4ForCausalLM(nn.Module, SupportsPP):
            model_cls = DeepseekV4Model

            # Default mapper assumes the original FP4-expert checkpoint layout.
            # Overridden per-instance in __init__ when expert_dtype != "fp4".
            hf_to_vllm_mapper = _make_deepseek_v4_weights_mapper("fp4")'''

        REPLACEMENT = '''class DeepseekV4ForCausalLM(nn.Module, SupportsPP):
            model_cls = DeepseekV4Model

            # Default mapper assumes the original FP4-expert checkpoint layout.
            # Overridden per-instance in __init__ when expert_dtype != "fp4".
            hf_to_vllm_mapper = _make_deepseek_v4_weights_mapper("fp4")

            # PATCH (paul/dsv4): mapping from fused module names to their constituent
            # shard names. Used by is_layer_skipped() and the compressed-tensors loader
            # to determine the quantization scheme for fused layers (which are constructed
            # at vLLM init from the underlying ColumnParallelLinear shards). Without this,
            # FP8_BLOCK on attn fails with "Unable to find matching target for
            # model.layers.0.attn.fused_wqa_wkv".
            packed_modules_mapping = {
                "fused_wqa_wkv": ["wq_a", "wkv"],
                "fused_wkv_wgate": ["wkv", "wgate"],
                "gate_up_proj": ["w1", "w3"],
            }'''


        def main():
            if len(sys.argv) != 2:
                print(f"usage: {sys.argv[0]} <vllm_pkg_root>", file=sys.stderr)
                sys.exit(2)

            vllm_root = Path(sys.argv[1])
            target = vllm_root / "models" / "deepseek_v4" / "nvidia" / "model.py"

            if not target.exists():
                print(f"ERROR: {target} not found", file=sys.stderr)
                sys.exit(1)

            src = target.read_text()

            if "packed_modules_mapping" in src and "fused_wqa_wkv" in src:
                print(f"already patched: {target}")
                return

            if ANCHOR not in src:
                print(f"ERROR: anchor not found in {target}", file=sys.stderr)
                sys.exit(1)

            target.write_text(src.replace(ANCHOR, REPLACEMENT))
            print(f"patched: {target}")


        if __name__ == "__main__":
            main()
        PY
        python3 /tmp/p_fc.py "$$(python3 -c 'import vllm; print(vllm.__path__[0])')"
        DONE
        # Patch 3/3: o_proj weight_scale name alias (wo_a.weight_scale_inv fallback).
        RUN <<'DONE'
        set -e
        cat > /tmp/p_oproj.py <<'PY'
        #!/usr/bin/env python3
        """o_proj.py name-alias fix (ports PR #43290 / patch_nvidia_attn_scale.py to
        nightly's refactored deep_gemm_fp8_o_proj). The W4A16-FP8 checkpoint stores the
        FP8-block attention scale as compressed-tensors `weight_scale` (no `_inv`); the
        model weights-mapper only remaps keys ending in `.scale`, so `wo_a` keeps
        `weight_scale` and the hard `wo_a.weight_scale_inv` ref crashes. They are the
        SAME tensor (name alias, not reciprocal). Idempotent."""
        import vllm, os, sys
        f = os.path.join(os.path.dirname(vllm.__file__), "models/deepseek_v4/nvidia/ops/o_proj.py")
        src = open(f).read()
        OLD = '''    fp8_einsum(
                "bhr,hdr->bhd",
                (o_fp8, o_scale),
                (wo_a.weight, wo_a.weight_scale_inv),
                z,
                recipe=einsum_recipe,
            )'''
        NEW = '''    # PATCH (paul/dsv4 port): compressed-tensors stores the scale as
            # `weight_scale` (no `_inv`); same tensor, different name. Fall back.
            wo_a_scale = getattr(wo_a, "weight_scale_inv", None)
            if wo_a_scale is None:
                wo_a_scale = wo_a.weight_scale
            fp8_einsum(
                "bhr,hdr->bhd",
                (o_fp8, o_scale),
                (wo_a.weight, wo_a_scale),
                z,
                recipe=einsum_recipe,
            )'''
        if "wo_a_scale = getattr(wo_a" in src:
            print("already patched:", f); sys.exit(0)
        if OLD not in src:
            print("ERROR anchor not found in", f, file=sys.stderr); sys.exit(1)
        open(f,"w").write(src.replace(OLD, NEW, 1))
        print("patched:", f)
        PY
        python3 /tmp/p_oproj.py
        DONE
        # Materialize + serve entrypoint.
        RUN <<'DONE'
        cat > /opt/serve_w4a8.sh <<'SH'
        #!/usr/bin/env bash
        set -euo pipefail
        MODEL_DIR=/models/DeepSeek-V4-Flash-W4A8-FP8
        # Materialize on first start: base INT4 weights from canada-quant, then overlay
        # the W4A8 config.json from endnai (weights are byte-identical; only the expert
        # input_activations differ). Skipped if already present on the mounted volume.
        if [ ! -s "$$MODEL_DIR/config.json" ] || [ ! -e "$$MODEL_DIR/model.safetensors.index.json" ]; then
          echo "Materializing W4A8 checkpoint (base INT4 weights + W4A8 config)..."
          hf download canada-quant/DeepSeek-V4-Flash-W4A16-FP8-MTP --local-dir "$$MODEL_DIR"
          hf download endnai/DeepSeek-V4-Flash-W4A8-FP8 config.json README.md --local-dir "$$MODEL_DIR"
        fi
        exec vllm serve "$$MODEL_DIR" \
          --served-model-name deepseek-ai/DeepSeek-V4-Flash-W4A8 \
          --tensor-parallel-size "$${DSV4_TP:-2}" \
          --kv-cache-dtype fp8 --block-size 256 \
          --max-model-len "$${DSV4_MAX_MODEL_LEN:-28000}" \
          --max-num-seqs "$${DSV4_MAX_NUM_SEQS:-64}" \
          --gpu-memory-utilization "$${DSV4_GPU_MEM_UTIL:-0.85}" \
          --enable-prefix-caching \
          --tokenizer-mode deepseek_v4 \
          --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
          --reasoning-parser deepseek_v4 \
          --disable-custom-all-reduce \
          --enable-prompt-tokens-details \
          --trust-remote-code \
          --host 0.0.0.0 --port 8000
        SH
        chmod +x /opt/serve_w4a8.sh
        DONE
        ENTRYPOINT ["/opt/serve_w4a8.sh"]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"vllm","service":"vllm","tags":["model:deepseek-ai/DeepSeek-V4-Flash-W4A8","model_path:endnai/DeepSeek-V4-Flash-W4A8-FP8","precision:w4a8","deployment:deepseek-v4-flash-w4a8-vllm","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}","port:8000"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-dsv4-flash-w4a8:8000/metrics","histogram_buckets_as_distributions":true,"service":"model-vllm-dsv4-flash-w4a8","tags":["model:deepseek-ai/DeepSeek-V4-Flash-W4A8","model_path:endnai/DeepSeek-V4-Flash-W4A8-FP8","precision:w4a8","deployment:deepseek-v4-flash-w4a8-vllm","ip:${HOST_IP}","port:8000"]}]'
      nearai.otel.scrape: "true"
      nearai.otel.job: "vllm"
      nearai.otel.service: "vllm"
      nearai.otel.source: "vllm"
      nearai.otel.container_name: "model-vllm-dsv4-flash-w4a8"
      nearai.otel.port: "8000"
      nearai.otel.path: "/metrics"
      nearai.otel.model: "deepseek-ai/DeepSeek-V4-Flash-W4A8"
      nearai.otel.deployment: "deepseek-v4-flash-w4a8-vllm"
      nearai.otel.env: "${ENV}"
      nearai.otel.host: "${CVM_HOST}"
      nearai.otel.host_machine: "${CVM_HOST}"
      nearai.otel.cvm_name: "${CVM_NAME}"
      nearai.otel.ip: "${HOST_IP}"

  otelcol-contrib:
    image: otel/opentelemetry-collector-contrib@sha256:85ac41c2db88d0df9bd6145e608a3cb023f5d8443868adbfbbf66efb51087917
    container_name: otelcol-contrib
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    user: "0:0"
    mem_limit: "768m"
    environment:
      - MONITORING_INGEST_TOKEN=${MONITORING_INGEST_TOKEN:-}
      - CVM_NAME=${CVM_NAME:-unknown}
      - CVM_HOST=${CVM_HOST:-unknown}
      - DD_HOSTNAME=${DD_HOSTNAME:-unknown}
      - ENV=${ENV:-unknown}
      - HOST_IP=${HOST_IP:-unknown}
    expose:
      - "4317"
      - "4318"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - otelcol_app_storage:/var/lib/otelcol-contrib
    configs:
      - source: otelcol_app_config
        target: /etc/otelcol-contrib/config.yaml
        mode: 0444
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      com.datadoghq.ad.logs: '[{"source":"otelcol-contrib","service":"otelcol-contrib","tags":["deployment:deepseek-v4-flash-w4a8-vllm","env:${ENV}","host:${CVM_HOST}","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  otelcol_app_storage:
  hugginface_cache:
  vllm_cache:
  w4a8_model:

configs:
  otelcol_app_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        filelog/docker_containers:
          include: [/var/lib/docker/containers/*/*-json.log]
          start_at: end
          storage: file_storage
          include_file_path: true
          operators:
            - type: json_parser
              parse_from: body
              parse_to: attributes
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
              on_error: send_quiet
            - type: move
              from: attributes.log
              to: body
              if: 'attributes.log != nil'
            - type: move
              from: attributes.stream
              to: attributes["log.iostream"]
              if: 'attributes.stream != nil'
            - type: remove
              field: attributes.time
              if: 'attributes.time != nil'
            - type: regex_parser
              parse_from: attributes["log.file.path"]
              regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]*/'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model:(?P<model>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'model_path:(?P<model_path>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'precision:(?P<precision>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'deployment:(?P<deployment>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'ip:(?P<ip>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'port:(?P<port>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'env:(?P<env>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'host:(?P<host>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'instance:(?P<instance>[^",\]]+)'
              on_error: send_quiet
            - type: regex_parser
              parse_from: attributes["attrs"]["com.datadoghq.ad.logs"]
              regex: 'replica:(?P<replica>[^",\]]+)'
              on_error: send_quiet
            - type: add
              field: attributes["service.name"]
              value: cvm-docker

        prometheus/apps:
          config:
            scrape_configs:
              - job_name: vllm-model-vllm-dsv4-flash-w4a8
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['model-vllm-dsv4-flash-w4a8:8000']
                    labels:
                      service: "vllm"
                      source: "vllm"
                      container_name: "model-vllm-dsv4-flash-w4a8"
                      model: "deepseek-ai/DeepSeek-V4-Flash-W4A8"
                      deployment: "deepseek-v4-flash-w4a8-vllm"
                      env: "${ENV}"
                      host: "${CVM_HOST}"
                      host_machine: "${CVM_HOST}"
                      cvm_name: "${CVM_NAME}"
                      ip: "${HOST_IP}"
                      port: "8000"
                      model_path: "endnai/DeepSeek-V4-Flash-W4A8-FP8"
                      precision: "w4a8"
        prometheus/self:
          config:
            scrape_configs:
              - job_name: otelcol-app
                scrape_interval: 30s
                static_configs:
                  - targets: ['localhost:8888']

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        resource:
          attributes:
            - key: host.name
              value: $${env:DD_HOSTNAME}
              action: upsert
            - key: cvm.name
              value: $${env:CVM_NAME}
              action: upsert
            - key: host.machine
              value: $${env:CVM_HOST}
              action: insert
            - key: deployment.environment
              value: $${env:ENV}
              action: upsert
            - key: service.namespace
              value: near-ai
              action: insert

        transform/docker_metadata:
          error_mode: ignore
          log_statements:
            - context: log
              statements:
                - set(attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                - set(attributes["service.name"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["log.source"], ParseJSON(attributes["attrs"]["com.datadoghq.ad.logs"])[0]["source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil
                - set(attributes["service"], attributes["service.name"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["service.name"] != nil
                - set(attributes["source"], attributes["log.source"]) where attributes["attrs"] != nil and attributes["attrs"]["com.datadoghq.ad.logs"] != nil and attributes["log.source"] != nil
                - set(attributes["container.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil

        filter/app_logs:
          error_mode: ignore
          logs:
            log_record:
              - 'attributes["model"] == nil and attributes["deployment"] == nil'
              - 'attributes["service.name"] == "compose-manager"'
              - 'attributes["service.name"] == "compose-manager-launcher"'
              - 'attributes["service.name"] == "otelcol-management"'
              - 'attributes["service.name"] == "otelcol-contrib"'
              - 'attributes["service.name"] == "datadog-agent"'

        groupbyattrs/docker_service:
          keys:
            - service.name
            - service
            - container.name
            - log.source
            - source
            - log.iostream
            - model
            - model_path
            - precision
            - deployment
            - env
            - host
            - ip
            - port
            - instance
            - replica

        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 5s

      exporters:
        otlphttp/gateway:
          endpoint: https://telemetry.infra.near.ai
          headers:
            Authorization: "Bearer $${env:MONITORING_INGEST_TOKEN}"
          sending_queue:
            queue_size: 128
            storage: file_storage

      extensions:
        file_storage:
          directory: /var/lib/otelcol-contrib/storage
          create_directory: true

      service:
        extensions: [file_storage]
        pipelines:
          logs/app:
            receivers: [filelog/docker_containers]
