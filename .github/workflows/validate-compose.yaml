name: Validate Compose Files

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUBY_VALIDATION_IMAGE: ruby:3.3-alpine@sha256:940f1f8ba78c93b303eb2a632b249792cf60435517da260f3a1b9c8b8f1e7dfe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate OTel label contracts
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 512m \
            --cpus 2 \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --user 65534:65534 \
            -v "$PWD:/repo:ro" \
            -w /repo \
            "$RUBY_VALIDATION_IMAGE" \
            ruby scripts/validate_otel_labels.rb

      - name: Test OTel label contract failures
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 512m \
            --cpus 2 \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --user 65534:65534 \
            -v "$PWD:/repo:ro" \
            -w /repo \
            "$RUBY_VALIDATION_IMAGE" \
            ruby scripts/test_validate_otel_labels.rb

      - name: Validate proxy dependency contracts
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 512m \
            --cpus 2 \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --user 65534:65534 \
            -v "$PWD:/repo:ro" \
            -w /repo \
            "$RUBY_VALIDATION_IMAGE" \
            ruby scripts/validate_proxy_dependencies.rb

      - name: Validate proxy environment contracts
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 512m \
            --cpus 2 \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --user 65534:65534 \
            -v "$PWD:/repo:ro" \
            -w /repo \
            "$RUBY_VALIDATION_IMAGE" \
            ruby scripts/validate_proxy_environment.rb

      - name: Validate registrar auth contracts
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 512m \
            --cpus 2 \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --user 65534:65534 \
            -v "$PWD:/repo:ro" \
            -w /repo \
            "$RUBY_VALIDATION_IMAGE" \
            ruby scripts/validate_registrar_auth.rb

      - name: Validate docker compose files
        # Compose files reference env vars that are populated at deploy time
        # by compose-manager (or the operator). CI doesn't have the real
        # secrets, but we still want to validate compose syntax + structure.
        # Provide dummy non-empty values so `${VAR:?required ...}` markers
        # used for fail-fast at deploy time don't trip the CI check.
        env:
          # Common across all compose files
          HOST_IP: 127.0.0.1
          MONITORING_INGEST_TOKEN: ci-dummy
          CVM_NAME: compose-manager
          CVM_HOST: gpu26
          DD_HOSTNAME: gpu26-compose-manager
          ENV: prod
          HUGGING_FACE_HUB_TOKEN: ci-dummy
          CLOUD_API_USAGE_TOKEN: ci-dummy
          MODEL_PROXY_TOKEN: ci-dummy
          PROXY_TOKEN: ci-dummy
          WEB_CONTEXT_SEARCH_URL: http://ci-dummy
          WEB_CONTEXT_SEARCH_API_KEY: ci-dummy
          # Fusion (server-side multi-model deliberation); at deploy time
          # FUSION_INTERNAL_BEARER_TOKEN mirrors PROXY_TOKEN, both from compose-manager.
          FUSION_ENABLED: "true"
          FUSION_INTERNAL_BEARER_TOKEN: ci-dummy
        run: |
          exit_code=0
          for file in prod/*.yaml experiments/*.yaml *.yaml; do
            [ -f "$file" ] || continue
            echo "Validating $file..."
            if ! docker compose -f "$file" config --format=yaml > /dev/null 2>&1; then
              echo "::error file=$file::Invalid compose file"
              docker compose -f "$file" config --format=yaml
              exit_code=1
            else
              echo "$file OK"
            fi
          done
          exit $exit_code

      - name: Validate embedded OTel collector configs
        env:
          HOST_IP: 127.0.0.1
          MONITORING_INGEST_TOKEN: ci-dummy
          CVM_NAME: compose-manager
          CVM_HOST: gpu26
          DD_HOSTNAME: gpu26-compose-manager
          ENV: prod
          HUGGING_FACE_HUB_TOKEN: ci-dummy
          CLOUD_API_USAGE_TOKEN: ci-dummy
          MODEL_PROXY_TOKEN: ci-dummy
          PROXY_TOKEN: ci-dummy
          WEB_CONTEXT_SEARCH_URL: http://ci-dummy
          WEB_CONTEXT_SEARCH_API_KEY: ci-dummy
          # Fusion (server-side multi-model deliberation); at deploy time
          # FUSION_INTERNAL_BEARER_TOKEN mirrors PROXY_TOKEN, both from compose-manager.
          FUSION_ENABLED: "true"
          FUSION_INTERNAL_BEARER_TOKEN: ci-dummy
        run: |
          set -euo pipefail
          for file in prod/*.yaml experiments/*.yaml *.yaml; do
            [ -f "$file" ] || continue
            config="$(docker compose -f "$file" config --format=json | jq -r '.configs.otelcol_app_config.content // empty')"
            if [ -z "$config" ]; then
              continue
            fi
            image="$(docker compose -f "$file" config --format=json | jq -r '.services["otelcol-contrib"].image')"
            echo "Validating embedded OTel config in $file with $image..."
            printf '%s' "$config" | docker run --rm -i \
              --network none \
              --read-only \
              --cap-drop ALL \
              --security-opt no-new-privileges \
              --pids-limit 128 \
              --memory 512m \
              --cpus 2 \
              "$image" validate --config=/dev/stdin
          done
