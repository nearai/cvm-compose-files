name: Validate Compose Files

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, infra]
    steps:
      - uses: actions/checkout@v4

      - name: Validate OTel label contracts
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ruby:3.3-alpine \
            ruby scripts/validate_otel_labels.rb

      - name: Validate docker compose files
        # Compose files reference env vars that are populated at deploy time
        # by compose-manager (or the operator). CI doesn't have the real
        # secrets, but we still want to validate compose syntax + structure.
        # Provide dummy non-empty values so `${VAR:?required ...}` markers
        # used for fail-fast at deploy time don't trip the CI check.
        env:
          # Common across all compose files
          HOST_IP: 127.0.0.1
          MONITORING_INGEST_TOKEN: ci-dummy
          CVM_NAME: compose-manager
          CVM_HOST: gpu26
          DD_HOSTNAME: gpu26-compose-manager
          ENV: prod
          HUGGING_FACE_HUB_TOKEN: ci-dummy
          CLOUD_API_USAGE_TOKEN: ci-dummy
          MODEL_PROXY_TOKEN: ci-dummy
          PROXY_TOKEN: ci-dummy
          WEB_CONTEXT_SEARCH_URL: http://ci-dummy
          WEB_CONTEXT_SEARCH_API_KEY: ci-dummy
          # Fusion (server-side multi-model deliberation); at deploy time
          # FUSION_INTERNAL_BEARER_TOKEN mirrors PROXY_TOKEN, both from compose-manager.
          FUSION_ENABLED: "true"
          FUSION_INTERNAL_BEARER_TOKEN: ci-dummy
        run: |
          exit_code=0
          for file in *.yaml; do
            echo "Validating $file..."
            if ! docker compose -f "$file" config --format=yaml > /dev/null 2>&1; then
              echo "::error file=$file::Invalid compose file"
              docker compose -f "$file" config --format=yaml
              exit_code=1
            else
              echo "$file OK"
            fi
          done
          exit $exit_code

      - name: Validate embedded OTel collector configs
        env:
          HOST_IP: 127.0.0.1
          MONITORING_INGEST_TOKEN: ci-dummy
          CVM_NAME: compose-manager
          CVM_HOST: gpu26
          DD_HOSTNAME: gpu26-compose-manager
          ENV: prod
          HUGGING_FACE_HUB_TOKEN: ci-dummy
          CLOUD_API_USAGE_TOKEN: ci-dummy
          MODEL_PROXY_TOKEN: ci-dummy
          PROXY_TOKEN: ci-dummy
          WEB_CONTEXT_SEARCH_URL: http://ci-dummy
          WEB_CONTEXT_SEARCH_API_KEY: ci-dummy
          # Fusion (server-side multi-model deliberation); at deploy time
          # FUSION_INTERNAL_BEARER_TOKEN mirrors PROXY_TOKEN, both from compose-manager.
          FUSION_ENABLED: "true"
          FUSION_INTERNAL_BEARER_TOKEN: ci-dummy
        run: |
          set -euo pipefail
          for file in *.yaml; do
            config="$(docker compose -f "$file" config --format=json | jq -r '.configs.otelcol_app_config.content // empty')"
            if [ -z "$config" ]; then
              continue
            fi
            image="$(docker compose -f "$file" config --format=json | jq -r '.services["otelcol-contrib"].image')"
            echo "Validating embedded OTel config in $file with $image..."
            printf '%s' "$config" | docker run --rm -i "$image" validate --config=/dev/stdin
          done
