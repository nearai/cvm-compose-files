x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:ef446da93858b4938b90bfa0ff56f7d90d64c1c2f0e9fc8c04ad738c0fdda6c9
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-sglang-env:
  environment: &sglang-env
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1

x-dcgm-common: &dcgm-common
  image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
  runtime: nvidia
  cap_add:
    - SYS_ADMIN
  restart: unless-stopped
  logging: *logging-conf

x-dsv4-flash-common: &dsv4-flash-common
  <<: *nvidia
  init: true
  # TDX-CC incompatibilities trimmed:
  #   1. DeepEP+DP-attention: needs CUDA IPC across ranks (deep_ep.cpp:230
  #      'invalid argument') — dropped.
  #   2. Hierarchical cache w/ hicache_io_backend=direct + mem_layout=
  #      page_first_direct: uses GPUDirect/unified-memory paths that hit
  #      'cudaErrorNotSupported' on the first warmup tensor.to(non_blocking)
  #      under TDX-confidential GPU memory — dropped.
  image: lmsysorg/sglang:v0.5.12-cu129@sha256:9e02c8e1fe2790a1c445bd5f6814305fe43639a4adb01c8ad1e8e21e750bf581
  command: >
      sglang serve
      --trust-remote-code
      --model-path sgl-project/DeepSeek-V4-Flash-FP8
      --revision ae01d80c06cdfe30581edfd0e1c5449dc7ed7f17
      --tp 4
      --speculative-algo EAGLE
      --speculative-num-steps 1
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 2
      --cuda-graph-max-bs 128
      --max-running-requests 128
      --tool-call-parser deepseekv4
      --reasoning-parser deepseek-v4
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --log-requests-level 0
      --served-model-name deepseek-ai/DeepSeek-V4-Flash
      --enable-trace
      --otlp-traces-endpoint otelcol-sidecar:4317
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - SGLANG_ENABLE_SPEC_V2=1
    - SGLANG_DSV4_FP4_EXPERTS=0
    - SGLANG_ENABLE_UNIFIED_RADIX_TREE=1
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-qwen3-6-27b-common: &qwen3-6-27b-common
  <<: *nvidia
  init: true
  image: lmsysorg/sglang:v0.5.12-cu129@sha256:9e02c8e1fe2790a1c445bd5f6814305fe43639a4adb01c8ad1e8e21e750bf581
  command: >
      sglang serve
      --model-path Qwen/Qwen3.6-27B-FP8
      --tp 2
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --mem-fraction-static 0.85
      --max-running-requests 128
      --context-length 262144
      --num-continuous-decode-steps 5
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
      --enable-mixed-chunk
      --chunked-prefill-size 16384
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --trust-remote-code
      --log-requests-level 0
      --served-model-name Qwen/Qwen3.6-27B-FP8
      --enable-trace
      --otlp-traces-endpoint otelcol-sidecar:4317
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment: *sglang-env
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-gemma-4-31b-common: &gemma-4-31b-common
  <<: *nvidia
  init: true
  # https://lmsysorg.mintlify.app/cookbook/autoregressive/Google/Gemma4
  image: lmsysorg/sglang:gemma4@sha256:87cecd3c9f4d17632c44b2d7cd1a20c50377c42b461d9ca39b153b4bb2b6e6ae
  command: >
      sglang serve
      --model-path google/gemma-4-31B-it
      --revision ba74f5b6c647c0911554e50278d6f6f4477f9010
      --tp 2
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --mem-fraction-static 0.85
      --max-running-requests 64
      --chunked-prefill-size 8192
      --num-continuous-decode-steps 5
      --enable-mixed-chunk
      --disable-fast-image-processor
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 64}'
      --port 8000
      --host 0.0.0.0
      --enable-cache-report
      --enable-metrics
      --trust-remote-code
      --log-requests-level 0
      --served-model-name google/gemma-4-31B-it
      --enable-trace
      --otlp-traces-endpoint otelcol-sidecar:4317
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - kernel_cache:/root/.cache/deep_gemm
  environment: *sglang-env
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

services:
  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      # Unhealthy if the registration loop hasn't ticked in 3m (e.g. wedged
      # before the loop, or the loop died). Surfaces silent registrar failures
      # in `docker ps` / Datadog. See cvm-compose-files#57.
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  # --- DeepSeek-V4-Flash-FP8 (GPUs 0-3) — SGLang TP=4 DP=4 dp-attention + DeepEP ---

  vllm-proxy-dsv4-flash:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-dsv4-flash
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=deepseek-ai/DeepSeek-V4-Flash
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://vllm-dsv4-flash:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:deepseek-ai/DeepSeek-V4-Flash","ip:${HOST_IP}","port:8001"]}]'

  vllm-dsv4-flash:
    <<: *dsv4-flash-common
    container_name: vllm-dsv4-flash
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "sglang", "service": "sglang", "tags":["model:deepseek-ai/DeepSeek-V4-Flash","ip:${HOST_IP}","port:8001"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-dsv4-flash:8000/metrics", "metrics":["sglang:*"], "histogram_buckets_as_distributions": true, "service": "vllm-dsv4-flash", "tags":["model:deepseek-ai/DeepSeek-V4-Flash","ip:${HOST_IP}","port:8001"]}]'

  # --- Qwen3.6-27B-FP8 (GPUs 4-5) — SGLang TP=2 ---

  vllm-proxy-qwen3-6-27b:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-qwen3-6-27b
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.6-27B-FP8
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://vllm-qwen3-6-27b:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:Qwen/Qwen3.6-27B-FP8", "ip:${HOST_IP}", "port:8002"]}]'

  vllm-qwen3-6-27b:
    <<: *qwen3-6-27b-common
    container_name: vllm-qwen3-6-27b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["4","5"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "sglang", "service": "sglang", "tags":["model:Qwen/Qwen3.6-27B-FP8","ip:${HOST_IP}","port:8002"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-qwen3-6-27b:8000/metrics", "metrics":["sglang:*"], "histogram_buckets_as_distributions": true, "service": "vllm-qwen3-6-27b", "tags":["model:Qwen/Qwen3.6-27B-FP8","ip:${HOST_IP}","port:8002"]}]'

  # --- Gemma-4-31B-it (GPUs 6-7) — SGLang TP=2 ---

  vllm-proxy-gemma-4-31b:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-gemma-4-31b
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=google/gemma-4-31B-it
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BASE_URL=http://vllm-gemma-4-31b:8000
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:google/gemma-4-31B-it", "ip:${HOST_IP}", "port:8003"]}]'

  vllm-gemma-4-31b:
    <<: *gemma-4-31b-common
    container_name: vllm-gemma-4-31b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["6","7"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["openmetrics"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source": "sglang", "service": "sglang", "tags":["model:google/gemma-4-31B-it","ip:${HOST_IP}","port:8003"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-gemma-4-31b:8000/metrics", "metrics":["sglang:*"], "histogram_buckets_as_distributions": true, "service": "vllm-gemma-4-31b", "tags":["model:google/gemma-4-31B-it","ip:${HOST_IP}","port:8003"]}]'

  # --- Per-model dcgm-exporters: device_ids scopes NVML to that model's GPUs ---

  dcgm-dsv4-flash:
    <<: *dcgm-common
    container_name: dcgm-dsv4-flash
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2","3"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:deepseek-ai/DeepSeek-V4-Flash","deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:deepseek-ai/DeepSeek-V4-Flash","deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'

  dcgm-qwen3-6-27b:
    <<: *dcgm-common
    container_name: dcgm-qwen3-6-27b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["4","5"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:Qwen/Qwen3.6-27B-FP8","deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:Qwen/Qwen3.6-27B-FP8","deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'

  dcgm-gemma-4-31b:
    <<: *dcgm-common
    container_name: dcgm-gemma-4-31b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["6","7"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["dcgm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint": "http://%%host%%:9400/metrics", "tags":["model:google/gemma-4-31B-it","deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'
      com.datadoghq.ad.logs: '[{"source": "dcgm-exporter", "service": "dcgm-exporter", "tags":["model:google/gemma-4-31B-it","deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'

  # --- Trial telemetry sidecar (Grafana Cloud + Better Stack OTLP fanout) ---
  # Receives SGLang request traces via OTLP/gRPC :4317, scrapes the 3 per-model
  # SGLang :8000/metrics and 3 dcgm-exporter :9400/metrics endpoints, fans
  # everything out to both trial vendors using the same OTLP endpoints + tokens
  # as the host-side otelcol-contrib (cvm-ansible-playbooks PR #270/#271).
  #
  # Trust note: Grafana / Better Stack ingest tokens (not query) live inside
  # this CVM as env vars. Worst case is spurious data into trial accounts; no
  # query/admin access. Removing this service is the disable path.
  otelcol-sidecar:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: otelcol-sidecar
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    # Trial-vendor secrets. Earlier revisions used `${VAR:?required ...}` for
    # fail-fast at `compose up` time, but that aborts the entire compose-up
    # (all 11 inference services along with the sidecar) when any var is
    # missing — too wide a blast radius for trial telemetry. Plain `${VAR}`
    # lets the sidecar render with empty endpoints, otelcol-contrib then
    # fails with a clear "endpoint must be a valid URL" in its own container
    # logs, and `restart: unless-stopped` crash-loops only the sidecar.
    # Inference traffic is unaffected.
    environment:
      - HOST_IP=${HOST_IP}
      - GRAFANA_OTEL_ENDPOINT=${GRAFANA_OTEL_ENDPOINT}
      - GRAFANA_OTEL_AUTH=${GRAFANA_OTEL_AUTH}
      - BETTERSTACK_OTEL_ENDPOINT=${BETTERSTACK_OTEL_ENDPOINT}
      - BETTERSTACK_OTEL_TOKEN=${BETTERSTACK_OTEL_TOKEN}
    configs:
      - source: otelcol_config
        target: /etc/otelcol-contrib/config.yaml
        mode: 0640
    restart: unless-stopped
    logging: *logging-conf
    labels:
      com.datadoghq.ad.logs: '[{"source": "otelcol-contrib", "service": "otelcol-sidecar", "tags":["deployment:dsv4-qwen36-gemma4","ip:${HOST_IP}"]}]'

networks:
  default:
    external: true
    name: dstack_default

volumes:
  hugginface_cache:
  vllm_cache:
  kernel_cache:
  certs:
    external: true
    name: certs

configs:
  otelcol_config:
    content: |
      # Trial telemetry sidecar — fans SGLang traces + per-model SGLang/DCGM
      # metrics out to Grafana Cloud + Better Stack via OTLP/HTTP. Mirrors the
      # exporters used by the host-side otelcol-contrib (cvm-ansible-playbooks
      # templates/otelcol_trial.yaml.j2) so both legs of the trial pipeline
      # receive identical fanout.
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

        prometheus:
          config:
            scrape_configs:
              - job_name: sglang
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['vllm-dsv4-flash:8000']
                    labels: {model: 'deepseek-ai/DeepSeek-V4-Flash'}
                  - targets: ['vllm-qwen3-6-27b:8000']
                    labels: {model: 'Qwen/Qwen3.6-27B-FP8'}
                  - targets: ['vllm-gemma-4-31b:8000']
                    labels: {model: 'google/gemma-4-31B-it'}
              - job_name: dcgm
                scrape_interval: 15s
                metrics_path: /metrics
                static_configs:
                  - targets: ['dcgm-dsv4-flash:9400']
                    labels: {model: 'deepseek-ai/DeepSeek-V4-Flash'}
                  - targets: ['dcgm-qwen3-6-27b:9400']
                    labels: {model: 'Qwen/Qwen3.6-27B-FP8'}
                  - targets: ['dcgm-gemma-4-31b:9400']
                    labels: {model: 'google/gemma-4-31B-it'}
              - job_name: otel-self
                scrape_interval: 30s
                static_configs:
                  - targets: ['127.0.0.1:8888']

      processors:
        # Must be first in every pipeline; protects the collector under burst
        # traffic. Numbers mirror the host-side template.
        memory_limiter:
          check_interval: 1s
          limit_mib: 512
          spike_limit_mib: 128

        # host.name is hardcoded to the inventory hostname so this collector's
        # signals correlate with the host-side collector
        # (cvm-ansible-playbooks templates/otelcol_trial.yaml.j2 uses
        # `{{ inventory_hostname }}` → "gpu23"). Keep the IP as a separate
        # attribute for IP-based queries. If this compose ever moves to a
        # different host, update host.name and trial.cohort accordingly.
        resource:
          attributes:
            - {key: host.name,              value: gpu23,                            action: insert}
            - {key: host.ip,                value: "$${env:HOST_IP}",                action: insert}
            - {key: service.namespace,      value: near-ai-inference,                action: insert}
            - {key: deployment.environment, value: trial,                            action: insert}
            - {key: trial.cohort,           value: gpu23-dsv4-qwen36-gemma4,         action: insert}

        batch:
          send_batch_size: 8192
          timeout: 5s

      exporters:
        otlphttp/grafana:
          endpoint: $${env:GRAFANA_OTEL_ENDPOINT}
          headers:
            Authorization: $${env:GRAFANA_OTEL_AUTH}

        otlphttp/betterstack:
          endpoint: $${env:BETTERSTACK_OTEL_ENDPOINT}
          headers:
            Authorization: "Bearer $${env:BETTERSTACK_OTEL_TOKEN}"

      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/grafana, otlphttp/betterstack]

          metrics:
            receivers: [otlp, prometheus]
            processors: [memory_limiter, resource, batch]
            exporters: [otlphttp/grafana, otlphttp/betterstack]

        telemetry:
          metrics:
            address: 127.0.0.1:8888
          logs:
            level: info

  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      TLS_PORT=8444

      for port in 8001 8002 8003; do
        eval "REG_$$port=false"
        eval "FAIL_COUNT_$$port=0"
      done

      register_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$TLS_PORT}" || true
      }

      unregister_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering all endpoints"
        for port in 8001 8002 8003; do
          unregister_endpoint "$${HOST_IP}:$$port"
        done
        exit 0
      }
      trap cleanup TERM INT

      check_chat() {
        curl -sf --max-time 45 -X POST "http://$$1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$2\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}" \
          > /dev/null 2>&1
      }

      check_port() {
        case $$1 in
          8001) check_chat vllm-dsv4-flash "deepseek-ai/DeepSeek-V4-Flash" ;;
          8002) check_chat vllm-qwen3-6-27b "Qwen/Qwen3.6-27B-FP8" ;;
          8003) check_chat vllm-gemma-4-31b "google/gemma-4-31B-it" ;;
        esac
      }

      # Probe the host-published nginx port via HOST_IP instead of the
      # "nginx" compose DNS name. A stale/abandoned docker service-name
      # resolution (e.g. after nginx is recreated) otherwise wedges this
      # readiness gate forever and silently drops every model to 0 backends.
      # Bounded + loud so a persistent probe failure falls through to the
      # registration loop (which health-checks each backend directly) instead
      # of hanging here forever. See cvm-compose-files#57.
      READY_URL="http://$${HOST_IP}:8001/v1/models"
      echo "Waiting for first model to be ready (probing $$READY_URL)..."
      ready_attempts=0
      until curl --connect-timeout 5 --max-time 10 -sf "$$READY_URL" > /dev/null 2>&1; do
        ready_attempts=$$((ready_attempts + 1))
        if [ "$$ready_attempts" -ge 30 ]; then
          echo "WARN: first model not reachable at $$READY_URL after $$ready_attempts attempts (~20m); entering registration loop anyway (each backend is health-checked directly before registering)"
          break
        fi
        echo "First model not ready yet (attempt $$ready_attempts/30), retrying in 30s..."
        sleep 30
      done
      echo "First model ready, starting registration loop"

      while true; do
        for port in 8001 8002 8003; do
          # Liveness marker for the container healthcheck (see service def);
          # refreshed each port so a slow-but-progressing serial loop is not
          # falsely marked unhealthy. See cvm-compose-files#57.
          date +%s > /tmp/registrar_alive
          eval "was_reg=\$$REG_$$port"
          eval "fails=\$$FAIL_COUNT_$$port"
          if check_port $$port; then
            eval "FAIL_COUNT_$$port=0"
            register_endpoint "$${HOST_IP}:$$port" "$$TLS_PORT"
            if [ "$$was_reg" = false ]; then
              echo "Registered $${HOST_IP}:$$port"
            fi
            eval "REG_$$port=true"
          else
            fails=$$((fails + 1))
            eval "FAIL_COUNT_$$port=$$fails"
            echo "Health check failed for $${HOST_IP}:$$port (fail count: $$fails)"
            eval "REG_$$port=false"
          fi
        done

        register_model "deepseek-ai/DeepSeek-V4-Flash" "dsv4-flash.completions.near.ai"
        register_model "Qwen/Qwen3.6-27B-FP8" "qwen3-6-27b.completions.near.ai"
        register_model "google/gemma-4-31B-it" "gemma-4-31b.completions.near.ai"
        # Refresh liveness after the register_model calls, before the long sleep.
        date +%s > /tmp/registrar_alive
        sleep 60
      done
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{'  '"time":"$$time_iso8601"'
        ',"request_id":"$$http_x_request_id"'
        ',"org_id":"$$http_x_org_id"'
        ',"workspace_id":"$$http_x_workspace_id"'
        ',"http_host":"$$host"'
        ',"method":"$$request_method"'
        ',"uri":"$$uri"'
        ',"status":$$status'
        ',"request_length":$$request_length'
        ',"bytes_sent":$$bytes_sent'
        ',"request_time":$$request_time'
        ',"upstream_addr":"$$upstream_addr"'
        '}';

      access_log /var/log/nginx/access.log json_combined;

      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;
      client_body_buffer_size 1m;

      # :8001 - DeepSeek-V4-Flash
      server {
          listen 8001;
          location / { proxy_pass http://vllm-proxy-dsv4-flash:8000; }
      }

      # :8002 - Qwen3.6-27B-FP8
      server {
          listen 8002;
          location / { proxy_pass http://vllm-proxy-qwen3-6-27b:8000; }
      }

      # :8003 - Gemma-4-31B-it
      server {
          listen 8003;
          location / { proxy_pass http://vllm-proxy-gemma-4-31b:8000; }
      }

      # ── TLS server blocks (port 443 = host 8444) ──

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      # Each model accepts both its canonical SNI and the rotation-SNI form
      # `<canonical>-i<N>.completions.near.ai` used by cloud-api's discovery.
      # See nearai/infra#143 / nearai/model-proxy#30.

      server {
          listen 443 ssl http2;
          server_name dsv4-flash.completions.near.ai
                      ~^dsv4-flash-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-dsv4-flash:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name qwen3-6-27b.completions.near.ai
                      ~^qwen3-6-27b-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-qwen3-6-27b:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name gemma-4-31b.completions.near.ai
                      ~^gemma-4-31b-i\d+\.completions\.near\.ai$$;
          keepalive_timeout 1h;
          keepalive_requests 1000000;
          location / { proxy_pass http://vllm-proxy-gemma-4-31b:8000; }
      }
