x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  image: vllm/vllm-openai@sha256:03768d9400bf490934e5dce2e9d8ddd9e004a5054939e14641188d8a9b69db8e
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
  environment: &vllm-env
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - VLLM_CACHE_ROOT=/root/.cache/vllm/nvfp4-balanced
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:c176aeb163641f757f2a66b0e15bc4cbc2aeb6f27d6589729d03734fb4302ea8
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

x-dcgm-common: &dcgm-common
  image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
  runtime: nvidia
  cap_add:
    - SYS_ADMIN
  restart: unless-stopped
  logging: *logging-conf

x-qwen36-nvfp4-common: &qwen36-nvfp4-common
  <<: *vllm-common
  command: >
    nvidia/Qwen3.6-35B-A3B-NVFP4
    --revision 6c7f09d4036e97393f82e9f9ecd1a5c35ca5ee92
    --served-model-name Qwen/Qwen3.6-35B-A3B-NVFP4-X4
    --tensor-parallel-size 1
    --trust-remote-code
    --dtype auto
    --quantization modelopt
    --kv-cache-dtype fp8
    --gpu-memory-utilization 0.90
    --max-model-len 65536
    --max-num-seqs 16
    --max-num-batched-tokens 16384
    --enable-chunked-prefill
    --async-scheduling
    --enable-prefix-caching
    --reasoning-parser qwen3
    --enable-prompt-tokens-details

x-gemma4-nvfp4-common: &gemma4-nvfp4-common
  <<: *vllm-common
  command: >
    nvidia/Gemma-4-31B-IT-NVFP4
    --revision e5ef03afa233c35cb000323ff098d4291e1dd07c
    --served-model-name nvidia/Gemma-4-31B-IT-NVFP4-X2
    --tensor-parallel-size 2
    --trust-remote-code
    --dtype auto
    --quantization modelopt
    --gpu-memory-utilization 0.90
    --max-model-len 65536
    --max-num-seqs 16
    --max-num-batched-tokens 16384
    --enable-chunked-prefill
    --enable-prefix-caching
    --async-scheduling
    --enable-prompt-tokens-details

services:
  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  # Qwen3.6-35B-A3B NVFP4 x4, one replica per GPU (GPUs 0-3).
  vllm-proxy-qwen36-nvfp4-x4:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-qwen36-nvfp4-x4
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.6-35B-A3B-NVFP4-X4
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BACKEND_URLS=http://model-vllm-qwen36-nvfp4-1:8000,http://model-vllm-qwen36-nvfp4-2:8000,http://model-vllm-qwen36-nvfp4-3:8000,http://model-vllm-qwen36-nvfp4-4:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:Qwen/Qwen3.6-35B-A3B-NVFP4-X4","precision:nvfp4","deployment:qwen36-gemma4-nvfp4-balanced","ip:${HOST_IP}","port:8000"]}]'

  model-vllm-qwen36-nvfp4-1:
    <<: *qwen36-nvfp4-common
    container_name: model-vllm-qwen36-nvfp4-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    labels:
      com.datadoghq.ad.check_names: '["vllm"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.logs: '[{"source":"vllm","service":"vllm","tags":["model:Qwen/Qwen3.6-35B-A3B-NVFP4-X4","model_path:nvidia/Qwen3.6-35B-A3B-NVFP4","precision:nvfp4","deployment:qwen36-gemma4-nvfp4-balanced","ip:${HOST_IP}","port:8000","instance:1"]}]'
      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://model-vllm-qwen36-nvfp4-1:8000/metrics","histogram_buckets_as_distributions":true,"service":"model-vllm-qwen36-nvfp4-1","tags":["model:Qwen/Qwen3.6-35B-A3B-NVFP4-X4","model_path:nvidia/Qwen3.6-35B-A3B-NVFP4","precision:nvfp4","deployment:qwen36-gemma4-nvfp4-balanced","ip:${HOST_IP}","port:8000","instance:1"]}]'

