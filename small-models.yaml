networks:
  default:
    external: true
    name: dstack_default

volumes:
  hugginface_cache:
  vllm_cache:
  kernel_cache:
  certs:
    external: true
    name: certs

configs:
  registrar_script:
    content: |
      #!/bin/sh
      PROXY_URL="https://completions.near.ai"
      TOKEN="$${MODEL_PROXY_TOKEN}"
      TLS_PORT=8444

      # Track registration state per port
      for port in 8000 8001 8002 8003 8004 8005 8006 8007 8008 8009; do
        eval "REG_$$port=false"
        eval "FAIL_COUNT_$$port=0"
      done

      register_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\",\"routing_port\":$$TLS_PORT}" || true
      }

      unregister_endpoint() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/unregister/endpoint" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"endpoint\":\"$$1\"}" || true
      }

      register_model() {
        curl -sS --max-time 10 -X POST "$$PROXY_URL/register/model" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$1\",\"domain\":\"$$2\"}" || true
      }

      cleanup() {
        echo "SIGTERM received, unregistering all endpoints"
        for port in 8000 8001 8002 8003 8004 8005 8006 8007 8008 8009; do
          unregister_endpoint "$${HOST_IP}:$$port"
        done
        exit 0
      }
      trap cleanup TERM INT

      # Health check directly on backends (no auth needed on raw vLLM/SGLang containers)
      check_chat() {
        curl -sf --max-time 45 -X POST "http://$$1:8000/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$$2\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}" \
          > /dev/null 2>&1
      }

      check_port() {
        case $$1 in
          8000) check_chat vllm-qwen3-30b "Qwen/Qwen3-30B-A3B-Instruct-2507" ;;
          8001) check_chat vllm-gpt-oss-1 "openai/gpt-oss-120b" ;;
          8002) curl -sf --max-time 10 "http://vllm-flux-2-klein-4b-1:8000/v1/models" > /dev/null 2>&1 ;;
          8003) check_chat vllm-qwen3-vl "Qwen/Qwen3-VL-30B-A3B-Instruct" ;;
          8004) curl -sf --max-time 10 "http://vllm-qwen3-embeddings:8000/v1/models" > /dev/null 2>&1 ;;
          8005) curl -sf --max-time 10 "http://vllm-qwen3-reranker:8000/v1/models" > /dev/null 2>&1 ;;
          8006) curl -sf --max-time 10 "http://vllm-whisper3-large:8000/v1/models" > /dev/null 2>&1 ;;
          8007) curl -sf --max-time 10 "http://privacy-filter:8000/v1/models" > /dev/null 2>&1 ;;
          8008) check_chat vllm-qwen3-6-35b-1 "Qwen/Qwen3.6-35B-A3B-FP8" ;;
          8009) check_chat vllm-gemma-4-31b "google/gemma-4-31B-it" ;;
        esac
      }

      echo "Waiting for first model to be ready..."
      until curl -sf http://nginx:8000/v1/models > /dev/null 2>&1; do sleep 30; done
      echo "First model ready, starting registration loop"

      while true; do
        for port in 8000 8001 8002 8003 8004 8005 8006 8007 8008 8009; do
          eval "was_reg=\$$REG_$$port"
          eval "fails=\$$FAIL_COUNT_$$port"
          if check_port $$port; then
            eval "FAIL_COUNT_$$port=0"
            register_endpoint "$${HOST_IP}:$$port" "$$TLS_PORT"
            if [ "$$was_reg" = false ]; then
              echo "Registered $${HOST_IP}:$$port"
            fi
            eval "REG_$$port=true"
          else
            fails=$$((fails + 1))
            eval "FAIL_COUNT_$$port=$$fails"
            echo "Health check failed for $${HOST_IP}:$$port (fail count: $$fails)"
            eval "REG_$$port=false"
          fi
        done

        # Model-to-domain mappings
        register_model "Qwen/Qwen3-30B-A3B-Instruct-2507" "qwen3-30b.completions.near.ai"
        register_model "openai/gpt-oss-120b" "gpt-oss-120b.completions.near.ai"
        register_model "black-forest-labs/FLUX.2-klein-4B" "flux2-klein.completions.near.ai"
        register_model "Qwen/Qwen3-VL-30B-A3B-Instruct" "qwen3-vl-30b.completions.near.ai"
        register_model "Qwen/Qwen3-Embedding-0.6B" "qwen3-embedding.completions.near.ai"
        register_model "Qwen/Qwen3-Reranker-0.6B" "qwen3-reranker.completions.near.ai"
        register_model "openai/whisper-large-v3" "whisper-large-v3.completions.near.ai"
        register_model "openai/privacy-filter" "privacy-filter.completions.near.ai"
        register_model "Qwen/Qwen3.6-35B-A3B-FP8" "qwen3-6-35b.completions.near.ai"
        register_model "google/gemma-4-31B-it" "gemma-4-31b.completions.near.ai"
        sleep 60
      done
  nginx_conf:
    content: |
      # Common proxy settings
      proxy_http_version 1.1;
      proxy_set_header Host $$host;
      proxy_set_header X-Real-IP $$remote_addr;
      proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $$scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      client_max_body_size 100m;
      client_body_buffer_size 1m;

      # :8000 - Qwen3-30B
      server {
          listen 8000;
          location / { proxy_pass http://vllm-proxy-qwen3-30b:8000; }
      }

      # :8001 - GPT-OSS (single proxy, 2 backends)
      server {
          listen 8001;
          location / { proxy_pass http://vllm-proxy-gpt-oss:8000; }
      }

      # :8002 - FLUX (single proxy, 4 backends)
      server {
          listen 8002;
          location / { proxy_pass http://vllm-proxy-flux:8000; }
      }

      # :8003 - Qwen3-VL
      server {
          listen 8003;
          location / { proxy_pass http://vllm-proxy-qwen3-vl:8000; }
      }

      # :8004 - Embeddings
      server {
          listen 8004;
          location / { proxy_pass http://vllm-proxy-qwen3-embeddings:8000; }
      }

      # :8005 - Reranker
      server {
          listen 8005;
          location / { proxy_pass http://vllm-proxy-qwen3-reranker:8000; }
      }

      # :8006 - Whisper
      server {
          listen 8006;
          location / { proxy_pass http://vllm-proxy-whisper3-large:8000; }
      }

      # :8007 - Privacy-filter
      server {
          listen 8007;
          location / { proxy_pass http://vllm-proxy-privacy-filter:8000; }
      }

      # :8008 - Qwen3.6-35B-A3B-FP8
      server {
          listen 8008;
          location / { proxy_pass http://vllm-proxy-qwen3-6-35b:8000; }
      }

      # :8009 - Gemma-4-31B-it
      server {
          listen 8009;
          location / { proxy_pass http://vllm-proxy-gemma-4-31b:8000; }
      }

      # ── TLS server blocks (port 443 = host 8444) ──

      ssl_certificate /etc/letsencrypt/live/completions.near.ai/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/completions.near.ai/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;

      # Each model accepts both its canonical SNI and the rotation-SNI form
      # `<canonical>-i<N>.completions.near.ai` used by cloud-api's discovery
      # (model-proxy's parse_indexed_sni). Without the regex match, rotation
      # SNIs fall through to the default server (lexically first model) and
      # return the wrong model's signing pubkey, breaking E2EE — see
      # nearai/infra#143 and the L4-SNI-rewrite analysis in
      # nearai/model-proxy#30.

      server {
          listen 443 ssl http2;
          server_name qwen3-30b.completions.near.ai
                      ~^qwen3-30b-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-qwen3-30b:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name gpt-oss-120b.completions.near.ai
                      ~^gpt-oss-120b-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-gpt-oss:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name flux2-klein.completions.near.ai
                      ~^flux2-klein-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-flux:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name qwen3-vl-30b.completions.near.ai
                      ~^qwen3-vl-30b-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-qwen3-vl:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name qwen3-embedding.completions.near.ai
                      ~^qwen3-embedding-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-qwen3-embeddings:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name qwen3-reranker.completions.near.ai
                      ~^qwen3-reranker-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-qwen3-reranker:8000; }
      }

      server {
          listen 443 ssl http2;
          server_name whisper-large-v3.completions.near.ai
                      ~^whisper-large-v3-i\d+\.completions\.near\.ai$$;
          location / { proxy_pass http://vllm-proxy-whisper3-large:8000; }
      }

