  vllm-gemma-4-31b:
    <<: *vllm-common
    image: vllm/vllm-openai@sha256:518c1dc54c87d1320d969c6b827d75300ea2cca6908420c0ea5d221c38a6665d  # v0.20.2-cu129-ubuntu2404 — required for gemma4
