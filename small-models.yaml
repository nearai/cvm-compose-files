      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "vllm-proxy", "service": "vllm-proxy", "tags": ["model:openai/gpt-oss-120b", "ip:${HOST_IP}", "port:8001"]}]'

  vllm-gpt-oss-1:
    <<: *gpt-oss-common
    container_name: vllm-gpt-oss-1
    deploy:
      resources:
        reservations:
