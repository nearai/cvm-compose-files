  vllm-qwen3-vl:
    <<: *vllm-common
    image: vllm/vllm-openai@sha256:ccd6a6dbf4aba4e94c6f7052d1835d6e742082b6a5095276552e9b7a5a47c2e5
    container_name: vllm-qwen3-vl
