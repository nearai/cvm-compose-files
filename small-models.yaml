      com.datadoghq.ad.instances: '[{"openmetrics_endpoint":"http://vllm-flux-2-klein-4b-4:8000/metrics", "histogram_buckets_as_distributions": true, "service": "vllm-flux-2-klein-4b-4", "tags":["model:black-forest-labs/FLUX.2-klein-4B","ip:${HOST_IP}", "port:8002"]}]'

  # --- Qwen3-VL (GPUs 5-6) — single instance, single proxy ---

  vllm-proxy-qwen3-vl:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-qwen3-vl
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3-VL-30B-A3B-Instruct
