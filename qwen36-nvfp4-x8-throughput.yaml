x-logging-conf: &logging-conf
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    labels: "com.datadoghq.ad.logs"

x-nvidia: &nvidia
  runtime: nvidia
  ipc: host
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535

x-vllm-common: &vllm-common
  <<: *nvidia
  init: true
  image: vllm/vllm-openai@sha256:03768d9400bf490934e5dce2e9d8ddd9e004a5054939e14641188d8a9b69db8e
  command: >
    nvidia/Qwen3.6-35B-A3B-NVFP4
    --revision 6c7f09d4036e97393f82e9f9ecd1a5c35ca5ee92
    --served-model-name Qwen/Qwen3.6-35B-A3B-NVFP4-X8
    --tensor-parallel-size 1
    --trust-remote-code
    --dtype auto
    --quantization modelopt
    --kv-cache-dtype fp8
    --gpu-memory-utilization 0.90
    --max-model-len 65536
    --max-num-seqs 16
    --max-num-batched-tokens 16384
    --enable-chunked-prefill
    --async-scheduling
    --enable-prefix-caching
    --reasoning-parser qwen3
    --enable-prompt-tokens-details
  volumes:
    - hugginface_cache:/root/.cache/huggingface
    - vllm_cache:/root/.cache/vllm
  environment:
    - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    - VLLM_LOGGING_LEVEL=INFO
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - OPENBLAS_L2_SIZE=2097152
    - NCCL_DEBUG=WARN
    - VLLM_CACHE_ROOT=/root/.cache/vllm/qwen36-nvfp4-x8
  restart: unless-stopped
  stop_grace_period: 5m
  logging: *logging-conf

x-vllm-proxy-common: &vllm-proxy-common
  image: nearaidev/vllm-proxy-rs@sha256:c176aeb163641f757f2a66b0e15bc4cbc2aeb6f27d6589729d03734fb4302ea8
  user: root
  privileged: true
  <<: *nvidia
  extra_hosts:
    - "compose-manager:host-gateway"
  volumes:
    - /var/run/dstack.sock:/var/run/dstack.sock
    - certs:/etc/letsencrypt:ro
  restart: unless-stopped
  logging: *logging-conf

services:
  nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx
    command: /bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g "daemon off;"'
    ports:
      - "8000:8000"
      - "8444:443"
    volumes:
      - certs:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0644
    restart: unless-stopped
    logging: *logging-conf

  model-proxy-registrar:
    image: curlimages/curl@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: model-proxy-registrar
    entrypoint: ["sh", "/register.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ $$(( $$(date +%s) - $$(cat /tmp/registrar_alive 2>/dev/null || echo 0) )) -lt 180 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s
    environment:
      - HOST_IP=${HOST_IP}
      - MODEL_PROXY_TOKEN=${MODEL_PROXY_TOKEN}
    configs:
      - source: registrar_script
        target: /register.sh
        mode: 0755
    logging: *logging-conf

  vllm-proxy-qwen36-nvfp4-x8:
    <<: *vllm-proxy-common
    container_name: vllm-proxy-qwen36-nvfp4-x8
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLOUD_API_URL=https://cloud-api.near.ai
      - CLOUD_API_USAGE_TOKEN=${CLOUD_API_USAGE_TOKEN}
      - COMPOSE_MANAGER_URL=http://compose-manager:8080
      - LOG_FORMAT=json
      - MODEL_NAME=Qwen/Qwen3.6-35B-A3B-NVFP4-X8
      - OHTTP_ENABLED=true
      - TOKEN=${PROXY_TOKEN}
      - VLLM_BACKEND_URLS=http://model-vllm-qwen36-nvfp4-1:8000,http://model-vllm-qwen36-nvfp4-2:8000,http://model-vllm-qwen36-nvfp4-3:8000,http://model-vllm-qwen36-nvfp4-4:8000,http://model-vllm-qwen36-nvfp4-5:8000,http://model-vllm-qwen36-nvfp4-6:8000,http://model-vllm-qwen36-nvfp4-7:8000,http://model-vllm-qwen36-nvfp4-8:8000
      - VLLM_PROXY_MAX_REQUEST_SIZE=104857600
      - TLS_CERT_PATH=/etc/letsencrypt/live/completions.near.ai/fullchain.pem
      - USE_NV_ATTESTATION_SDK=true
    labels:
      com.datadoghq.ad.logs: '[{"source":"vllm-proxy","service":"vllm-proxy","tags":["model:Qwen/Qwen3.6-35B-A3B-NVFP4-X8","precision:nvfp4","deployment:qwen36-nvfp4-x8-throughput","ip:${HOST_IP}","port:8000"]}]'

